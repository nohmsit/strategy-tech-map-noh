
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국가전략기술 Strategic Map 3D</title>
  <script src="data.js"></script>
  <style>
    :root{
      --bg:#07101d;
      --bg-soft:#0d1728;
      --panel:#0f1b2f;
      --panel-2:#13223a;
      --line:#1d3555;
      --line-strong:#2b4f79;
      --text:#edf4ff;
      --muted:#96abc7;
      --accent:#87c7ff;
      --accent-2:#c4b5fd;
      --shadow:0 30px 80px rgba(0,0,0,.35);
      --header-h:78px;
      --chip-bg:rgba(255,255,255,.04);
      --panel-shadow:0 26px 70px rgba(0,0,0,.45);
      --input-bg:rgba(255,255,255,.03);
      --danger:#ff8c8c;
      --ok:#76d7a3;
    }

    body.light-mode{
      --bg:#eef4fb;
      --bg-soft:#f7fafe;
      --panel:#ffffff;
      --panel-2:#f4f8fd;
      --line:#d4dfec;
      --line-strong:#b8cade;
      --text:#112138;
      --muted:#617a97;
      --accent:#2577dd;
      --accent-2:#7b61ff;
      --shadow:0 26px 70px rgba(42,64,92,.14);
      --chip-bg:rgba(17,33,56,.04);
      --panel-shadow:0 24px 64px rgba(36,56,82,.16);
      --input-bg:#f4f8fc;
      --danger:#d84d4d;
      --ok:#17865b;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%}
    body{
      background:
        radial-gradient(circle at top left, rgba(135,199,255,.16), transparent 28%),
        radial-gradient(circle at top right, rgba(196,181,253,.11), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, #091425 100%);
      color:var(--text);
      font-family: Inter, "Noto Sans KR", Apple SD Gothic Neo, "Malgun Gothic", sans-serif;
      overflow:hidden;
    }
    body.light-mode{
      background:
        radial-gradient(circle at top left, rgba(37,119,221,.08), transparent 28%),
        radial-gradient(circle at top right, rgba(123,97,255,.07), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, #edf4fb 100%);
    }

    button,input{font:inherit}
    .app{height:100vh;display:flex;flex-direction:column}

    .topbar{
      height:var(--header-h);
      padding:18px 22px;
      display:flex;
      align-items:center;
      gap:18px;
      border-bottom:1px solid var(--line);
      background:rgba(7,16,29,.72);
      backdrop-filter: blur(20px);
      position:relative;
      z-index:30;
      flex-shrink:0;
    }
    body.light-mode .topbar{
      background:rgba(245,249,254,.84);
    }
    .brand{min-width:250px}
    .eyebrow{
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--accent);
      font-weight:800;
      margin-bottom:5px;
    }
    .title{
      font-size:26px;
      font-weight:900;
      letter-spacing:-.03em;
      line-height:1;
    }

    .header-metrics{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:12px;
      flex:1;
      min-width:0;
    }
    .metric-top{
      min-width:0;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }
    body.light-mode .metric-top{
      background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(250,252,255,.82));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
    }
    .metric-top .v{
      font-size:24px;
      font-weight:900;
      line-height:1;
      letter-spacing:-.03em;
    }
    .metric-top .k{
      margin-top:5px;
      color:var(--muted);
      font-size:11px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .header-actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-shrink:0;
    }
    .action-btn{
      height:42px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--line-strong);
      background:var(--panel);
      color:var(--text);
      cursor:pointer;
      font-weight:700;
      transition:.18s ease;
    }
    .action-btn:hover{
      transform:translateY(-1px);
      border-color:var(--accent);
      box-shadow:0 8px 20px rgba(37,119,221,.12);
    }

    .workspace{
      position:relative;
      flex:1;
      min-height:0;
      padding:16px;
    }
    .stage-card{
      position:relative;
      height:100%;
      border-radius:24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015)),
        linear-gradient(180deg, var(--bg-soft), rgba(7,16,29,.74));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      overflow:hidden;
      isolation:isolate;
    }
    body.light-mode .stage-card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.84), rgba(255,255,255,.72)),
        linear-gradient(180deg, #f9fbfe, #edf4fb);
    }

    .stage-head{
      position:absolute;
      top:0;left:0;right:0;
      padding:14px 18px 0;
      display:flex;
      justify-content:space-between;
      gap:12px;
      z-index:12;
      pointer-events:none;
    }
    .status-card{
      pointer-events:auto;
      min-width:260px;
      max-width:420px;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(9,20,37,.68);
      backdrop-filter:blur(18px);
      box-shadow:0 16px 40px rgba(0,0,0,.18);
      opacity:0;
      transform:translateY(-8px);
      transition:.2s ease;
    }
    body.light-mode .status-card{
      background:rgba(255,255,255,.82);
    }
    .status-card.show{opacity:1;transform:translateY(0)}
    .status-card .name{
      font-size:18px;
      font-weight:900;
      line-height:1.1;
      letter-spacing:-.02em;
      margin-bottom:6px;
    }
    .status-card .meta{
      font-size:13px;
      color:var(--muted);
      display:flex;
      flex-wrap:wrap;
      gap:8px 12px;
    }

    .scene-wrap{
      position:absolute;
      inset:0;
    }
    #sceneCanvas{
      width:100%;
      height:100%;
      display:block;
      cursor:grab;
    }
    #sceneCanvas.dragging{cursor:grabbing}
    .label-layer{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:6;
    }
    .floating-label{
      position:absolute;
      transform:translate(-50%,-50%);
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(9,18,33,.64);
      backdrop-filter:blur(10px);
      color:#fff;
      font-weight:800;
      font-size:12px;
      line-height:1.1;
      text-align:center;
      white-space:nowrap;
      box-shadow:0 12px 30px rgba(0,0,0,.22);
      opacity:0;
      transition:opacity .12s ease, transform .12s ease, background .18s ease, border-color .18s ease;
    }
    body.light-mode .floating-label{
      background:rgba(255,255,255,.8);
      color:#10223a;
      border-color:rgba(17,33,56,.12);
    }
    .floating-label.show{opacity:1}
    .floating-label.selected{
      background:linear-gradient(135deg, rgba(135,199,255,.85), rgba(196,181,253,.82));
      color:#07101d;
      border-color:rgba(255,255,255,.55);
      transform:translate(-50%,-50%) scale(1.04);
    }
    body.light-mode .floating-label.selected{
      color:#0b1526;
      background:linear-gradient(135deg, rgba(135,199,255,.88), rgba(196,181,253,.88));
    }

    .scene-ambient{
      position:absolute;
      inset:auto 16px 16px 16px;
      display:flex;
      gap:10px;
      align-items:flex-end;
      justify-content:space-between;
      z-index:10;
      pointer-events:none;
    }
    .sector-strip{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      max-width:calc(100% - 180px);
      pointer-events:auto;
    }
    .sector-chip{
      pointer-events:auto;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--chip-bg);
      color:var(--text);
      cursor:pointer;
      font-size:12px;
      font-weight:700;
      transition:.18s ease;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
    }
    .sector-chip:hover,
    .sector-chip.active{
      transform:translateY(-1px);
      border-color:var(--accent);
      box-shadow:0 10px 24px rgba(37,119,221,.14);
    }
    .sector-chip .budget{
      color:var(--muted);
      font-weight:600;
      margin-left:6px;
    }

    .error-banner{
      position:absolute;
      left:18px;
      right:18px;
      bottom:82px;
      z-index:14;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid rgba(255,140,140,.28);
      background:rgba(70,22,22,.84);
      color:#ffe5e5;
      box-shadow:0 20px 44px rgba(0,0,0,.24);
      display:none;
    }
    body.light-mode .error-banner{
      background:#fff2f2;
      color:#7f2525;
      border-color:#f2c9c9;
    }
    .error-banner.show{display:block}
    .error-banner strong{display:block;margin-bottom:4px}

    .drawer{
      position:fixed;
      top:12px;
      right:12px;
      bottom:12px;
      width:min(460px, calc(100vw - 24px));
      overscroll-behavior:contain;
      background:linear-gradient(180deg, rgba(15,27,47,.96), rgba(10,19,34,.98));
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--panel-shadow);
      z-index:40;
      transform:translateX(calc(100% + 24px));
      transition:transform .26s cubic-bezier(.2,.8,.2,1);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      backdrop-filter: blur(20px);
    }
    body.light-mode .drawer{
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,250,254,.98));
    }
    .drawer.open{transform:translateX(0)}
    .backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.32);
      backdrop-filter:blur(3px);
      z-index:35;
      opacity:0;
      pointer-events:none;
      transition:.2s ease;
    }
    .backdrop.show{opacity:1;pointer-events:auto}

    .drawer-head{
      padding:18px 18px 14px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      gap:14px;
      flex-shrink:0;
    }
    .drawer-color{
      width:18px;height:18px;border-radius:6px;flex-shrink:0;
      box-shadow:0 0 0 4px rgba(255,255,255,.06);
    }
    .drawer-title-wrap{min-width:0;flex:1}
    .drawer-eyebrow{
      font-size:11px;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--accent);
      margin-bottom:5px;
    }
    .drawer-title{
      font-size:28px;
      font-weight:900;
      line-height:1;
      letter-spacing:-.03em;
      margin:0;
    }
    .icon-btn{
      width:40px;height:40px;border-radius:12px;border:1px solid var(--line);
      background:var(--panel-2);color:var(--text);cursor:pointer;font-size:24px;line-height:1;
      display:grid;place-items:center;transition:.18s ease;
    }
    .icon-btn:hover{border-color:var(--accent);transform:translateY(-1px)}

    .drawer-body{
      flex:1;
      min-height:0;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      touch-action:pan-y;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .metric-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }
    .metric-card{
      padding:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    }
    body.light-mode .metric-card{
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(247,250,254,.92));
    }
    .metric-card .k{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
      font-weight:700;
    }
    .metric-card .v{
      font-size:24px;
      font-weight:900;
      letter-spacing:-.03em;
      line-height:1.05;
    }
    .metric-card .sub{
      margin-top:7px;
      font-size:12px;
      color:var(--muted);
    }

    .section{
      padding:16px;
      border:1px solid var(--line);
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.018));
    }
    body.light-mode .section{
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,250,254,.92));
    }
    .section-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
    }
    .section-title{
      font-size:16px;
      font-weight:900;
      letter-spacing:-.02em;
    }
    .section-sub{
      font-size:12px;
      color:var(--muted);
    }

    .compare-row{
      display:grid;
      grid-template-columns:64px 1fr 90px;
      gap:10px;
      align-items:center;
      margin-top:10px;
      font-size:13px;
    }
    .compare-track{
      height:14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.05);
      overflow:hidden;
    }
    body.light-mode .compare-track{
      background:#eef3fa;
      border-color:#e2eaf3;
    }
    .compare-fill{
      height:100%;
      border-radius:999px;
    }
    .compare-value{
      text-align:right;
      font-weight:800;
    }

    .tech-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .tech-card{
      width:100%;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--text);
      padding:14px;
      cursor:pointer;
      text-align:left;
      transition:.18s ease;
    }
    body.light-mode .tech-card{
      background:#f7fbff;
    }
    .tech-card:hover,
    .tech-card.active{
      transform:translateY(-1px);
      border-color:var(--accent);
      box-shadow:0 12px 28px rgba(37,119,221,.10);
    }
    .tech-head{
      display:flex;
      gap:10px;
      align-items:flex-start;
      justify-content:space-between;
      margin-bottom:10px;
    }
    .tech-name{
      font-weight:800;
      line-height:1.45;
      font-size:14px;
    }
    .tech-level{
      font-size:13px;
      font-weight:900;
      color:var(--accent);
      flex-shrink:0;
      white-space:nowrap;
    }
    .tech-bar{
      height:12px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.05);
    }
    body.light-mode .tech-bar{
      background:#edf3fa;
      border-color:#e2eaf2;
    }
    .tech-fill{height:100%;border-radius:999px}
    .tech-meta{
      margin-top:9px;
      display:flex;
      flex-wrap:wrap;
      gap:7px;
    }
    .mini-pill{
      padding:5px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
      color:var(--muted);
      font-size:11px;
      font-weight:700;
    }
    body.light-mode .mini-pill{
      background:#f2f6fb;
      border-color:#e4ebf4;
    }

    .filter-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:12px;
    }
    .filter-chip{
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--chip-bg);
      color:var(--text);
      cursor:pointer;
      font-size:12px;
      font-weight:700;
      transition:.18s ease;
    }
    .filter-chip.active{border-color:var(--accent); color:var(--accent);}

    .mini-bars{display:flex;flex-direction:column;gap:12px}
    .mini-bar-row{display:grid;grid-template-columns:78px 1fr 88px;gap:10px;align-items:center}
    .mini-bar-label{
      font-size:12px;
      font-weight:800;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .mini-bar-track{
      height:12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.05);
      overflow:hidden;
    }
    body.light-mode .mini-bar-track{
      background:#edf3fa;
      border-color:#e2eaf2;
    }
    .mini-bar-fill{height:100%;border-radius:999px}
    .mini-bar-value{
      text-align:right;
      font-size:12px;
      font-weight:800;
    }

    .project-toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      margin-bottom:12px;
    }
    .search-input{
      flex:1;
      min-width:0;
      height:42px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--input-bg);
      color:var(--text);
      padding:0 14px;
      outline:none;
    }
    .search-input:focus{border-color:var(--accent)}
    .search-count{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      font-weight:800;
    }
    .project-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .project-card{
      padding:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
    }
    body.light-mode .project-card{
      background:#fbfdff;
    }
    .project-top{
      display:flex;
      gap:12px;
      align-items:flex-start;
      justify-content:space-between;
      margin-bottom:7px;
    }
    .project-name{
      font-size:14px;
      line-height:1.5;
      font-weight:800;
    }
    .project-budget{
      font-size:14px;
      font-weight:900;
      color:var(--accent);
      white-space:nowrap;
      flex-shrink:0;
    }
    .project-sub{
      font-size:12px;
      line-height:1.55;
      color:var(--muted);
      margin-bottom:8px;
    }
    .project-compare{
      display:flex;
      flex-wrap:wrap;
      gap:10px 14px;
      font-size:11px;
      color:var(--muted);
    }
    .project-compare strong{color:var(--text)}

    .more-wrap{display:flex;justify-content:center;margin-top:4px}
    .more-btn{
      height:40px;
      padding:0 16px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel-2);
      color:var(--text);
      cursor:pointer;
      font-weight:800;
    }

    .empty{
      padding:18px;
      border-radius:16px;
      border:1px dashed var(--line);
      color:var(--muted);
      text-align:center;
      font-size:13px;
    }

    @media (max-width: 1180px){
      .header-metrics{grid-template-columns:repeat(3,minmax(0,1fr))}
      .metric-top:nth-child(4),
      .metric-top:nth-child(5){display:none}
    }
    @media (max-width: 820px){
      body{overflow:auto}
      .app{height:auto;min-height:100vh}
      .topbar{
        height:auto;
        padding:16px;
        align-items:flex-start;
        flex-wrap:wrap;
      }
      .brand{min-width:0}
      .title{font-size:22px}
      .header-metrics{grid-template-columns:repeat(2,minmax(0,1fr));width:100%}
      .workspace{padding:12px;height:calc(100vh - var(--header-h));min-height:620px}
      .sector-strip{max-width:100%}
      .scene-ambient{align-items:flex-start;flex-direction:column}
      .drawer{
        top:auto;
        left:10px;
        right:10px;
        bottom:10px;
        width:auto;
        height:min(82vh, 920px);
        border-radius:24px;
      }
      .metric-grid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="eyebrow">Korea Strategic Tech</div>
        <div class="title">국가전략기술 Strategic Map 3D</div>
      </div>
      <div class="header-metrics">
        <div class="metric-top">
          <div class="v" id="kpi2026">8.61</div>
          <div class="k">2026 총예산(조원)</div>
        </div>
        <div class="metric-top">
          <div class="v" id="kpi2025">6.52</div>
          <div class="k">2025 비교예산(조원)</div>
        </div>
        <div class="metric-top">
          <div class="v" id="kpiSectors">12</div>
          <div class="k">전략기술 분야</div>
        </div>
        <div class="metric-top">
          <div class="v" id="kpiTechs">50</div>
          <div class="k">세부 중점기술</div>
        </div>
        <div class="metric-top">
          <div class="v" id="kpiProjects">1,516</div>
          <div class="k">관련사업</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="themeToggle" class="action-btn" type="button">☀️ 라이트</button>
        <button id="resetViewBtn" class="action-btn" type="button">전체 보기</button>
      </div>
    </header>

    <main class="workspace">
      <section class="stage-card">
        <div class="stage-head">
          <div id="statusCard" class="status-card"></div>
        </div>

        <div class="scene-wrap" id="sceneWrap">
          <canvas id="sceneCanvas"></canvas>
          <div id="labelLayer" class="label-layer"></div>
          <div id="errorBanner" class="error-banner"></div>
        </div>

        <div class="scene-ambient">
          <div class="sector-strip" id="sectorStrip"></div>
        </div>
      </section>
    </main>

    <aside id="drawer" class="drawer" aria-hidden="true"></aside>
    <div id="backdrop" class="backdrop"></div>
  </div>

  <script type="module">
    const RAW = window.STRATEGIC_MAP_DATA || window.STRATEGIC_TECH_DATA;
    const drawer = document.getElementById('drawer');
    const backdrop = document.getElementById('backdrop');
    const labelLayer = document.getElementById('labelLayer');
    const errorBanner = document.getElementById('errorBanner');
    const sectorStrip = document.getElementById('sectorStrip');
    const statusCard = document.getElementById('statusCard');
    const themeToggle = document.getElementById('themeToggle');
    const resetViewBtn = document.getElementById('resetViewBtn');
    const sceneWrap = document.getElementById('sceneWrap');
    const canvas = document.getElementById('sceneCanvas');

    const state = {
      selectedSectorId: null,
      hoverSectorId: null,
      focusFilter: 'ALL',
      projectQuery: '',
      projectLimit: 18,
      theme: localStorage.getItem('strategic-map-theme') === 'light' ? 'light' : 'dark'
    };

    const SHORT_CODES = {
      '인공지능':'AI',
      '첨단바이오':'바이오',
      '양자':'양자',
      '우주항공해양':'우주항공해양',
      '반도체/디스플레이':'반도체/디스플레이',
      '첨단모빌리티':'첨단모빌리티',
      '첨단로봇제조':'첨단로봇제조',
      '차세대통신':'차세대통신',
      '수소':'수소',
      '차세대원자력':'차세대원자력',
      '이차전지':'이차전지',
      '사이버보안':'사이버보안'
    };

    const LABEL_LINES = {
      '우주항공해양':['우주항공해양'],
      '반도체/디스플레이':['반도체','디스플레이'],
      '첨단로봇제조':['첨단로봇','제조'],
      '차세대통신':['차세대','통신'],
      '차세대원자력':['차세대','원자력']
    };

    function num(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function clamp(v, min, max){
      return Math.max(min, Math.min(max, v));
    }

    function escapeHtml(str){
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatInt(v){
      return num(v).toLocaleString('ko-KR');
    }

    function formatPct(v){
      return `${num(v).toFixed(1)}%`;
    }

    function formatSignedPct(v){
      const n = num(v);
      return `${n > 0 ? '+' : ''}${n.toFixed(1)}%`;
    }

    function formatTrillion(v){
      return `${num(v).toFixed(2)}조원`;
    }

    function formatBudgetFromMillion(v){
      const n = num(v);
      if (n >= 1000000) return `${(n / 1000000).toFixed(2)}조원`;
      if (n >= 10000) return `${(n / 100).toLocaleString('ko-KR', { maximumFractionDigits: 0 })}억원`;
      if (n >= 100) return `${(n / 100).toLocaleString('ko-KR', { maximumFractionDigits: 1 })}억원`;
      return `${n.toLocaleString('ko-KR', { maximumFractionDigits: 1 })}백만원`;
    }

    function normalizeText(text){
      return String(text || '').toLowerCase().replace(/\s+/g, '');
    }

    function hexToRgb(hex){
      const value = String(hex || '#000000').replace('#', '');
      const normal = value.length === 3 ? value.split('').map(c => c + c).join('') : value;
      const bigint = parseInt(normal, 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function rgbToHex({ r, g, b }){
      const toHex = (v) => clamp(Math.round(v), 0, 255).toString(16).padStart(2, '0');
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function shade(hex, ratio){
      const rgb = hexToRgb(hex);
      if (ratio >= 0){
        return rgbToHex({
          r: rgb.r + (255 - rgb.r) * ratio,
          g: rgb.g + (255 - rgb.g) * ratio,
          b: rgb.b + (255 - rgb.b) * ratio
        });
      }
      const p = Math.abs(ratio);
      return rgbToHex({
        r: rgb.r * (1 - p),
        g: rgb.g * (1 - p),
        b: rgb.b * (1 - p)
      });
    }

    function normalizeData(raw){
      const meta = {
        totalBudgetTrillion2026: num(raw?.meta?.totalBudgetTrillion2026),
        totalBudgetTrillion2025: num(raw?.meta?.totalBudgetTrillion2025),
        sectorCount: num(raw?.meta?.sectorCount) || raw?.sectors?.length || 0,
        detailTechCount: num(raw?.meta?.detailTechCount),
        totalProjects: num(raw?.meta?.totalProjects),
        averageTechLevelPct: num(raw?.meta?.averageTechLevelPct),
        sourceFile: raw?.meta?.sourceFile || ''
      };

      const sectors = (raw?.sectors || []).map((sector) => {
        const budgetTrillion2026 = num(sector.budgetTrillion2026);
        const budgetTrillion2025 = num(sector.budgetTrillion2025);
        const techLevelPct = num(sector.techLevelPct);
        const detailTechs = (sector.detailTechs || []).map((tech) => ({
          name: tech.name || '세부기술 미상',
          techLevelPct: num(tech.techLevelPct),
          budgetMillion2025: num(tech.budgetMillion2025),
          budgetMillion2026: num(tech.budgetMillion2026),
          projectCount: num(tech.projectCount),
          projects: tech.projects || [],
          departmentBudgets: tech.departmentBudgets || []
        }));

        const projects = (sector.projects || []).map((project) => ({
          ministry: project.ministry || '',
          program: project.program || '',
          subproject: project.subproject || '',
          start: project.start ?? '',
          end: project.end ?? '',
          focusTech: project.mappedDetailTech || project.focusTechRaw || '',
          budgetMillion2025: num(project.budgetMillion2025),
          budgetMillion2026: num(project.budgetMillion2026)
        }));

        const topMinistries = (sector.departmentBudgetsTop || sector.departmentBudgets || []).map((item) => ({
          name: item.name || '',
          budgetMillion2025: num(item.budgetMillion2025),
          budgetMillion2026: num(item.budgetMillion2026)
        }));

        const growthPct = budgetTrillion2025 > 0 ? ((budgetTrillion2026 - budgetTrillion2025) / budgetTrillion2025) * 100 : 0;

        return {
          id: num(sector.id),
          name: sector.name || '',
          shortCode: SHORT_CODES[sector.name] || sector.name,
          labelLines: LABEL_LINES[sector.name] || [sector.name],
          color: sector.color || '#9DC7F7',
          techLevelPct,
          budgetTrillion2026,
          budgetTrillion2025,
          budgetMillion2026: budgetTrillion2026 * 1000000,
          budgetMillion2025: budgetTrillion2025 * 1000000,
          growthPct,
          detailTechCount: detailTechs.length,
          detailTechs,
          projects,
          projectsCount: num(sector.projectsCount) || projects.length,
          topMinistries
        };
      });

      sectors.forEach((sector) => {
        sector.budgetSharePct = meta.totalBudgetTrillion2026 > 0 ? (sector.budgetTrillion2026 / meta.totalBudgetTrillion2026) * 100 : 0;
      });

      return { meta, sectors };
    }

    const DATA = normalizeData(RAW || {});
    if (!DATA.sectors.length){
      showError('data.js를 읽지 못했습니다.', '같은 폴더의 data.js가 정상적으로 배포되었는지 확인하세요.');
      throw new Error('STRATEGIC_MAP_DATA missing');
    }

    const techLevels = DATA.sectors.map((sector) => sector.techLevelPct);
    const techMin = Math.min(...techLevels);
    const techMax = Math.max(...techLevels);
    const techRange = Math.max(techMax - techMin, 1);

    function getBlockHeight(level){
      const normalized = clamp((num(level) - techMin) / techRange, 0, 1);
      return 16 + Math.pow(normalized, 0.92) * 96;
    }

    function showError(title, detail = ''){
      errorBanner.classList.add('show');
      errorBanner.innerHTML = `<strong>${escapeHtml(title)}</strong>${detail ? escapeHtml(detail) : ''}`;
    }

    function mountTopStats(){
      document.getElementById('kpi2026').textContent = DATA.meta.totalBudgetTrillion2026.toFixed(2);
      document.getElementById('kpi2025').textContent = DATA.meta.totalBudgetTrillion2025.toFixed(2);
      document.getElementById('kpiSectors').textContent = formatInt(DATA.meta.sectorCount || DATA.sectors.length);
      document.getElementById('kpiTechs').textContent = formatInt(DATA.meta.detailTechCount);
      document.getElementById('kpiProjects').textContent = formatInt(DATA.meta.totalProjects);
    }

    function renderSectorStrip(){
      sectorStrip.innerHTML = DATA.sectors
        .slice()
        .sort((a, b) => b.budgetMillion2026 - a.budgetMillion2026)
        .map((sector) => `
          <button
            class="sector-chip ${state.selectedSectorId === sector.id ? 'active' : ''}"
            type="button"
            data-sector-chip="${sector.id}"
            style="border-color:${state.selectedSectorId === sector.id ? sector.color : ''};"
          >
            ${escapeHtml(sector.name)}
            <span class="budget">${formatTrillion(sector.budgetTrillion2026)}</span>
          </button>
        `).join('');

      sectorStrip.querySelectorAll('[data-sector-chip]').forEach((button) => {
        button.addEventListener('click', () => {
          selectSector(num(button.getAttribute('data-sector-chip')));
        });
      });
    }

    function getSectorById(id){
      return DATA.sectors.find((sector) => sector.id === id) || null;
    }

    function renderStatusCard(){
      const sector = getSectorById(state.hoverSectorId) || getSectorById(state.selectedSectorId);
      if (!sector){
        statusCard.classList.remove('show');
        statusCard.innerHTML = '';
        return;
      }
      statusCard.classList.add('show');
      statusCard.innerHTML = `
        <div class="name">${escapeHtml(sector.name)}</div>
        <div class="meta">
          <span>2026 예산 ${formatTrillion(sector.budgetTrillion2026)}</span>
          <span>기술수준 ${formatPct(sector.techLevelPct)}</span>
          <span>세부기술 ${formatInt(sector.detailTechCount)}개</span>
        </div>
      `;
    }

    function renderMetricCard(label, value, sub=''){
      return `
        <div class="metric-card">
          <span class="k">${escapeHtml(label)}</span>
          <div class="v">${value}</div>
          ${sub ? `<div class="sub">${escapeHtml(sub)}</div>` : ''}
        </div>
      `;
    }

    function renderCompareRows(sector){
      const maxBudget = Math.max(sector.budgetMillion2025, sector.budgetMillion2026, 1);
      return `
        <div class="compare-row">
          <div>2025년</div>
          <div class="compare-track">
            <div class="compare-fill" style="width:${(sector.budgetMillion2025 / maxBudget) * 100}%; background:linear-gradient(90deg, rgba(255,255,255,.32), ${shade(sector.color, 0.08)});"></div>
          </div>
          <div class="compare-value">${formatTrillion(sector.budgetTrillion2025)}</div>
        </div>
        <div class="compare-row">
          <div>2026년</div>
          <div class="compare-track">
            <div class="compare-fill" style="width:${(sector.budgetMillion2026 / maxBudget) * 100}%; background:linear-gradient(90deg, ${shade(sector.color, -0.05)}, ${shade(sector.color, 0.18)});"></div>
          </div>
          <div class="compare-value">${formatTrillion(sector.budgetTrillion2026)}</div>
        </div>
      `;
    }

    function renderTechSection(sector){
      const techs = sector.detailTechs
        .slice()
        .sort((a, b) => (b.techLevelPct - a.techLevelPct) || (b.budgetMillion2026 - a.budgetMillion2026));

      if (!techs.length){
        return `<div class="empty">세부 중점기술 데이터가 없습니다.</div>`;
      }

      return `
        <div class="filter-row">
          <button type="button" class="filter-chip ${state.focusFilter === 'ALL' ? 'active' : ''}" data-focus-filter="ALL">전체</button>
          ${techs.map((tech) => `
            <button
              type="button"
              class="filter-chip ${state.focusFilter === tech.name ? 'active' : ''}"
              data-focus-filter="${escapeHtml(tech.name)}"
            >${escapeHtml(tech.name)}</button>
          `).join('')}
        </div>
        <div class="tech-list">
          ${techs.map((tech) => `
            <button
              type="button"
              class="tech-card ${state.focusFilter === tech.name ? 'active' : ''}"
              data-focus-filter="${escapeHtml(tech.name)}"
            >
              <div class="tech-head">
                <div class="tech-name">${escapeHtml(tech.name)}</div>
                <div class="tech-level">기술수준 ${formatPct(tech.techLevelPct)}</div>
              </div>
              <div class="tech-bar">
                <div class="tech-fill" style="width:${clamp(tech.techLevelPct, 0, 100)}%; background:linear-gradient(90deg, ${shade(sector.color, -0.10)}, ${shade(sector.color, 0.18)});"></div>
              </div>
              <div class="tech-meta">
                <span class="mini-pill">2026 예산 ${formatBudgetFromMillion(tech.budgetMillion2026)}</span>
                <span class="mini-pill">2025 예산 ${formatBudgetFromMillion(tech.budgetMillion2025)}</span>
                <span class="mini-pill">사업 ${formatInt(tech.projectCount)}개</span>
              </div>
            </button>
          `).join('')}
        </div>
      `;
    }

    function renderMinistrySection(sector){
      const items = sector.topMinistries
        .slice()
        .sort((a, b) => b.budgetMillion2026 - a.budgetMillion2026)
        .filter((item) => item.budgetMillion2026 > 0 || item.budgetMillion2025 > 0);

      if (!items.length){
        return `<div class="empty">부처별 예산 데이터가 없습니다.</div>`;
      }

      const maxBudget = Math.max(...items.map((item) => item.budgetMillion2026), 1);

      return `
        <div class="mini-bars">
          ${items.map((item) => `
            <div class="mini-bar-row">
              <div class="mini-bar-label">${escapeHtml(item.name)}</div>
              <div class="mini-bar-track">
                <div class="mini-bar-fill" style="width:${(item.budgetMillion2026 / maxBudget) * 100}%; background:linear-gradient(90deg, ${shade(sector.color, -0.10)}, ${shade(sector.color, 0.18)});"></div>
              </div>
              <div class="mini-bar-value">${formatBudgetFromMillion(item.budgetMillion2026)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function filterProjects(sector){
      const q = normalizeText(state.projectQuery);
      return sector.projects
        .filter((project) => {
          const techOk = state.focusFilter === 'ALL' || project.focusTech === state.focusFilter;
          if (!techOk) return false;
          if (!q) return true;
          const blob = normalizeText([
            project.program,
            project.subproject,
            project.ministry,
            project.focusTech
          ].join(' '));
          return blob.includes(q);
        })
        .sort((a, b) => b.budgetMillion2026 - a.budgetMillion2026);
    }

    function renderProjectSection(sector){
      const projects = filterProjects(sector);
      const visible = projects.slice(0, state.projectLimit);

      return `
        <div class="project-toolbar">
          <input id="projectSearchInput" class="search-input" type="text" value="${escapeHtml(state.projectQuery)}" placeholder="사업명 / 부처 / 세부기술 검색" />
          <div class="search-count">${formatInt(projects.length)}건</div>
        </div>

        <div class="project-list">
          ${visible.length ? visible.map((project) => `
            <div class="project-card">
              <div class="project-top">
                <div class="project-name">${escapeHtml(project.program || project.subproject || '사업명 없음')}</div>
                <div class="project-budget">${formatBudgetFromMillion(project.budgetMillion2026)}</div>
              </div>
              <div class="project-sub">
                ${[
                  project.ministry || null,
                  project.subproject || null,
                  (project.start || project.end) ? `${project.start || '—'}~${project.end || '계속'}` : null,
                  project.focusTech || null
                ].filter(Boolean).map(escapeHtml).join(' · ')}
              </div>
              <div class="project-compare">
                <span>2025 <strong>${escapeHtml(formatBudgetFromMillion(project.budgetMillion2025))}</strong></span>
                <span>2026 <strong>${escapeHtml(formatBudgetFromMillion(project.budgetMillion2026))}</strong></span>
              </div>
            </div>
          `).join('') : `<div class="empty">조건에 맞는 관련사업이 없습니다.</div>`}
        </div>

        ${projects.length > visible.length ? `
          <div class="more-wrap">
            <button id="moreProjectsBtn" class="more-btn" type="button">더 보기</button>
          </div>
        ` : ''}
      `;
    }

    function renderDrawer(){
      const sector = getSectorById(state.selectedSectorId);
      if (!sector){
        drawer.classList.remove('open');
        drawer.setAttribute('aria-hidden', 'true');
        drawer.innerHTML = '';
        backdrop.classList.remove('show');
        renderSectorStrip();
        renderStatusCard();
        return;
      }

      drawer.innerHTML = `
        <div class="drawer-head">
          <div class="drawer-color" style="background:${sector.color};"></div>
          <div class="drawer-title-wrap">
            <div class="drawer-eyebrow">${escapeHtml(sector.shortCode)}</div>
            <h2 class="drawer-title">${escapeHtml(sector.name)}</h2>
          </div>
          <button id="drawerCloseBtn" class="icon-btn" type="button" aria-label="닫기">×</button>
        </div>

        <div class="drawer-body">
          <div class="metric-grid">
            ${renderMetricCard('2026 예산', formatTrillion(sector.budgetTrillion2026), `전체의 ${sector.budgetSharePct.toFixed(1)}%`)}
            ${renderMetricCard('2025 예산', formatTrillion(sector.budgetTrillion2025), '비교값')}
            ${renderMetricCard('증감률', formatSignedPct(sector.growthPct), '2025 대비')}
            ${renderMetricCard('기술수준', formatPct(sector.techLevelPct), '분야 평균값')}
          </div>

          <section class="section">
            <div class="section-head">
              <div class="section-title">예산 비교</div>
              <div class="section-sub">3D 맵은 2026 예산 기준</div>
            </div>
            ${renderCompareRows(sector)}
          </section>

          <section class="section">
            <div class="section-head">
              <div class="section-title">세부 중점기술 · 기술수준</div>
              <div class="section-sub">${formatInt(sector.detailTechCount)}개</div>
            </div>
            ${renderTechSection(sector)}
          </section>

          <section class="section">
            <div class="section-head">
              <div class="section-title">부처별 2026 예산</div>
              <div class="section-sub">${escapeHtml(DATA.meta.sourceFile || '')}</div>
            </div>
            ${renderMinistrySection(sector)}
          </section>

          <section class="section">
            <div class="section-head">
              <div class="section-title">관련사업</div>
              <div class="section-sub">${state.focusFilter === 'ALL' ? '전체' : escapeHtml(state.focusFilter)}</div>
            </div>
            ${renderProjectSection(sector)}
          </section>
        </div>
      `;

      drawer.classList.add('open');
      drawer.setAttribute('aria-hidden', 'false');
      backdrop.classList.add('show');

      const closeBtn = document.getElementById('drawerCloseBtn');
      if (closeBtn) closeBtn.addEventListener('click', clearSelection);

      drawer.querySelectorAll('[data-focus-filter]').forEach((button) => {
        button.addEventListener('click', () => {
          const filter = button.getAttribute('data-focus-filter') || 'ALL';
          state.focusFilter = filter;
          state.projectLimit = 18;
          renderDrawer();
        });
      });

      const searchInput = document.getElementById('projectSearchInput');
      if (searchInput){
        searchInput.addEventListener('input', (event) => {
          state.projectQuery = event.target.value || '';
          state.projectLimit = 18;
          renderDrawer();
          const nextInput = document.getElementById('projectSearchInput');
          if (nextInput){
            nextInput.focus();
            nextInput.setSelectionRange(state.projectQuery.length, state.projectQuery.length);
          }
        });
      }

      const moreButton = document.getElementById('moreProjectsBtn');
      if (moreButton){
        moreButton.addEventListener('click', () => {
          state.projectLimit += 18;
          renderDrawer();
        });
      }

      renderSectorStrip();
      renderStatusCard();
    }

    function selectSector(id){
      state.selectedSectorId = id;
      state.focusFilter = 'ALL';
      state.projectQuery = '';
      state.projectLimit = 18;
      renderDrawer();
      update3DSelection();
    }

    function clearSelection(){
      state.selectedSectorId = null;
      state.focusFilter = 'ALL';
      state.projectQuery = '';
      state.projectLimit = 18;
      renderDrawer();
      update3DSelection();
    }

    backdrop.addEventListener('click', clearSelection);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') clearSelection();
    });

    function applyTheme(mode, persist = true){
      state.theme = mode === 'light' ? 'light' : 'dark';
      document.body.classList.toggle('light-mode', state.theme === 'light');
      themeToggle.textContent = state.theme === 'light' ? '🌙 다크' : '☀️ 라이트';
      if (persist){
        localStorage.setItem('strategic-map-theme', state.theme);
      }
      syncThreeTheme();
    }

    themeToggle.addEventListener('click', () => {
      applyTheme(state.theme === 'light' ? 'dark' : 'light');
    });

    mountTopStats();
    applyTheme(state.theme, false);
    renderSectorStrip();
    renderDrawer();

    let THREE_NS = null;
    let OrbitControlsClass = null;
    let scene = null;
    let camera = null;
    let renderer = null;
    let controls = null;
    let ambientLight = null;
    let hemiLight = null;
    let keyLight = null;
    let rimLight = null;
    let floor = null;
    let grid = null;
    let mapGroup = null;
    let blocks = [];
    let selectionGroup = null;
    let renderRequested = true;
    let animationFrameId = null;
    let lastPointerDown = null;
    const raycaster = { current: null };
    const pointer = { x: 0, y: 0 };

    function splitBalanced(items){
      const total = items.reduce((sum, item) => sum + item.value, 0);
      if (items.length <= 1) return [items, []];
      let bestIndex = 1;
      let acc = 0;
      let bestDiff = Infinity;
      for (let i = 1; i < items.length; i += 1){
        acc += items[i - 1].value;
        const diff = Math.abs(total / 2 - acc);
        if (diff < bestDiff){
          bestDiff = diff;
          bestIndex = i;
        }
      }
      return [items.slice(0, bestIndex), items.slice(bestIndex)];
    }

    function binaryTreemap(items, x, z, w, d, out = []){
      if (!items.length) return out;
      if (items.length === 1){
        out.push({ item: items[0], x, z, w, d });
        return out;
      }
      const total = items.reduce((sum, item) => sum + item.value, 0);
      const [a, b] = splitBalanced(items);
      const sumA = a.reduce((sum, item) => sum + item.value, 0);
      if (w >= d){
        const wA = w * (sumA / total);
        binaryTreemap(a, x, z, wA, d, out);
        binaryTreemap(b, x + wA, z, w - wA, d, out);
      } else {
        const dA = d * (sumA / total);
        binaryTreemap(a, x, z, w, dA, out);
        binaryTreemap(b, x, z + dA, w, d - dA, out);
      }
      return out;
    }

    function buildLayout(){
      const items = DATA.sectors
        .slice()
        .sort((a, b) => b.budgetMillion2026 - a.budgetMillion2026)
        .map((sector) => ({ sector, value: Math.max(sector.budgetMillion2026, 40000) }));

      const baseW = 180;
      const baseD = 112;
      const gap = 2.4;

      return binaryTreemap(items, -baseW / 2, -baseD / 2, baseW, baseD).map(({ item, x, z, w, d }) => {
        const innerW = Math.max(8, w - gap);
        const innerD = Math.max(8, d - gap);
        const centerX = x + w / 2;
        const centerZ = z + d / 2;
        return {
          sector: item.sector,
          x: centerX,
          z: centerZ,
          w: innerW,
          d: innerD,
          h: getBlockHeight(item.sector.techLevelPct)
        };
      });
    }

    function requestRender(){
      renderRequested = true;
    }

    function buildLabels(){
      labelLayer.innerHTML = '';
      blocks.forEach((block) => {
        const label = document.createElement('div');
        label.className = 'floating-label';
        label.innerHTML = escapeHtml(block.sector.shortCode);
        labelLayer.appendChild(label);
        block.label = label;
      });
    }

    function updateLabels(){
      if (!renderer || !camera) return;
      const width = sceneWrap.clientWidth;
      const height = sceneWrap.clientHeight;

      blocks.forEach((block) => {
        if (!block.label) return;
        const worldPosition = block.group.position.clone();
        worldPosition.y = block.h + 6;
        const projected = worldPosition.project(camera);
        const inFront = projected.z < 1;
        const onScreen = projected.x >= -1.2 && projected.x <= 1.2 && projected.y >= -1.2 && projected.y <= 1.2;
        if (!inFront || !onScreen){
          block.label.classList.remove('show', 'selected');
          return;
        }
        const x = (projected.x * 0.5 + 0.5) * width;
        const y = (-projected.y * 0.5 + 0.5) * height;
        block.label.style.left = `${x}px`;
        block.label.style.top = `${y}px`;
        block.label.classList.add('show');
        block.label.classList.toggle('selected', state.selectedSectorId === block.sector.id);
      });
    }

    function syncBlockStyles(){
      if (!THREE_NS) return;
      blocks.forEach((block) => {
        const selected = block.sector.id === state.selectedSectorId;
        const hovered = block.sector.id === state.hoverSectorId;
        const emphasis = selected ? 1 : hovered ? 0.55 : 0;
        block.body.material.emissive = new THREE_NS.Color(shade(block.sector.color, -0.42));
        block.body.material.emissiveIntensity = emphasis * 0.55;
        block.body.material.color.set(selected ? shade(block.sector.color, -0.04) : hovered ? shade(block.sector.color, -0.01) : shade(block.sector.color, -0.10));
        block.cap.material.color.set(selected ? shade(block.sector.color, 0.18) : hovered ? shade(block.sector.color, 0.14) : shade(block.sector.color, 0.10));
        block.edge.material.opacity = selected ? 0.72 : hovered ? 0.32 : 0.12;
        block.glow.material.opacity = selected ? 0.24 : hovered ? 0.16 : 0.06;
      });
      requestRender();
    }

    function clearSelectionGroup(){
      if (!selectionGroup) return;
      while (selectionGroup.children.length){
        const child = selectionGroup.children[0];
        selectionGroup.remove(child);
        if (child.geometry) child.geometry.dispose?.();
        if (child.material){
          if (Array.isArray(child.material)) child.material.forEach((m) => m.dispose?.());
          else child.material.dispose?.();
        }
      }
    }

    function update3DSelection(){
      if (!selectionGroup || !THREE_NS){
        renderStatusCard();
        renderSectorStrip();
        return;
      }
      clearSelectionGroup();
      syncBlockStyles();

      const block = blocks.find((item) => item.sector.id === state.selectedSectorId);
      if (block){
        const outlineGeo = new THREE_NS.BoxGeometry(block.w + 2.2, block.h + 2.5, block.d + 2.2);
        const outline = new THREE_NS.LineSegments(
          new THREE_NS.EdgesGeometry(outlineGeo),
          new THREE_NS.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: state.theme === 'light' ? 0.78 : 0.64 })
        );
        outline.position.copy(block.group.position);
        outline.position.y = block.h / 2 + 1.25;
        selectionGroup.add(outline);

        const plate = new THREE_NS.Mesh(
          new THREE_NS.PlaneGeometry(block.w + 5, block.d + 5),
          new THREE_NS.MeshBasicMaterial({
            color: block.sector.color,
            transparent: true,
            opacity: state.theme === 'light' ? 0.22 : 0.18,
            side: THREE_NS.DoubleSide
          })
        );
        plate.rotation.x = -Math.PI / 2;
        plate.position.set(block.group.position.x, 0.11, block.group.position.z);
        selectionGroup.add(plate);
      }

      renderStatusCard();
      renderSectorStrip();
      requestRender();
    }

    function syncThreeTheme(){
      if (!THREE_NS || !scene || !renderer) return;

      const theme = state.theme === 'light'
        ? {
            background: '#eef4fb',
            fog: '#eef4fb',
            floor: '#f8fbff',
            gridStrong: '#c8d9ec',
            gridWeak: '#dce7f3',
            ambient: 1.08,
            hemi: 0.84,
            key: 1.55,
            rim: 0.44
          }
        : {
            background: '#07101d',
            fog: '#07101d',
            floor: '#091426',
            gridStrong: '#234162',
            gridWeak: '#132740',
            ambient: 0.84,
            hemi: 0.52,
            key: 1.72,
            rim: 0.54
          };

      scene.background = new THREE_NS.Color(theme.background);
      scene.fog = new THREE_NS.FogExp2(theme.fog, state.theme === 'light' ? 0.0038 : 0.0058);
      floor.material.color.set(theme.floor);
      grid.material[0].color.set(theme.gridStrong);
      grid.material[1].color.set(theme.gridWeak);
      ambientLight.intensity = theme.ambient;
      hemiLight.intensity = theme.hemi;
      keyLight.intensity = theme.key;
      rimLight.intensity = theme.rim;
      update3DSelection();
      requestRender();
    }

    function resizeRenderer(){
      if (!renderer || !camera) return;
      const width = sceneWrap.clientWidth;
      const height = sceneWrap.clientHeight;
      renderer.setSize(width, height, false);
      camera.aspect = width / Math.max(height, 1);
      camera.updateProjectionMatrix();
      requestRender();
    }

    function getIntersectedSector(clientX, clientY){
      if (!raycaster.current || !camera || !renderer) return null;
      const rect = canvas.getBoundingClientRect();
      pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.current.setFromCamera(pointer, camera);
      const intersects = raycaster.current.intersectObjects(blocks.map((block) => block.body), false);
      if (!intersects.length) return null;
      return intersects[0].object.userData.sectorId || null;
    }

    function bindCanvasEvents(){
      canvas.addEventListener('pointerdown', (event) => {
        lastPointerDown = { x: event.clientX, y: event.clientY };
        canvas.classList.add('dragging');
      });

      window.addEventListener('pointerup', () => {
        canvas.classList.remove('dragging');
      });

      canvas.addEventListener('pointermove', (event) => {
        const sectorId = getIntersectedSector(event.clientX, event.clientY);
        if (state.hoverSectorId !== sectorId){
          state.hoverSectorId = sectorId;
          syncBlockStyles();
          renderStatusCard();
        }
        canvas.style.cursor = sectorId ? 'pointer' : 'grab';
      });

      canvas.addEventListener('pointerleave', () => {
        state.hoverSectorId = null;
        canvas.style.cursor = 'grab';
        syncBlockStyles();
        renderStatusCard();
      });

      canvas.addEventListener('click', (event) => {
        if (!lastPointerDown) return;
        const moved = Math.hypot(event.clientX - lastPointerDown.x, event.clientY - lastPointerDown.y);
        if (moved > 6) return;
        const sectorId = getIntersectedSector(event.clientX, event.clientY);
        if (sectorId){
          selectSector(sectorId);
        }
      });
    }

    function resetCamera(){
      if (!camera || !controls) return;
      camera.position.set(126, 122, 152);
      controls.target.set(0, 18, 0);
      controls.update();
      state.hoverSectorId = null;
      clearSelection();
      requestRender();
    }

    resetViewBtn.addEventListener('click', resetCamera);

    async function initThree(){
      try {
        THREE_NS = await import('https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js');
        ({ OrbitControls: OrbitControlsClass } = await import('https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/controls/OrbitControls.js'));
      } catch (error) {
        showError('3D 엔진을 불러오지 못했습니다.', '네트워크 또는 CDN 접근 상태를 확인하세요. 아래 분야 칩을 눌러 상세 정보는 계속 볼 수 있습니다.');
        console.error(error);
        return;
      }

      if (!canvas.getContext('webgl2') && !canvas.getContext('webgl')){
        showError('브라우저에서 WebGL을 사용할 수 없습니다.', '아래 분야 칩을 눌러 상세 정보는 계속 볼 수 있습니다.');
        return;
      }

      renderer = new THREE_NS.WebGLRenderer({ canvas, antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE_NS.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE_NS.SRGBColorSpace;

      scene = new THREE_NS.Scene();
      camera = new THREE_NS.PerspectiveCamera(44, 1, 0.1, 1000);
      camera.position.set(126, 122, 152);

      controls = new OrbitControlsClass(camera, renderer.domElement);
      controls.target.set(0, 18, 0);
      controls.enableDamping = true;
      controls.dampingFactor = 0.065;
      controls.enablePan = false;
      controls.minDistance = 92;
      controls.maxDistance = 300;
      controls.minPolarAngle = 0.42;
      controls.maxPolarAngle = 1.42;
      controls.addEventListener('change', () => {
        requestRender();
      });

      ambientLight = new THREE_NS.AmbientLight(0xffffff, 0.84);
      hemiLight = new THREE_NS.HemisphereLight(0xbfdfff, 0x0b1322, 0.52);
      keyLight = new THREE_NS.DirectionalLight(0xffffff, 1.72);
      keyLight.position.set(86, 160, 72);
      keyLight.castShadow = true;
      keyLight.shadow.mapSize.width = 2048;
      keyLight.shadow.mapSize.height = 2048;
      keyLight.shadow.camera.left = -180;
      keyLight.shadow.camera.right = 180;
      keyLight.shadow.camera.top = 180;
      keyLight.shadow.camera.bottom = -180;
      keyLight.shadow.camera.near = 1;
      keyLight.shadow.camera.far = 420;
      keyLight.shadow.bias = -0.00012;

      rimLight = new THREE_NS.DirectionalLight(0x7fb2ff, 0.54);
      rimLight.position.set(-120, 72, -94);

      scene.add(ambientLight, hemiLight, keyLight, rimLight);

      floor = new THREE_NS.Mesh(
        new THREE_NS.PlaneGeometry(250, 170),
        new THREE_NS.MeshStandardMaterial({ color: 0x091426, roughness: 0.95, metalness: 0.04 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      floor.position.y = 0;
      scene.add(floor);

      grid = new THREE_NS.GridHelper(250, 34, 0x234162, 0x132740);
      grid.position.y = 0.02;
      scene.add(grid);

      mapGroup = new THREE_NS.Group();
      scene.add(mapGroup);

      selectionGroup = new THREE_NS.Group();
      scene.add(selectionGroup);

      const layout = buildLayout();
      blocks = layout.map((entry) => {
        const group = new THREE_NS.Group();
        group.position.set(entry.x, 0, entry.z);

        const body = new THREE_NS.Mesh(
          new THREE_NS.BoxGeometry(entry.w, entry.h, entry.d),
          new THREE_NS.MeshStandardMaterial({
            color: shade(entry.sector.color, -0.10),
            roughness: 0.56,
            metalness: 0.08
          })
        );
        body.position.y = entry.h / 2;
        body.castShadow = true;
        body.receiveShadow = true;
        body.userData.sectorId = entry.sector.id;

        const cap = new THREE_NS.Mesh(
          new THREE_NS.BoxGeometry(entry.w * 0.96, 1.25, entry.d * 0.96),
          new THREE_NS.MeshStandardMaterial({
            color: shade(entry.sector.color, 0.10),
            roughness: 0.36,
            metalness: 0.12
          })
        );
        cap.position.y = entry.h + 0.72;
        cap.castShadow = true;
        cap.receiveShadow = true;

        const edge = new THREE_NS.LineSegments(
          new THREE_NS.EdgesGeometry(new THREE_NS.BoxGeometry(entry.w, entry.h, entry.d)),
          new THREE_NS.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.12 })
        );
        edge.position.y = entry.h / 2;

        const glow = new THREE_NS.Mesh(
          new THREE_NS.PlaneGeometry(entry.w * 1.04, entry.d * 1.04),
          new THREE_NS.MeshBasicMaterial({
            color: entry.sector.color,
            transparent: true,
            opacity: 0.06,
            side: THREE_NS.DoubleSide
          })
        );
        glow.rotation.x = -Math.PI / 2;
        glow.position.y = 0.08;

        group.add(glow, body, cap, edge);
        mapGroup.add(group);

        return {
          sector: entry.sector,
          group,
          body,
          cap,
          edge,
          glow,
          w: entry.w,
          d: entry.d,
          h: entry.h
        };
      });

      raycaster.current = new THREE_NS.Raycaster();
      buildLabels();
      bindCanvasEvents();
      syncBlockStyles();
      syncThreeTheme();
      resizeRenderer();
      update3DSelection();

      const animate = () => {
        animationFrameId = requestAnimationFrame(animate);
        if (controls) controls.update();
        if (!renderRequested) return;
        renderRequested = false;
        updateLabels();
        renderer.render(scene, camera);
      };

      animate();
      window.addEventListener('resize', resizeRenderer);
    }

    initThree();
  </script>
</body>
</html>
