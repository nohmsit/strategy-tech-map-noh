<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strategic Technology Map</title>
  <meta name="description" content="국가 기술관리체계 19개 분야와 5개 법령 체계를 탐색하는 인터랙티브 웹사이트" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <header class="hero shell">
    <div class="hero__text">
      <div class="eyebrow">INTERACTIVE STRATEGIC TECHNOLOGY MAP</div>
      <h1>국가 기술관리체계<br />인터랙티브 웹사이트</h1>
      <p class="hero__desc">
        <strong>PPT를 우선 기준</strong>으로 19개 분야와 5개 법령 체계를 정리했습니다.
        기술 검색, 분야별 상세 보기, 법령 포함 여부, 전체 요약 매트릭스를 한 화면에서 탐색할 수 있습니다.
      </p>
      <div class="hero__stats" id="heroStats"></div>
    </div>
    <div class="hero__panel glass">
      <div class="panel-title">검색 및 필터</div>
      <label class="search-wrap">
        <span>기술명 · 분야 · 중분류 · 비고 검색</span>
        <input id="searchInput" type="search" placeholder="예: DRAM, 자율주행, 수전해, 백신, 위성" />
      </label>

      <div class="filters">
        <div>
          <div class="filter-label">법령 기준</div>
          <div id="lawFilters" class="chip-row"></div>
        </div>
        <div>
          <div class="filter-label">포함 상태</div>
          <div id="statusFilters" class="chip-row">
            <button class="chip chip--active" data-status-filter="all">전체</button>
            <button class="chip" data-status-filter="exact">직접 포함 (●)</button>
            <button class="chip" data-status-filter="related">연관/유사 (○)</button>
          </div>
        </div>
      </div>

      <div class="legend">
        <div><span class="legend-mark legend-mark--exact"></span> 직접 포함 (●)</div>
        <div><span class="legend-mark legend-mark--related"></span> 연관/유사 (○)</div>
        <div><span class="legend-mark legend-mark--none"></span> 해당 없음</div>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="section">
      <div class="section-head">
        <div>
          <div class="section-kicker">OVERVIEW</div>
          <h2>전체 요약 매트릭스</h2>
        </div>
        <p class="section-note">셀을 누르면 해당 분야와 법령으로 바로 필터링됩니다.</p>
      </div>
      <div class="glass matrix-wrap">
        <div id="matrix"></div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <div class="section-kicker">FIELDS</div>
          <h2>19개 분야 탐색</h2>
        </div>
        <p id="resultSummary" class="section-note"></p>
      </div>
      <div id="fieldGrid" class="field-grid"></div>
    </section>
  </main>

  <dialog id="detailModal" class="detail-modal">
    <div class="detail-modal__header">
      <div>
        <div class="section-kicker">DETAIL VIEW</div>
        <h3 id="modalTitle">분야 상세</h3>
        <p id="modalMeta" class="modal-meta"></p>
      </div>
      <button id="closeModalBtn" class="icon-btn" aria-label="닫기">✕</button>
    </div>
    <div id="modalLawTabs" class="law-tabs"></div>
    <div id="modalBody" class="detail-modal__body"></div>
  </dialog>

  <template id="fieldCardTemplate">
    <article class="field-card glass">
      <div class="field-card__top">
        <div>
          <div class="field-card__eyebrow">기술분야</div>
          <h3 class="field-card__title"></h3>
          <div class="field-card__slides"></div>
        </div>
        <button class="field-card__btn">상세 보기</button>
      </div>
      <div class="field-card__stats"></div>
      <div class="field-card__laws"></div>
      <div class="field-card__technologies"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
