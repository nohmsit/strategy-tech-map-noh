<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국가 전략기술 분류체계 현황맵</title>
  <meta name="theme-color" content="#0a0f1e" />
  <link rel="manifest" href="./manifest.json" />
<script src="data.js"></script>
  <style>
    :root {
      --bg: #0a0f1e;
      --bg2: #0f172a;
      --bg3: #1e293b;
      --border: #1e3a5f;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --law-a: #3b82f6;
      --law-b: #8b5cf6;
      --law-c: #10b981;
      --law-d: #ef4444;
      --law-e: #6b7280;
      --law-a-bg: #1e3a5f22;
      --law-b-bg: #4c1d9522;
      --law-c-bg: #064e3b22;
      --law-d-bg: #7f1d1d22;
      --law-e-bg: #1f293722;
      /* law text colors (light tint for dark bg) */
      --law-a-text: #93c5fd;
      --law-b-text: #c4b5fd;
      --law-c-text: #6ee7b7;
      --law-d-text: #fca5a5;
      --law-e-text: #9ca3af;
      /* header gradient */
      --header-bg: linear-gradient(135deg, #0a0f1e 0%, #0f172a 50%, #0a1628 100%);
      /* inactive / misc */
      --inactive-border: #1e293b;
      --inactive-color: #475569;
      --card-shadow: #38bdf81a;
      --dot-off: #1e293b;
      --check-no: #1e293b;
      --mark-bg: #38bdf833;
      --bubble-text: #fff;
      --scrollbar-thumb: #1e3a5f;
      --bar-fill-text: rgba(0,0,0,0.7);
    }

    [data-theme="light"] {
      --bg: #f1f5f9;
      --bg2: #ffffff;
      --bg3: #e2e8f0;
      --border: #cbd5e1;
      --accent: #2563eb;
      --accent2: #7c3aed;
      --text: #1e293b;
      --text-dim: #64748b;
      --law-a: #2563eb;
      --law-b: #7c3aed;
      --law-c: #059669;
      --law-d: #dc2626;
      --law-e: #4b5563;
      --law-a-bg: #dbeafe;
      --law-b-bg: #ede9fe;
      --law-c-bg: #d1fae5;
      --law-d-bg: #fee2e2;
      --law-e-bg: #f3f4f6;
      --law-a-text: #1d4ed8;
      --law-b-text: #6d28d9;
      --law-c-text: #047857;
      --law-d-text: #b91c1c;
      --law-e-text: #4b5563;
      --header-bg: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #f1f5f9 100%);
      --inactive-border: #e2e8f0;
      --inactive-color: #94a3b8;
      --card-shadow: #2563eb1a;
      --dot-off: #e2e8f0;
      --check-no: #e2e8f0;
      --mark-bg: #2563eb22;
      --bubble-text: #fff;
      --scrollbar-thumb: #94a3b8;
      --bar-fill-text: rgba(255,255,255,0.9);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── NOTICE BANNER ─── */
    .notice-banner {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg2);
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
      padding: 8px 16px;
      letter-spacing: 0.3px;
      line-height: 1.5;
    }
    .notice-mobile { display: none; }
    .notice-desktop { display: inline; }

    /* ─── HEADER ─── */
    header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 20px;
      backdrop-filter: blur(12px);
    }

    .header-title {
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .header-title:hover { opacity: 0.75; }

    .logo-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    header h1 span {
      color: var(--accent);
    }

    .header-stats {
      display: flex;
      gap: 20px;
    }

    .hstat {
      text-align: right;
    }

    .hstat-num {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .hstat-label {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ─── LAYOUT ─── */
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: auto 1fr;
      min-height: calc(100vh - 68px);
    }

    /* ─── SIDEBAR ─── */
    sidebar {
      display: block;
      grid-row: 1 / 3;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      position: sticky;
      top: 68px;
      height: calc(100vh - 68px);
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    /* View toggle */
    .view-btns {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
    }

    .view-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 4px;
      font-size: 11px;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      text-align: center;
    }

    .view-btn:hover { border-color: var(--accent); color: var(--accent); }
    .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

    /* Law filters */
    .law-filter {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .law-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
    }

    .law-chip:hover { opacity: 0.85; }

    .law-chip.active-a { background: var(--law-a-bg); border-color: var(--law-a); color: var(--law-a-text); }
    .law-chip.active-b { background: var(--law-b-bg); border-color: var(--law-b); color: var(--law-b-text); }
    .law-chip.active-c { background: var(--law-c-bg); border-color: var(--law-c); color: var(--law-c-text); }
    .law-chip.active-d { background: var(--law-d-bg); border-color: var(--law-d); color: var(--law-d-text); }
    .law-chip.active-e { background: var(--law-e-bg); border-color: var(--law-e); color: var(--law-e-text); }
    .law-chip.inactive { background: transparent; border-color: var(--inactive-border); color: var(--inactive-color); }

    .law-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .law-chip-count {
      margin-left: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      opacity: 0.7;
    }

    .law-detail-btn {
      font-size: 11px;
      padding: 2px 7px;
      border: 1px solid currentColor;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      opacity: 0.7;
      transition: opacity 0.15s;
      line-height: 1.4;
    }
    .law-detail-btn:hover {
      opacity: 1;
    }
    .law-detail-btn-a { color: var(--law-a-text); border-color: var(--law-a-text); }
    .law-detail-btn-b { color: var(--law-b-text); border-color: var(--law-b-text); }
    .law-detail-btn-c { color: var(--law-c-text); border-color: var(--law-c-text); }
    .law-detail-btn-d { color: var(--law-d-text); border-color: var(--law-d-text); }
    .law-detail-btn-e { color: var(--law-e-text); border-color: var(--law-e-text); }

    /* Sector list */
    .sector-list { display: flex; flex-direction: column; gap: 2px; }

    .sector-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 12px;
      color: var(--text-dim);
      border: 1px solid transparent;
    }

    .sector-item:hover { background: var(--bg3); color: var(--text); }
    .sector-item.active { background: var(--law-a-bg); border-color: var(--accent); color: var(--accent); }

    .sector-icon { font-size: 14px; width: 20px; text-align: center; }

    .sector-count {
      margin-left: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10px;
      background: var(--bg3);
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* Search */
    .search-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 12px 9px 34px;
      border-radius: 8px;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-dim); }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ─── CONTROL BAR ─── */
    .control-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .result-count {
      font-size: 12px;
      color: var(--text-dim);
    }

    .result-count strong {
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .tag-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }

    .tag {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid;
      cursor: pointer;
    }

    .tag-a { background: var(--law-a-bg); border-color: var(--law-a); color: var(--law-a-text); }
    .tag-b { background: var(--law-b-bg); border-color: var(--law-b); color: var(--law-b-text); }
    .tag-c { background: var(--law-c-bg); border-color: var(--law-c); color: var(--law-c-text); }
    .tag-d { background: var(--law-d-bg); border-color: var(--law-d); color: var(--law-d-text); }
    .tag-e { background: var(--law-e-bg); border-color: var(--law-e); color: var(--law-e-text); }

    /* ─── MAIN CONTENT ─── */
    main {
      padding: 24px;
      overflow-y: auto;
    }

    /* ─── OVERVIEW VIEW ─── */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .sector-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .sector-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .sector-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--card-shadow);
    }

    .sector-card:hover::before { opacity: 1; }

    .card-id {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .card-icon { font-size: 28px; margin-bottom: 8px; }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .card-law-dots {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .card-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .card-dot.on-a { background: var(--law-a); }
    .card-dot.on-b { background: var(--law-b); }
    .card-dot.on-c { background: var(--law-c); }
    .card-dot.on-d { background: var(--law-d); }
    .card-dot.on-e { background: var(--law-e); }
    .card-dot.off { background: var(--dot-off); }

    .card-sub-count {
      font-size: 11px;
      color: var(--text-dim);
    }

    .card-coverage {
      font-size: 11px;
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      margin-top: 4px;
    }

    /* ─── DETAIL VIEW ─── */
    .sector-detail {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sector-header {
      background: linear-gradient(135deg, var(--bg2), var(--bg3));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }

    .sector-header-icon { font-size: 40px; }

    .sector-header-info { flex: 1; }

    .sector-header-name {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .law-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .law-badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid;
      white-space: nowrap;
    }

    /* Sector header law-name grid (aligned with tech-laws pills) */
    .sector-law-grid {
      display: flex;
      gap: 3px;
      margin-top: -8px;
      padding: 0 20px 0 340px;
    }
    .sector-law-grid-item {
      flex: 1;
      text-align: center;
      min-width: 0;
    }
    .sector-law-grid-item .law-name {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 4px;
      display: block;
      text-align: center;
    }
    .sector-law-grid-item .law-scope {
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      display: block;
    }

    .back-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
      transition: all 0.2s;
    }

    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* subsector blocks */
    .subsector-block {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .subsector-toggle-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      text-align: center;
      font-size: 11px;
      margin-left: 8px;
      border-radius: 4px;
      color: var(--text-dim);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .subsector-toggle-arrow:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(56,189,248,0.1);
    }
    .subsector-title {
      background: var(--bg3);
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subsector-items { padding: 8px; display: flex; flex-direction: column; gap: 4px; }

    .tech-row {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: all 0.15s;
    }

    .tech-row:hover { background: var(--bg3); border-color: var(--border); }

    .tech-name {
      min-width: 320px;
      width: 320px;
      flex-shrink: 0;
      font-size: 13px;
      line-height: 1.4;
      padding-right: 12px;
    }

    .tech-laws {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
      flex: 1;
      min-width: 0;
      justify-items: center;
    }

    .tl-pill {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 20px;
      border: 1px solid;
      font-weight: 700;
      white-space: nowrap;
      text-align: center;
      width: calc(100% - 18px);
    }

    .tl-pill.tl-empty {
      visibility: hidden;
    }

    .tl-a { background: var(--law-a-bg); border-color: var(--law-a); color: var(--law-a-text); }
    .tl-b { background: var(--law-b-bg); border-color: var(--law-b); color: var(--law-b-text); }
    .tl-c { background: var(--law-c-bg); border-color: var(--law-c); color: var(--law-c-text); }
    .tl-d { background: var(--law-d-bg); border-color: var(--law-d); color: var(--law-d-text); }
    .tl-e { background: var(--law-e-bg); border-color: var(--law-e); color: var(--law-e-text); }

    /* ─── MATRIX VIEW ─── */
    .matrix-wrap {
      overflow-x: auto;
    }

    .matrix-table {
      border-collapse: collapse;
      width: 100%;
      min-width: 700px;
      font-size: 12px;
    }

    .matrix-table th {
      padding: 10px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      font-weight: 700;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .matrix-table th.law-th { font-size: 11px; writing-mode: horizontal-tb; min-width: 80px; padding: 10px 8px; text-align: center; white-space: nowrap; }
    .matrix-table th:nth-child(2) { color: var(--law-a-text); }
    .matrix-table th:nth-child(3) { color: var(--law-b-text); }
    .matrix-table th:nth-child(4) { color: var(--law-c-text); }
    .matrix-table th:nth-child(5) { color: var(--law-d-text); }
    .matrix-table th:nth-child(6) { color: var(--law-e-text); }

    .matrix-table td {
      padding: 9px 14px;
      border: 1px solid var(--border);
      vertical-align: middle;
    }

    .matrix-table tr:hover td { background: var(--bg3); }

    .matrix-table .sector-td {
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }

    .matrix-cell-yes {
      text-align: center;
    }

    .matrix-cell-yes .check-icon {
      width: 20px; height: 20px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .check-a { background: var(--law-a-bg); color: var(--law-a); border: 1px solid var(--law-a); }
    .check-b { background: var(--law-b-bg); color: var(--law-b); border: 1px solid var(--law-b); }
    .check-c { background: var(--law-c-bg); color: var(--law-c); border: 1px solid var(--law-c); }
    .check-d { background: var(--law-d-bg); color: var(--law-d); border: 1px solid var(--law-d); }
    .check-e { background: var(--law-e-bg); color: var(--law-e); border: 1px solid var(--law-e); }
    .check-no { color: var(--check-no); font-size: 14px; }

    /* ─── SEARCH RESULTS ─── */
    .search-results { display: flex; flex-direction: column; gap: 8px; }

    .search-result-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .search-result-item:hover { border-color: var(--accent); background: var(--bg3); }

    .sri-sector {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* Tech row inside search card inherits card-view alignment */
    .sri-tech-row {
      width: 100%;
      padding: 0;
      border: none;
    }
    .sri-tech-row:hover { background: transparent; border-color: transparent; }

    .sri-name-link {
      cursor: pointer;
      font-weight: 600;
    }
    .sri-name-link:hover { text-decoration: underline; }

    mark {
      background: var(--mark-bg);
      color: var(--accent);
      border-radius: 2px;
    }

    /* ─── STATS VIEW ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-title {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .bar-label {
      width: 90px;
      text-align: right;
      color: var(--text-dim);
      flex-shrink: 0;
      font-size: 11px;
    }

    .bar-track {
      flex: 1;
      background: var(--bg3);
      border-radius: 4px;
      height: 18px;
      position: relative;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 6px;
      font-size: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--bar-fill-text);
      font-weight: 700;
    }

    .bar-fill-a { background: var(--law-a); }
    .bar-fill-b { background: var(--law-b); }
    .bar-fill-c { background: var(--law-c); }
    .bar-fill-d { background: var(--law-d); }
    .bar-fill-e { background: var(--law-e); }

    .bubble-chart {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-end;
    }

    .bubble {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .bubble:hover { transform: scale(1.08); }

    .bubble-circle {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--bubble-text);
      border: 2px solid;
    }

    .bubble-name {
      font-size: 9px;
      color: var(--text-dim);
      text-align: center;
      margin-top: 4px;
      max-width: 60px;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      sidebar { position: relative; height: auto; top: 0; }
      .stats-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      /* Notice banner mobile */
      .notice-banner {
        font-size: 14px;
        font-weight: 700;
        padding: 6px 12px;
      }
      .notice-mobile { display: inline; }
      .notice-desktop { display: none; }

      /* Prevent horizontal overflow globally */
      html, body { overflow-x: hidden; max-width: 100vw; }

      /* Header full-width fix */
      header {
        width: 100%;
        min-width: 0;
        padding: 12px 16px;
        flex-wrap: wrap;
        gap: 10px;
      }
      header h1 { font-size: 15px; }
      .header-stats { gap: 12px; }
      .hstat-num { font-size: 16px; }

      /* Sidebar compact */
      .sidebar-section { padding: 10px 12px; }

      /* Main content */
      main { padding: 8px 12px; }

      /* Search results: reduce gap to main */
      .search-results { gap: 6px; }

      /* Tech row: stack vertically on mobile */
      .tech-row {
        flex-wrap: wrap;
        align-items: flex-start;
        padding: 8px 10px;
      }
      .tech-name {
        min-width: 0;
        width: 100%;
        flex: 0 0 100%;
        flex-shrink: 1;
        padding-right: 0;
        margin-bottom: 4px;
      }
      /* Law pills: 5-col grid to align with specs */
      .tech-laws {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        flex: 0 0 100%;
        width: 100%;
        min-width: 0;
        gap: 2px;
        margin-top: 2px;
        overflow: visible;
      }

      .tl-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-width: 0;
        padding: 3px 2px;
        font-size: 7px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        text-align: center;
        visibility: visible;
        opacity: 1;
        height: auto;
      }

      /* Empty pills: keep space for 5-col alignment, hide visually */
      .tl-pill.tl-empty {
        display: inline-flex;
        visibility: hidden;
        opacity: 0;
        pointer-events: none;
      }

      /* Specs accordion: full width, no spacer, 5-col grid */
      .specs-panel {
        flex-direction: column;
        padding: 0 0 8px 0;
      }
      .specs-panel-spacer {
        display: none;
      }
      .specs-panel-grid {
        width: 100%;
        grid-template-columns: repeat(5, 1fr);
      }
      .specs-col {
        font-size: 9px;
        padding: 6px 3px;
        min-height: 36px;
      }

      /* Sector header: prevent overflow */
      .sector-header {
        flex-wrap: wrap;
        padding: 14px 16px;
        gap: 12px;
      }
      .sector-header-info { min-width: 0; width: 100%; }
      .sector-header-name { font-size: 18px; }

      /* Sector header law grid: revert to grid 2-col left-aligned on mobile */
      .sector-law-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
        padding: 0;
        margin-top: 0;
        font-size: 11px;
      }
      .sector-law-grid-item {
        flex: unset;
        text-align: left;
        min-width: unset;
      }
      .sector-law-grid-item .law-name {
        text-align: left;
      }
      .sector-law-grid-item .law-scope {
        text-align: left;
      }

      /* Control bar */
      .control-bar { padding: 8px 12px; flex-wrap: wrap; }

      /* Law filter: collapsible on mobile */
      .sidebar-section:nth-of-type(3) .sidebar-label {
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        user-select: none;
      }
      .sidebar-section:nth-of-type(3) .sidebar-label::after {
        content: '▼';
        font-size: 10px;
        transition: transform 0.3s ease;
      }
      .sidebar-section:nth-of-type(3) .sidebar-label.filter-open::after {
        transform: rotate(180deg);
      }
      .sidebar-section:nth-of-type(3) .law-filter {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.35s ease;
      }
      .sidebar-section:nth-of-type(3) .law-filter.filter-open {
        max-height: 1000px;
      }

      /* View buttons: equal width on mobile */
      .view-btns {
        display: flex !important;
        width: 100%;
      }
      .view-btn {
        flex: 1;
        min-width: 0;
        font-size: 10px;
        white-space: nowrap;
        padding: 8px 2px;
      }

      /* App & main: lock width to prevent view-switch jumps */
      .app {
        max-width: 100vw;
        overflow-x: hidden;
      }
      .app > div {
        min-width: 0;
        max-width: 100vw;
        overflow-x: hidden;
      }
      main {
        max-width: 100vw;
        overflow-x: hidden;
      }

      /* Matrix wrap: fit within viewport */
      .matrix-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        width: 100%;
        max-width: 100%;
      }

      /* Matrix table: fixed layout to fit mobile screen */
      /* 7 columns: 분야(18%) + 법령5개(5×13%=65%) + 세부기술(17%) = 100% */
      .matrix-table {
        min-width: 0 !important;
        width: 100% !important;
        table-layout: fixed;
        font-size: 10px;
      }
      .matrix-table th,
      .matrix-table td {
        padding: 2px 1px;
        font-size: 10px;
      }
      .matrix-table th {
        white-space: normal;
        word-break: keep-all;
      }
      .matrix-table th:first-child,
      .matrix-table td:first-child {
        width: 18%;
        text-align: left;
      }
      .matrix-table th.law-th,
      .matrix-table td:nth-child(n+2):nth-child(-n+6) {
        width: 13%;
      }
      .matrix-table th.law-th {
        font-size: 8px;
        min-width: 0;
        padding: 2px 1px;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        white-space: nowrap;
        min-height: 60px;
        overflow: visible;
      }
      /* 세부기술 열 (7번째, 마지막) */
      .matrix-table th:last-child,
      .matrix-table td:last-child {
        width: 17%;
        text-align: center;
      }
      .matrix-table th:last-child {
        font-size: 8px;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        white-space: nowrap;
        min-height: 60px;
      }
      .matrix-table td:last-child {
        font-size: 10px;
      }
      .matrix-table .sector-td {
        font-size: 10px;
        white-space: normal;
        word-break: keep-all;
        line-height: 1.3;
      }
      .matrix-cell-yes .check-icon {
        width: 16px;
        height: 16px;
        font-size: 14px;
      }
      .matrix-cell-yes .check-no {
        font-size: 14px;
      }

      /* Search result cards: 3-row vertical layout on mobile */
      .search-result-item {
        padding: 10px 12px;
      }
      .search-result-item .sri-sector {
        font-size: 12px;
      }
      .sri-tech-row {
        padding: 0 !important;
      }

      /* Search card: pills use 5-col grid to align with specs */
      .search-result-item .tech-laws {
        display: grid !important;
        grid-template-columns: repeat(5, 1fr) !important;
        flex: none !important;
        flex-wrap: unset !important;
        overflow-x: visible !important;
        gap: 3px;
        width: 100%;
        margin-top: 4px;
      }
      /* Empty pills: keep space for alignment, just hide visually */
      .search-result-item .tl-pill.tl-empty {
        display: block !important;
        visibility: hidden;
      }
      .search-result-item .tl-pill {
        width: 100%;
        min-width: 0;
        font-size: 7px;
        padding: 3px 2px;
        text-align: center;
        flex-shrink: unset;
      }

      /* Search accordion: no spacer, 5-col grid matching pills */
      .search-result-item .specs-panel-spacer {
        display: none;
      }
      .search-result-item .specs-panel-grid {
        width: 100%;
        grid-template-columns: repeat(5, 1fr) !important;
      }
      .search-result-item .specs-col {
        font-size: 9px;
        padding: 6px 4px;
        min-height: 30px;
      }

      /* Control bar: reduce whitespace on search results */
      .control-bar {
        padding: 6px 12px !important;
        gap: 8px;
      }
      .result-count {
        font-size: 11px;
      }
      .tag-list {
        gap: 4px;
      }
      .tag {
        font-size: 9px;
        padding: 2px 6px;
      }

      /* Sector nav: collapsible on mobile */
      .sidebar-section:last-of-type .sidebar-label {
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        user-select: none;
      }
      .sidebar-section:last-of-type .sidebar-label::after {
        content: '▼';
        font-size: 10px;
        transition: transform 0.3s ease;
      }
      .sidebar-section:last-of-type .sidebar-label.sector-open::after {
        transform: rotate(180deg);
      }
      .sidebar-section:last-of-type .sector-list {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.35s ease;
      }
      .sidebar-section:last-of-type .sector-list.sector-open {
        max-height: 2000px;
      }

      /* Hide law-filter & sector-nav sections completely during search */
      body.is-searching .sidebar-section:nth-of-type(3),
      body.is-searching .sidebar-section:last-of-type {
        max-height: 0;
        padding: 0;
        overflow: hidden;
        border-bottom: none;
        transition: max-height 0.3s ease, padding 0.3s ease;
      }

      /* Hide control-bar during search (info shown inline in results) */
      body.is-searching .control-bar {
        display: none;
      }

      /* Remove min-height forcing during search to eliminate bottom whitespace */
      body.is-searching {
        min-height: unset;
      }
      body.is-searching .app {
        min-height: unset;
      }

      /* Inline search header inside main */
      .search-inline-header {
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        padding: 6px 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .search-inline-header .result-count-inline {
        font-size: 11px;
        color: var(--text-dim);
      }
      .search-inline-header .result-count-inline strong {
        color: var(--accent);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .search-inline-header .tag-list-inline {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .search-inline-header .tag-list-inline .tag {
        font-size: 9px;
        padding: 2px 6px;
      }
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state-text { font-size: 14px; }

    /* Theme toggle */
    .theme-toggle {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
      transition: all 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* Highlight filter dim */
    .tech-row.dimmed { opacity: 0.25; }
    .sector-card.dimmed { opacity: 0.3; }

    .tech-row.has-note { cursor: default; }

    /* ─── TECH NAME CLICKABLE ─── */
    .tech-name-link {
      cursor: pointer;
      transition: all 0.15s;
      border-bottom: 1px dashed transparent;
    }
    .tech-name-link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ─── LAW PILL CLICKABLE ─── */
    .tl-pill.tl-clickable {
      cursor: pointer;
      transition: all 0.15s;
    }
    /* Hover on any pill → highlight ALL pills in the row */
    .tech-laws:hover .tl-pill:not(.tl-empty) {
      transform: scale(1.08);
      filter: brightness(1.2);
    }

    /* ─── SPECS ACCORDION ─── */
    .specs-accordion {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease;
      opacity: 0;
    }
    .specs-accordion.open {
      max-height: 600px;
      opacity: 1;
    }
    .specs-panel {
      display: flex;
      padding: 0 12px 8px 12px;
    }
    .specs-panel-spacer {
      min-width: 320px;
      width: 320px;
      flex-shrink: 0;
      padding-right: 12px;
    }
    .specs-panel-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      flex: 1;
      min-width: 0;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .specs-col {
      background: var(--bg2);
      padding: 10px 8px;
      font-size: 11px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 48px;
    }
    .specs-col.specs-inactive {
      opacity: 0.3;
    }
    .specs-col.specs-bar-a { border-top: 3px solid var(--law-a); }
    .specs-col.specs-bar-b { border-top: 3px solid var(--law-b); }
    .specs-col.specs-bar-c { border-top: 3px solid var(--law-c); }
    .specs-col.specs-bar-d { border-top: 3px solid var(--law-d); }
    .specs-col.specs-bar-e { border-top: 3px solid var(--law-e); }
    .specs-col-header {
      background: var(--bg3);
      padding: 6px 4px;
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
    }
    .specs-col-header.law-col-a { color: var(--law-a-text); border-bottom: 2px solid var(--law-a); }
    .specs-col-header.law-col-b { color: var(--law-b-text); border-bottom: 2px solid var(--law-b); }
    .specs-col-header.law-col-c { color: var(--law-c-text); border-bottom: 2px solid var(--law-c); }
    .specs-col-header.law-col-d { color: var(--law-d-text); border-bottom: 2px solid var(--law-d); }
    .specs-col-header.law-col-e { color: var(--law-e-text); border-bottom: 2px solid var(--law-e); }

    /* ─── NOTE POPUP ─── */
    .note-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.15s ease;
    }
    .note-overlay.visible { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .note-popup {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: popIn 0.2s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .note-popup-close {
      position: absolute;
      top: 12px; right: 14px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.15s;
      line-height: 1;
    }
    .note-popup-close:hover { background: var(--bg3); color: var(--text); }

    .note-popup-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 14px;
      padding-right: 30px;
      line-height: 1.4;
    }

    .note-popup-body {
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-popup-empty {
      font-size: 13px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ─── SPEC TITLE LINK (clickable tech name in accordion) ─── */
    .spec-title-link {
      cursor: pointer;
      color: var(--accent);
      text-decoration: none;
      transition: all 0.15s;
      display: inline-block;
      margin-bottom: 2px;
      border-bottom: 1px dashed var(--border);
      padding-bottom: 1px;
    }
    .spec-title-link:hover {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .spec-title-plain {
      display: inline-block;
      margin-bottom: 2px;
    }
    .spec-title-link:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .spec-title-plain:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    /* ─── LAW DETAIL MODAL CONTENT ─── */
    .law-section { margin-bottom: 20px; }
    .law-section-heading {
      font-size: 14px; font-weight: 700; color: var(--accent);
      margin-bottom: 8px; padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .law-section-content {
      font-size: 13px;
      line-height: 1.8;
      color: var(--text);
      padding: 4px 0;
    }

    .law-fields-table {
      width: 100%; border-collapse: collapse; margin: 12px 0;
      font-size: 12px; text-align: center;
    }
    .law-fields-table td {
      border: 1px solid var(--border); padding: 8px 6px;
      background: transparent; color: var(--text);
      white-space: pre-line; line-height: 1.4;
    }

    .law-process-flow {
      display: flex; align-items: flex-start; gap: 4px;
      margin: 12px 0; overflow-x: auto; padding: 8px 0;
      flex-wrap: nowrap;
    }
    .law-process-arrow {
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 18px; font-weight: 700;
      min-width: 24px; padding-top: 8px;
    }
    .law-process-step {
      text-align: center; min-width: 80px; flex-shrink: 0;
    }
    .law-process-step-name {
      font-size: 12px; font-weight: 700; color: var(--text);
      padding: 6px 10px; border: 1.5px solid var(--accent);
      border-radius: 6px; margin-bottom: 4px;
      background: var(--bg3);
    }
    .law-process-step-org {
      font-size: 10px; color: var(--text-dim); line-height: 1.4;
      white-space: pre-line;
    }

    .law-tax-section { margin: 12px 0; }
    .law-tax-title {
      font-size: 13px; font-weight: 700; color: var(--text);
      margin-bottom: 8px;
    }
    .law-tax-table {
      width: 100%; border-collapse: collapse; font-size: 12px;
    }
    .law-tax-table th {
      background: var(--bg3); color: var(--accent); font-weight: 600;
      padding: 6px 8px; border: 1px solid var(--border); text-align: center;
    }
    .law-tax-table td {
      padding: 6px 8px; border: 1px solid var(--border);
      text-align: center; color: var(--text);
    }
    .law-fields-table td.law-fields-category {
      font-weight: 700;
      font-size: 13px;
      color: var(--accent);
      background: var(--bg3);
      vertical-align: middle;
      text-align: center;
      min-width: 120px;
      border: 1px solid var(--border);
      border-right: 2px solid var(--accent);
    }
    .law-tax-grid {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .law-tax-grid .law-tax-table {
      flex: 1;
      min-width: 250px;
    }
    .law-tax-label {
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
    }
    .law-tax-note {
      font-size: 11px; color: var(--text-dim); margin-bottom: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>


<header>
  <div class="header-title" onclick="goHome()">
    <div class="logo-badge">Korea Strategic Tech</div>
    <h1>국가 전략기술 <span>분류체계 현황맵</span></h1>
  </div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-num" id="h-laws">5</div>
      <div class="hstat-label">분류체계</div>
    </div>
    <div class="hstat">
      <div class="hstat-num" id="h-sectors">19</div>
      <div class="hstat-label">전략기술 분야</div>
    </div>
    <div class="hstat">
      <div class="hstat-num" id="h-subsectors">—</div>
      <div class="hstat-label">중점기술</div>
    </div>
    <div class="hstat">
      <div class="hstat-num" id="h-techs">—</div>
      <div class="hstat-label">세부기술(범주)</div>
    </div>
  </div>
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀️ 라이트 모드</button>
</header>

<div class="app">
  <sidebar>
    <!-- Search -->
    <div class="sidebar-section">
      <div class="sidebar-label">🔍 세부기술 검색</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="search-input" placeholder="기술명 검색..." />
      </div>
    </div>

    <!-- View toggle -->
    <div class="sidebar-section">
      <div class="sidebar-label">보기 방식</div>
      <div class="view-btns">
        <button class="view-btn active" onclick="setView('overview')">카드뷰</button>
        <button class="view-btn" onclick="setView('matrix')">매트릭스</button>
        <button class="view-btn" onclick="setView('stats')">통계</button>
      </div>
    </div>

    <!-- Law filters -->
    <div class="sidebar-section">
      <div class="sidebar-label">법령별 필터</div>
      <div class="law-filter" id="law-filters"></div>
    </div>

    <!-- Sector nav -->
    <div class="sidebar-section">
      <div class="sidebar-label">기술 분야 (19개)</div>
      <div class="sector-list" id="sector-nav"></div>
    </div>
  </sidebar>

  <div style="display:flex; flex-direction:column;">
    <!-- Control bar -->
    <div class="control-bar">
      <div class="result-count" id="result-count"></div>
      <div class="tag-list" id="active-tags"></div>
    </div>

    <!-- Main -->
    <main id="main-content"></main>
  </div>
</div>

<!-- Note Popup -->
<div class="note-overlay" id="note-overlay">
  <div class="note-popup" id="note-popup">
    <button class="note-popup-close" id="note-popup-close">✕</button>
    <div class="note-popup-title" id="note-popup-title"></div>
    <div class="note-popup-body" id="note-popup-body"></div>
  </div>
</div>

<script>
// ─── STATE ───
let state = {
  view: 'overview',
  activeLaws: new Set(['strategic','tax_strategic','tax_growth','advanced','protection']),
  activeSector: null,
  searchQuery: '',
  prevView: null
};

const LAW_KEYS = ['strategic','tax_strategic','tax_growth','advanced','protection'];
const LAW_CLASSES = { strategic:'a', tax_strategic:'b', tax_growth:'c', advanced:'d', protection:'e' };
const LAW_SHORT = { strategic:'국가전략기술육성법', tax_strategic:'조세특례제한법-전략', tax_growth:'조세특례제한법-신성장', advanced:'국가첨단전략산업법', protection:'산업기술보호법' };
const LAW_LONG  = { strategic:'국가전략기술육성법', tax_strategic:'조세특례제한법-국가전략기술', tax_growth:'조세특례제한법-신성장원천기술', advanced:'국가첨단전략산업법', protection:'산업기술보호법' };

// Count total techs
function countTechs() {
  let n = 0;
  TECH_DATA.sectors.forEach(s => s.subsectors.forEach(ss => { n += ss.items.length; }));
  return n;
}

function getLawColor(key) {
  const map = { strategic:'var(--law-a)', tax_strategic:'var(--law-b)', tax_growth:'var(--law-c)', advanced:'var(--law-d)', protection:'var(--law-e)' };
  return map[key];
}

function getLawBadgeClass(key) {
  return `tl-${LAW_CLASSES[key]}`;
}

function sectorLawCoverage(sector) {
  const covered = new Set();
  sector.subsectors.forEach(ss => ss.items.forEach(item => {
    LAW_KEYS.forEach(k => { if (item.laws[k]) covered.add(k); });
  }));
  return covered;
}

function techMatchesFilter(item) {
  return LAW_KEYS.some(k => state.activeLaws.has(k) && item.laws[k]);
}

function sectorMatchesFilter(sector) {
  return sector.subsectors.some(ss => ss.items.some(item => techMatchesFilter(item)));
}

// ─── HISTORY API ───
let _skipPush = false;

function getStateSnapshot() {
  return {
    view: state.view,
    activeSector: state.activeSector,
    searchQuery: state.searchQuery,
    activeLaws: [...state.activeLaws]
  };
}

function restoreStateFromSnapshot(snap) {
  if (!snap) return;
  state.view = snap.view || 'overview';
  state.activeSector = snap.activeSector || null;
  state.searchQuery = snap.searchQuery || '';
  if (snap.activeLaws) {
    state.activeLaws = new Set(snap.activeLaws);
  }
  document.getElementById('search-input').value = state.searchQuery;
  document.querySelectorAll('.view-btn').forEach((b, i) => {
    b.classList.toggle('active', ['overview','matrix','stats'][i] === state.view);
  });
  buildLawFilters();
  buildSectorNav();
  render();
}

function pushHistoryState() {
  if (_skipPush) return;
  history.pushState(getStateSnapshot(), '');
}

window.addEventListener('popstate', function(e) {
  _skipPush = true;
  restoreStateFromSnapshot(e.state);
  _skipPush = false;
});

// ─── INIT ───
function init() {
  document.getElementById('h-techs').textContent = countTechs();
  const totalSubsectors = TECH_DATA.sectors.reduce((sum, s) => sum + (s.subsectors ? s.subsectors.length : 0), 0);
  document.getElementById('h-subsectors').textContent = totalSubsectors;
  buildLawFilters();
  buildSectorNav();

  // Register initial state
  history.replaceState(getStateSnapshot(), '');

  // Strip stale hash on fresh load
  if (location.hash) history.replaceState(getStateSnapshot(), '', location.pathname + location.search);

  render();

  let _searchPushed = false;
  document.getElementById('search-input').addEventListener('input', (e) => {
    const val = e.target.value.trim();
    if (val.length >= 1 && !_searchPushed) {
      pushHistoryState();
      _searchPushed = true;
    }
    if (val.length === 0) _searchPushed = false;
    state.searchQuery = val;
    syncSearchingClass();
    render();
  });
}

function getFilterDisplayName(law) {
  if (law.id === 'tax_strategic' || law.id === 'tax_growth') {
    return '조세특례제한법';
  }
  return law.short;
}

function buildLawFilters() {
  const container = document.getElementById('law-filters');
  container.innerHTML = '';
  TECH_DATA.meta.laws.forEach(law => {
    const k = law.id;
    const cls = LAW_CLASSES[k];
    const count = TECH_DATA.sectors.reduce((acc, s) =>
      acc + s.subsectors.reduce((a2, ss) =>
        a2 + ss.items.filter(i => i.laws[k]).length, 0), 0);
    const isActive = state.activeLaws.has(k);
    const el = document.createElement('div');
    el.className = `law-chip ${isActive ? 'active-'+cls : 'inactive'}`;
    el.innerHTML = `
      <div class="law-dot" style="background:${getLawColor(k)}"></div>
      <div style="line-height:1.3;flex:1;min-width:0">
        <div style="font-weight:700;font-size:11px">${getFilterDisplayName(law)}</div>
        <div style="font-size:10px;opacity:0.7">${law.sub}</div>
      </div>
      <div class="law-chip-count">${count}</div>
      <button class="law-detail-btn law-detail-btn-${cls}" data-law-id="${k}" onclick="event.stopPropagation();openLawModal('${k}')">상세보기</button>
    `;
    el.onclick = () => {
      if (state.activeLaws.has(k)) {
        if (state.activeLaws.size > 1) state.activeLaws.delete(k);
      } else {
        state.activeLaws.add(k);
      }
      buildLawFilters();
      buildSectorNav();
      render();
    };
    container.appendChild(el);
  });
}

function buildSectorNav() {
  const container = document.getElementById('sector-nav');
  container.innerHTML = '';
  TECH_DATA.sectors.forEach(s => {
    const visible = sectorMatchesFilter(s);
    const el = document.createElement('div');
    el.className = `sector-item${state.activeSector === s.id ? ' active' : ''}`;
    const cnt = s.subsectors.reduce((a, ss) => a + ss.items.filter(i => techMatchesFilter(i)).length, 0);
    el.innerHTML = `
      <span class="sector-icon">${s.icon}</span>
      <span>${s.name}</span>
      <span class="sector-count">${cnt}</span>
    `;
    el.style.opacity = visible ? '1' : '0.3';
    el.onclick = () => {
      pushHistoryState();
      state.prevView = state.view;
      if (state.activeSector === s.id) {
        state.activeSector = null;
      } else {
        state.activeSector = s.id;
        state.view = 'overview';
      }
      state.searchQuery = '';
      document.getElementById('search-input').value = '';
      buildSectorNav();
      render();
    };
    container.appendChild(el);
  });
}

// ─── MOBILE LAW FILTER TOGGLE ───
(function() {
  const filterSection = document.querySelector('.sidebar-section:nth-of-type(3)');
  if (!filterSection) return;
  const label = filterSection.querySelector('.sidebar-label');
  const list = filterSection.querySelector('.law-filter');
  if (!label || !list) return;

  // 모바일 초기 상태: 펼쳐진 상태로 시작
  if (window.innerWidth <= 768) {
    label.classList.add('filter-open');
    list.classList.add('filter-open');
  }

  label.addEventListener('click', function(e) {
    if (window.innerWidth > 768) return;
    e.stopPropagation();
    const isOpen = list.classList.contains('filter-open');
    if (isOpen) {
      label.classList.remove('filter-open');
      list.classList.remove('filter-open');
    } else {
      label.classList.add('filter-open');
      list.classList.add('filter-open');
    }
  });
})();

// ─── MOBILE SECTOR NAV TOGGLE ───
(function() {
  const sectorSection = document.querySelector('.sidebar-section:last-of-type');
  if (!sectorSection) return;
  const label = sectorSection.querySelector('.sidebar-label');
  const list = sectorSection.querySelector('.sector-list');
  if (!label || !list) return;

  label.addEventListener('click', function(e) {
    if (window.innerWidth > 768) return;
    // Don't interfere with other click targets inside label
    e.stopPropagation();
    const isOpen = list.classList.contains('sector-open');
    if (isOpen) {
      label.classList.remove('sector-open');
      list.classList.remove('sector-open');
    } else {
      label.classList.add('sector-open');
      list.classList.add('sector-open');
    }
  });
})();

function setView(v) {
  pushHistoryState();
  state.view = v;
  state.activeSector = null;
  state.searchQuery = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.view-btn').forEach((b, i) => {
    b.classList.toggle('active', ['overview','matrix','stats'][i] === v);
  });
  buildSectorNav();
  render();
}

// ─── RENDER ───
function syncSearchingClass() {
  if (window.innerWidth <= 768 && state.searchQuery.length >= 1) {
    document.body.classList.add('is-searching');
  } else {
    document.body.classList.remove('is-searching');
  }
}

function render() {
  syncSearchingClass();
  const main = document.getElementById('main-content');
  const rcDiv = document.getElementById('result-count');
  const tagDiv = document.getElementById('active-tags');

  // Active tags
  tagDiv.innerHTML = '';
  state.activeLaws.forEach(k => {
    const tag = document.createElement('span');
    const cls = LAW_CLASSES[k];
    tag.className = `tag tag-${cls}`;
    tag.textContent = LAW_LONG[k];
    tag.onclick = () => {
      if (state.activeLaws.size > 1) {
        state.activeLaws.delete(k);
        buildLawFilters();
        buildSectorNav();
        render();
      }
    };
    tagDiv.appendChild(tag);
  });

  if (state.searchQuery.length >= 1) {
    renderSearch(main, rcDiv);
  } else if (state.activeSector && state.view === 'overview') {
    renderDetail(main, rcDiv);
  } else if (state.view === 'matrix') {
    renderMatrix(main, rcDiv);
  } else if (state.view === 'stats') {
    renderStats(main, rcDiv);
  } else {
    renderOverview(main, rcDiv);
  }
}

function renderOverview(main, rcDiv) {
  const sectors = TECH_DATA.sectors.filter(s => sectorMatchesFilter(s));
  const totalTechs = sectors.reduce((a, s) => a + s.subsectors.reduce((a2, ss) => a2 + ss.items.filter(i => techMatchesFilter(i)).length, 0), 0);
  rcDiv.innerHTML = `표시 중: <strong>${sectors.length}</strong>개 분야 · <strong>${totalTechs}</strong>개 세부기술`;

  main.innerHTML = `<div class="overview-grid" id="cards-grid"></div>`;
  const grid = document.getElementById('cards-grid');

  sectors.forEach(s => {
    const coverage = sectorLawCoverage(s);
    const filteredCount = s.subsectors.reduce((a, ss) => a + ss.items.filter(i => techMatchesFilter(i)).length, 0);
    const card = document.createElement('div');
    card.className = 'sector-card';
    const dots = LAW_KEYS.map(k => {
      const cls = coverage.has(k) ? `on-${LAW_CLASSES[k]}` : 'off';
      return `<div class="card-dot ${cls}" title="${LAW_SHORT[k]}"></div>`;
    }).join('');
    card.innerHTML = `
      <div class="card-id">No.${String(s.id).padStart(2,'0')}</div>
      <div class="card-icon">${s.icon}</div>
      <div class="card-name">${s.name}</div>
      <div class="card-law-dots">${dots}</div>
      <div class="card-sub-count">세부기술 ${filteredCount}개</div>
      <div class="card-coverage">${coverage.size}/5 법령 적용</div>
    `;
    card.onclick = () => {
      pushHistoryState();
      state.prevView = state.view;
      state.activeSector = s.id;
      buildSectorNav();
      render();
    };
    grid.appendChild(card);
  });
}

function renderDetail(main, rcDiv) {
  const sector = TECH_DATA.sectors.find(s => s.id === state.activeSector);
  if (!sector) return;

  const filteredTechs = sector.subsectors.flatMap(ss => ss.items.filter(i => techMatchesFilter(i)));
  rcDiv.innerHTML = `<strong>${sector.icon} ${sector.name}</strong> · 세부기술 <strong>${filteredTechs.length}</strong>개`;

  const coverage = sectorLawCoverage(sector);
  const badges = LAW_KEYS.filter(k => coverage.has(k)).map(k => {
    const cls = LAW_CLASSES[k];
    return `<span class="law-badge tl-${cls}">${LAW_LONG[k]}</span>`;
  }).join('');

  main.innerHTML = `
    <div class="sector-detail">
      <div class="sector-header">
        <div class="sector-header-icon">${sector.icon}</div>
        <div class="sector-header-info">
          <div class="sector-header-name">No.${sector.id} ${sector.name}</div>
          <div class="law-badges">${badges}</div>
        </div>
        <button class="back-btn" onclick="goBackToList()">← 목록</button>
      </div>
      <div class="sector-law-grid">
        ${LAW_KEYS.map(k => {
          const val = sector.laws[k];
          return `<div class="sector-law-grid-item">
            <span class="law-name" style="color:${getLawColor(k)}">${LAW_LONG[k]}</span>
            <span class="law-scope">${val || '-'}</span>
          </div>`;
        }).join('')}
      </div>
      <div id="subsectors-container"></div>
    </div>
  `;

  const container = document.getElementById('subsectors-container');
  sector.subsectors.forEach(ss => {
    const visibleItems = ss.items.filter(i => techMatchesFilter(i));
    if (visibleItems.length === 0) return;
    const block = document.createElement('div');
    block.className = 'subsector-block';
    block.innerHTML = `
      <div class="subsector-title">
        <span>▸</span>${ss.name}
        <span style="margin-left:auto;font-size:10px;font-weight:400;color:var(--text-dim)">${visibleItems.length}개</span>
        <span class="subsector-toggle-arrow" style="cursor:pointer;user-select:none;" title="전체 펼침/접힘">▼</span>
      </div>
      <div class="subsector-items"></div>
    `;
    const itemsContainer = block.querySelector('.subsector-items');
    visibleItems.forEach(item => {
      const row = document.createElement('div');
      row.className = 'tech-row' + (item.note ? ' has-note' : '');
      const hasSpecs = item.specs && LAW_KEYS.some(k => item.specs[k]);
      const pills = LAW_KEYS.map(k => {
        const active = item.laws[k] && state.activeLaws.has(k);
        return active
          ? `<span class="tl-pill tl-${LAW_CLASSES[k]}${hasSpecs ? ' tl-clickable' : ''}" data-law="${k}">${LAW_SHORT[k]}</span>`
          : `<span class="tl-pill tl-empty">${LAW_SHORT[k]}</span>`;
      }).join('');
      row.innerHTML = `
        <div class="tech-name"><span class="tech-name-link">${item.name}</span></div>
        <div class="tech-laws">${pills}</div>
      `;
      // Tech name click → popup only
      row.querySelector('.tech-name-link').addEventListener('click', (e) => {
        e.stopPropagation();
        showNotePopup(item.name, item.note);
      });
      // Law pill click → accordion toggle
      if (hasSpecs) {
        row.querySelectorAll('.tl-clickable').forEach(pill => {
          pill.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleSpecsAccordion(row, item);
          });
        });
      }
      itemsContainer.appendChild(row);
    });
    // 중점기술 제목 클릭 → 하위 세부기술 전체 아코디언 펼침/접힘
    const arrow = block.querySelector('.subsector-toggle-arrow');
    let allExpanded = false;
    arrow.addEventListener('click', (e) => {
      e.stopPropagation();
      const items = block.querySelector('.subsector-items');
      const rows = items.querySelectorAll('.tech-row');

      if (allExpanded) {
        // 모두 접기: 열려있는 아코디언 모두 제거
        items.querySelectorAll('.specs-accordion').forEach(acc => {
          acc.classList.remove('open');
          setTimeout(() => acc.remove(), 350);
        });
        arrow.textContent = '▼';
        allExpanded = false;
      } else {
        // 모두 펼치기: 아코디언이 없는 tech-row에 대해 열기
        rows.forEach(row => {
          const next = row.nextElementSibling;
          const hasAccordion = next && next.classList.contains('specs-accordion');
          if (!hasAccordion) {
            const nameEl = row.querySelector('.tech-name-link');
            if (nameEl) {
              const itemName = nameEl.textContent;
              const matchedItem = visibleItems.find(it => it.name === itemName);
              if (matchedItem) {
                const hasSpecs = matchedItem.specs && LAW_KEYS.some(k => matchedItem.specs[k]);
                if (hasSpecs) {
                  toggleSpecsAccordion(row, matchedItem);
                }
              }
            }
          }
        });
        arrow.textContent = '▲';
        allExpanded = true;
      }
    });

    container.appendChild(block);
  });
}

function renderMatrix(main, rcDiv) {
  const sectors = TECH_DATA.sectors.filter(s => sectorMatchesFilter(s));
  rcDiv.innerHTML = `매트릭스 뷰: <strong>${sectors.length}</strong>개 분야 × <strong>5</strong>개 법령`;

  const lawHeaders = LAW_KEYS.map(k =>
    `<th class="law-th">${LAW_SHORT[k]}</th>`
  ).join('');

  let rows = '';
  sectors.forEach(s => {
    const coverage = sectorLawCoverage(s);
    const cells = LAW_KEYS.map((k, i) => {
      const cls = LAW_CLASSES[k];
      const on = coverage.has(k);
      if (!on) return `<td class="matrix-cell-yes"><span class="check-no">·</span></td>`;
      return `<td class="matrix-cell-yes"><div class="check-icon check-${cls}">✓</div></td>`;
    }).join('');
    const cnt = s.subsectors.reduce((a, ss) => a + ss.items.filter(i => techMatchesFilter(i)).length, 0);
    rows += `
      <tr style="cursor:pointer" onclick="pushHistoryState();state.prevView='matrix';state.activeSector=${s.id};state.view='overview';buildSectorNav();render()">
        <td class="sector-td">${s.icon} ${s.name}</td>
        ${cells}
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);text-align:center">${cnt}</td>
      </tr>
    `;
  });

  main.innerHTML = `
    <div class="matrix-wrap">
      <table class="matrix-table">
        <thead>
          <tr>
            <th style="text-align:left">분야</th>
            ${lawHeaders}
            <th class="law-th" style="color:var(--accent)">세부기술</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function renderStats(main, rcDiv) {
  rcDiv.innerHTML = `통계 · 전체 <strong>${countTechs()}</strong>개 세부기술`;

  // Compute per-law sector coverage counts
  const lawSectorCounts = {};
  const lawTechCounts = {};
  LAW_KEYS.forEach(k => {
    lawSectorCounts[k] = TECH_DATA.sectors.filter(s => s.subsectors.some(ss => ss.items.some(i => i.laws[k]))).length;
    lawTechCounts[k] = TECH_DATA.sectors.reduce((a,s) => a + s.subsectors.reduce((a2,ss) => a2 + ss.items.filter(i=>i.laws[k]).length, 0), 0);
  });

  // sector coverage counts
  const sectorCoverage = TECH_DATA.sectors.map(s => {
    const cov = sectorLawCoverage(s);
    const cnt = s.subsectors.reduce((a, ss) => a + ss.items.length, 0);
    return { ...s, lawCount: cov.size, techCount: cnt };
  }).sort((a, b) => b.techCount - a.techCount);

  const maxTech = Math.max(...sectorCoverage.map(s => s.techCount));

  const lawBars = LAW_KEYS.map(k => {
    const pct = Math.round(lawTechCounts[k] / countTechs() * 100);
    const cls = LAW_CLASSES[k];
    return `
      <div class="bar-row">
        <div class="bar-label">${LAW_SHORT[k]}</div>
        <div class="bar-track">
          <div class="bar-fill bar-fill-${cls}" style="width:${pct}%">${lawTechCounts[k]}</div>
        </div>
      </div>
    `;
  }).join('');

  const sectorBars = sectorCoverage.slice(0,10).map(s => {
    const pct = Math.round(s.techCount / maxTech * 100);
    return `
      <div class="bar-row">
        <div class="bar-label" style="font-size:10px">${s.icon} ${s.name}</div>
        <div class="bar-track">
          <div class="bar-fill bar-fill-a" style="width:${pct}%;background:linear-gradient(90deg,var(--law-a),var(--law-b))">${s.techCount}</div>
        </div>
      </div>
    `;
  }).join('');

  // Bubble: law count × tech count
  const bubbles = sectorCoverage.map(s => {
    const size = 24 + (s.techCount / maxTech) * 40;
    return `
      <div class="bubble" onclick="pushHistoryState();state.prevView='stats';state.activeSector=${s.id};state.view='overview';buildSectorNav();render()" title="${s.name}: ${s.techCount}개 세부기술, ${s.lawCount}개 법령">
        <div class="bubble-circle" style="width:${size}px;height:${size}px;border-color:${getLawColor(LAW_KEYS[s.lawCount-1]||'strategic')};background:${getLawColor(LAW_KEYS[s.lawCount-1]||'strategic')}22">${s.techCount}</div>
        <div class="bubble-name">${s.icon} ${s.name}</div>
      </div>
    `;
  }).join('');

  // Law overlap
  const both = {};
  LAW_KEYS.forEach((k1,i) => LAW_KEYS.slice(i+1).forEach(k2 => {
    const cnt = TECH_DATA.sectors.reduce((a,s) => a + s.subsectors.reduce((a2,ss) => a2 + ss.items.filter(i=>i.laws[k1]&&i.laws[k2]).length, 0), 0);
    if (cnt > 0) both[`${LAW_LONG[k1]} + ${LAW_LONG[k2]}`] = cnt;
  }));
  const overlapSorted = Object.entries(both).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxOverlap = overlapSorted.length > 0 ? overlapSorted[0][1] : 1;
  const overlapRows = overlapSorted.map(([pair, cnt]) => {
    const pct = Math.round(cnt / maxOverlap * 100);
    return `<div class="bar-row"><div class="bar-label" style="width:200px;font-size:10px">${pair}</div><div class="bar-track"><div class="bar-fill bar-fill-b" style="width:${pct}%">${cnt}</div></div></div>`;
  }).join('');

  main.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-title">법령별 세부기술 수</div>
        ${lawBars}
      </div>
      <div class="stat-card">
        <div class="stat-title">분야별 세부기술 수 (Top 10)</div>
        ${sectorBars}
      </div>
      <div class="stat-card" style="grid-column:1/-1">
        <div class="stat-title">분야별 세부기술 규모 (버블 크기 = 세부기술 수, 클릭 = 상세보기)</div>
        <div class="bubble-chart">${bubbles}</div>
      </div>
      <div class="stat-card" style="grid-column:1/-1">
        <div class="stat-title">법령 간 중복 적용 세부기술 수</div>
        ${overlapRows}
      </div>
    </div>
  `;
}

function renderSearch(main, rcDiv) {
  const q = state.searchQuery.toLowerCase();
  const keywords = q.split(/\s+/).filter(k => k.length > 0);
  const results = [];
  TECH_DATA.sectors.forEach(s => {
    s.subsectors.forEach(ss => {
      ss.items.forEach(item => {
        if (!techMatchesFilter(item)) return;
        const nameL = item.name.toLowerCase();
        const ssL = ss.name.toLowerCase();
        const noteL = (item.note || '').toLowerCase();
        const specsL = item.specs ? LAW_KEYS.map(k => (item.specs[k] || '')).join(' ').toLowerCase() : '';
        if (keywords.some(kw => nameL.includes(kw) || ssL.includes(kw) || noteL.includes(kw) || specsL.includes(kw))) {
          results.push({ sector: s, subsector: ss, item });
        }
      });
    });
  });

  rcDiv.innerHTML = `검색 "<strong>${state.searchQuery}</strong>" · <strong>${results.length}</strong>개 결과`;

  // Build inline header for mobile (control-bar is hidden via CSS)
  let inlineHeaderHTML = '';
  if (window.innerWidth <= 768) {
    const tagSpans = [];
    state.activeLaws.forEach(k => {
      const cls = LAW_CLASSES[k];
      tagSpans.push(`<span class="tag tag-${cls}">${LAW_SHORT[k]}</span>`);
    });
    inlineHeaderHTML = `<div class="search-inline-header">
      <div class="result-count-inline">검색 "<strong>${state.searchQuery}</strong>" · <strong>${results.length}</strong>개 결과</div>
      <div class="tag-list-inline">${tagSpans.join('')}</div>
    </div>`;
  }

  if (results.length === 0) {
    main.innerHTML = inlineHeaderHTML + `<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">검색 결과가 없습니다.</div></div>`;
    return;
  }

  const container = document.createElement('div');
  container.className = 'search-results';

  results.forEach(r => {
    const hlPattern = keywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
    const highlight = (s) => s.replace(new RegExp(`(${hlPattern})`, 'gi'), '<mark>$1</mark>');
    const hasSpecs = r.item.specs && LAW_KEYS.some(k => r.item.specs[k]);
    const pills = LAW_KEYS.map(k => {
      const active = r.item.laws[k] && state.activeLaws.has(k);
      return active
        ? `<span class="tl-pill tl-${LAW_CLASSES[k]}${hasSpecs ? ' tl-clickable' : ''}" data-law="${k}">${LAW_SHORT[k]}</span>`
        : `<span class="tl-pill tl-empty">${LAW_SHORT[k]}</span>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'search-result-item';

    // Sector label row
    const sectorLabel = document.createElement('div');
    sectorLabel.className = 'sri-sector';
    sectorLabel.innerHTML = `${r.sector.icon} ${r.sector.name}`;
    card.appendChild(sectorLabel);

    // Tech row (same structure as card view for alignment)
    const techRow = document.createElement('div');
    techRow.className = 'tech-row sri-tech-row';
    techRow.innerHTML = `
      <div class="tech-name"><span class="tech-name-link sri-name-link">${highlight(r.item.name)}</span></div>
      <div class="tech-laws">${pills}</div>
    `;
    card.appendChild(techRow);

    // Helper: navigate to sector + scroll to subsector
    function goToSubsector() {
      pushHistoryState();
      state.activeSector = r.sector.id;
      state.searchQuery = '';
      document.getElementById('search-input').value = '';
      state.view = 'overview';
      buildSectorNav();
      render();
      setTimeout(() => {
        const titles = document.querySelectorAll('.subsector-title');
        for (const t of titles) {
          if (t.textContent.includes(r.subsector.name)) {
            t.scrollIntoView({ behavior: 'smooth', block: 'start' });
            break;
          }
        }
      }, 100);
    }

    // Tech name click → navigate to sector detail + scroll to subsector
    techRow.querySelector('.sri-name-link').addEventListener('click', (e) => {
      e.stopPropagation();
      goToSubsector();
    });

    // Law pill click → toggle specs accordion (inserted after techRow, inside card)
    if (hasSpecs) {
      techRow.querySelectorAll('.tl-clickable').forEach(pill => {
        pill.addEventListener('click', (e) => {
          e.stopPropagation();
          // Close any other open search accordion
          const existingAcc = container.querySelector('.specs-accordion');
          if (existingAcc && existingAcc.parentElement !== card) {
            existingAcc.classList.remove('open');
            setTimeout(() => existingAcc.remove(), 350);
          }
          toggleSpecsAccordion(techRow, r.item);
        });
      });
    }

    // Card click (background area) → navigate
    card.addEventListener('click', (e) => {
      // Don't navigate if clicking inside tech-row (pills handle their own)
      if (e.target.closest('.tech-row')) return;
      goToSubsector();
    });

    container.appendChild(card);
  });

  main.innerHTML = inlineHeaderHTML;
  main.appendChild(container);
}

// ─── SPEC TEXT PARSER (기술명 축약 + 팝업 상세보기) ───

// ▶(세부기술명) 설명 파싱 - 중첩 괄호 지원
function parseBulletLine(line) {
  if (!line.startsWith('▶(')) return null;

  let depth = 0;
  let nameEnd = -1;
  for (let i = 1; i < line.length; i++) {
    if (line[i] === '(') depth++;
    else if (line[i] === ')') {
      depth--;
      if (depth === 0) {
        nameEnd = i;
        break;
      }
    }
  }

  if (nameEnd < 0) return null;

  const subName = line.substring(2, nameEnd); // 괄호 안 내용
  const subDesc = line.substring(nameEnd + 1).trim();
  return { subName, subDesc };
}

// 스펙 텍스트를 "기술명"과 "전체 설명"으로 분리하여 HTML 생성
function formatSpecContent(specVal, lawKey) {
  if (!specVal) return '';

  // ── strategic(국가전략기술육성법) 전용 처리 ──
  if (lawKey === 'strategic') {
    const lines = specVal.split('\n');

    // Step 1: <분야> 헤더 분리
    let header = null;
    let contentLines = lines;
    if (lines.length > 0 && /^<[^>]+>\s*$/.test(lines[0].trim())) {
      header = lines[0].trim();
      contentLines = lines.slice(1);
    }

    if (contentLines.length === 0) return '';

    // Step 2: ▶ 이전의 행들을 합쳐서 타이틀 라인 재구성
    // (괄호 리스트가 줄바꿈되어 여러 행에 걸친 경우 대응)
    let titleLineRaw = '';
    let bulletStartIdx = 0;
    for (let i = 0; i < contentLines.length; i++) {
      if (contentLines[i].trim().startsWith('▶')) {
        bulletStartIdx = i;
        break;
      }
      titleLineRaw += (i > 0 ? ' ' : '') + contentLines[i].trim();
      bulletStartIdx = i + 1;
    }

    const firstLine = titleLineRaw;
    const colonIdx = findMainColon(firstLine);

    if (colonIdx > 0) {
      const titleWithSubs = firstLine.substring(0, colonIdx).trim();
      const descAfterColon = firstLine.substring(colonIdx + 1).trim();

      // 순수 기술명 (첫 번째 괄호 앞까지)
      const parenIdx = titleWithSubs.indexOf('(');
      const pureName = parenIdx > 0 ? titleWithSubs.substring(0, parenIdx).trim() : titleWithSubs;

      // 기술명설명에서 "(기술명) " 접두어 제거
      const mainDesc = descAfterColon.replace(/^\([^)]*\)\s*/, '');

      // 표시용 제목: 헤더가 있으면 "<분야>\n기술명"
      const displayTitle = header ? header + '\n' + pureName + ' 기술 中' : pureName + ' 기술 中';

      const parts = [];
      // 기술명 항목
      parts.push({
        title: displayTitle,
        fullText: mainDesc,
        hasDetail: mainDesc.length > 0
      });

      // ▶ 불릿 항목들
      for (let i = bulletStartIdx; i < contentLines.length; i++) {
        const line = contentLines[i].trim();
        if (!line) continue;

        const parsed = parseBulletLine(line);
        if (parsed) {
          parts.push({
            title: '▶' + parsed.subName,
            fullText: parsed.subDesc,
            hasDetail: parsed.subDesc.length > 0
          });
        } else if (line.startsWith('▶')) {
          // 괄호 없는 ▶ 불릿
          parts.push({ title: line, fullText: line, hasDetail: false });
        }
        // ▶로 시작하지 않는 행은 무시 (이전 항목의 continuation)
      }

      return parts;
    }
    // 콜론이 없으면 아래 기존 로직으로 fallthrough
  }

  // ── 기존 로직 (조특법 등 다른 법령용) ──
  const normalized = specVal.replace(/▶/g, '\n▶').replace(/^\n/, '');
  const rawLines = normalized.split('\n').filter(l => l.trim());

  if (rawLines.length === 0) return '';

  // Step 1: 섹션 헤더(<xxx>) 감지 및 분리
  // <xxx 분야> 등의 헤더는 별도 라벨로 취급하고, 뒤따르는 행들을 실제 콘텐츠로 처리
  const processedLines = [];
  let currentHeader = null;

  for (let i = 0; i < rawLines.length; i++) {
    const trimmed = rawLines[i].trim();
    // <xxx> 패턴으로만 이루어진 행 = 섹션 헤더
    if (/^<[^>]+>\s*$/.test(trimmed)) {
      currentHeader = trimmed;
      continue; // 헤더 자체는 별도 항목으로 만들지 않음
    }
    // 헤더가 있으면 현재 행 앞에 붙임
    if (currentHeader) {
      processedLines.push({ text: trimmed, header: currentHeader });
      currentHeader = null;
    } else {
      processedLines.push({ text: trimmed, header: null });
    }
  }

  // Step 2: ▶ 기준 그룹핑 (▶로 시작하지 않는 연속 행은 이전 그룹에 병합)
  const groups = [];
  for (let i = 0; i < processedLines.length; i++) {
    const item = processedLines[i];
    if (item.text.startsWith('▶') || groups.length === 0) {
      groups.push({ text: item.text, header: item.header });
    } else {
      // 이전 그룹에 병합
      groups[groups.length - 1].text += '\n' + item.text;
    }
  }

  // Step 3: 각 그룹에서 콜론 기준으로 기술명/설명 분리
  const parts = groups.map(group => {
    const firstLine = group.text.split('\n')[0];
    const colonIdx = findMainColon(firstLine);
    const headerPrefix = group.header ? group.header + '\n' : '';

    if (colonIdx > 0) {
      const title = firstLine.substring(0, colonIdx).trim();
      const displayTitle = headerPrefix ? headerPrefix + title : title;
      const fullText = group.text;
      return { title: displayTitle, fullText, hasDetail: true };
    } else {
      const displayTitle = headerPrefix ? headerPrefix + group.text : group.text;
      return { title: displayTitle, fullText: group.text, hasDetail: false };
    }
  });

  return parts;
}

// 메인 콜론 위치 찾기: "기술명: 설명" 패턴의 구분 콜론
function findMainColon(text) {
  let depth = 0;
  for (let i = 0; i < text.length - 1; i++) {
    const ch = text[i];
    if (ch === '(' || ch === '（' || ch === '[' || ch === '［') depth++;
    else if (ch === ')' || ch === '）' || ch === ']' || ch === '］') depth--;
    else if (ch === ':' || ch === '：') {
      if (depth === 0 && i > 5) {
        const next = text[i + 1];
        // 일반 공백, 전각 공백, 줄바꿈, 또는 문자열 끝 모두 허용
        if (next === ' ' || next === '\u3000' || next === '\n' || next === '\r' || next === undefined) {
          return i;
        }
      }
    }
  }
  return -1;
}

// ─── SPECS ACCORDION ───
function toggleSpecsAccordion(row, item) {
  const isMobile = window.innerWidth <= 768;

  // If this row already has an open accordion, close it (toggle)
  const existing = row.nextElementSibling;
  if (existing && existing.classList.contains('specs-accordion')) {
    existing.classList.remove('open');
    setTimeout(() => existing.remove(), 350);
    return;
  }

  // Mobile: close all other open accordions first (single expand)
  if (isMobile) {
    document.querySelectorAll('.specs-accordion.open').forEach(acc => {
      acc.classList.remove('open');
      setTimeout(() => acc.remove(), 350);
    });
  }

  // Build accordion panel
  const accordion = document.createElement('div');
  accordion.className = 'specs-accordion';

  const cells = LAW_KEYS.map(k => {
    const cls = LAW_CLASSES[k];
    const isActive = item.laws[k];
    const specVal = item.specs ? item.specs[k] : null;
    let content = '';

    if (specVal) {
      const parts = formatSpecContent(specVal, k);
      if (Array.isArray(parts)) {
        content = parts.map((p, idx) => {
          if (p.hasDetail) {
            return `<span class="spec-title-link" data-spec-idx="${idx}" data-law="${k}">${p.title.replace(/\n/g, '<br>')}</span>`;
          } else {
            return `<span class="spec-title-plain">${p.title}</span>`;
          }
        }).join('<br>');
      } else {
        content = parts;
      }
    }

    return `<div class="specs-col specs-bar-${cls}${isActive ? '' : ' specs-inactive'}">${content || ''}</div>`;
  }).join('');

  accordion.innerHTML = `
    <div class="specs-panel">
      <div class="specs-panel-spacer"></div>
      <div class="specs-panel-grid">
        ${cells}
      </div>
    </div>
  `;

  // 기술명 클릭 → 팝업으로 상세 설명 표시
  accordion.querySelectorAll('.spec-title-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.stopPropagation();
      const lawKey = link.getAttribute('data-law');
      const idx = parseInt(link.getAttribute('data-spec-idx'));
      const specVal = item.specs[lawKey];
      const parts = formatSpecContent(specVal, lawKey);
      if (parts && parts[idx]) {
        const p = parts[idx];
        // fullText의 첫 번째 줄에서 findMainColon으로 콜론 위치를 찾아 설명만 추출
        const firstLine = p.fullText.split('\n')[0];
        const colonIdx = findMainColon(firstLine);
        let bodyText = p.fullText;
        if (colonIdx > 0) {
          // 콜론 + 공백 이후부터 추출 (첫 번째 줄의 콜론 이후 + 나머지 줄 전체)
          const afterColon = firstLine.substring(colonIdx + 1).replace(/^[\s\u3000]+/, '');
          const remainingLines = p.fullText.split('\n').slice(1).join('\n');
          bodyText = remainingLines ? afterColon + '\n' + remainingLines : afterColon;
        }
        // "(기술명) " 접두어 제거: 본문 시작이 "(xxx) "인 경우 제거
        bodyText = bodyText.replace(/^\([^)]+\)\s*/, '');
        const popupTitle = p.title.replace(/ 기술 中$/m, '');
        showNotePopup(popupTitle, bodyText);
      }
    });
  });
