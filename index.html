<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국가전략기술 3D Map</title>
  <script src="data.js"></script>
  <style>
    :root{
      --bg-top:#081624;
      --bg-bottom:#09111b;
      --panel:rgba(9,20,34,.88);
      --panel-strong:rgba(9,20,34,.96);
      --panel-soft:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.12);
      --border-strong:rgba(255,255,255,.22);
      --text:#eff7ff;
      --muted:#9db2c8;
      --accent:#87d7ff;
      --accent-2:#d7f3ff;
      --shadow:0 22px 70px rgba(0,0,0,.32);
      --radius:22px;
      --topbar-h:112px;
      --panel-width:440px;
      --safe:env(safe-area-inset-bottom,0px);
      --font: Inter, "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }
    body.light-mode{
      --bg-top:#eef6ff;
      --bg-bottom:#dfeaf6;
      --panel:rgba(252,254,255,.84);
      --panel-strong:rgba(255,255,255,.96);
      --panel-soft:rgba(31,88,142,.06);
      --border:rgba(17,63,109,.14);
      --border-strong:rgba(17,63,109,.22);
      --text:#10263c;
      --muted:#55718c;
      --accent:#1878c8;
      --accent-2:#0d4d84;
      --shadow:0 22px 60px rgba(18,57,95,.13);
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;font-family:var(--font);color:var(--text);background:
      radial-gradient(circle at 16% 14%, rgba(104,196,255,.18), transparent 28%),
      radial-gradient(circle at 82% 18%, rgba(180,134,255,.16), transparent 24%),
      radial-gradient(circle at 50% 84%, rgba(0,228,255,.10), transparent 34%),
      linear-gradient(180deg,var(--bg-top) 0%, var(--bg-bottom) 100%);
    }
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none; opacity:.32;
      background:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 42px 42px, 42px 42px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.8), rgba(0,0,0,.25));
    }
    body.light-mode::before{opacity:.18}
    #app{position:fixed; inset:0}
    #sceneCanvas{display:block; width:100%; height:100%; outline:none; touch-action:none}
    .screen-grad{
      position:fixed; inset:0; pointer-events:none;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,.08), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 28%, transparent 72%, rgba(255,255,255,.02));
    }
    .topbar{
      position:fixed; left:18px; right:18px; top:18px; z-index:20;
      display:grid; grid-template-columns:minmax(240px,1fr) minmax(320px,1.1fr) auto;
      gap:14px; align-items:stretch; pointer-events:none;
    }
    .glass{
      background:linear-gradient(180deg, var(--panel), rgba(9,20,34,.70));
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border:1px solid var(--border); box-shadow:var(--shadow); border-radius:var(--radius);
      pointer-events:auto;
    }
    body.light-mode .glass{background:linear-gradient(180deg,var(--panel), rgba(255,255,255,.72))}
    .brand{
      padding:16px 18px; min-height:110px; display:flex; flex-direction:column; justify-content:center; gap:10px;
    }
    .eyebrow{
      font-size:11px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--accent);
    }
    .title-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
    .title-row h1{margin:0; font-size:clamp(22px,2.4vw,32px); font-weight:900; letter-spacing:-.035em; line-height:1.05}
    .chip{
      padding:8px 12px; border-radius:999px; font-size:12px; font-weight:800;
      background:rgba(135,215,255,.12); border:1px solid rgba(135,215,255,.18); color:var(--accent-2);
      white-space:nowrap;
    }
    body.light-mode .chip{background:rgba(24,120,200,.08); border-color:rgba(24,120,200,.14)}
    .summary{
      padding:12px; min-height:110px; display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px;
    }
    .metric{
      padding:14px 16px; border-radius:16px; background:linear-gradient(180deg,var(--panel-soft), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08); min-width:0; display:flex; flex-direction:column; justify-content:center; gap:8px;
    }
    body.light-mode .metric{border-color:rgba(17,63,109,.08)}
    .metric .label{font-size:11px; font-weight:800; letter-spacing:.11em; text-transform:uppercase; color:var(--muted)}
    .metric .value{font-size:clamp(16px,1.5vw,24px); font-weight:900; letter-spacing:-.03em; line-height:1.05}
    .controls{
      min-width:180px; padding:12px; display:flex; flex-direction:column; gap:10px; justify-content:center;
    }
    .controls-row{display:flex; gap:10px}
    .action-btn{
      flex:1; height:44px; border-radius:14px; border:1px solid var(--border); background:rgba(255,255,255,.06);
      color:var(--text); font:inherit; font-size:13px; font-weight:800; cursor:pointer; transition:.2s ease;
    }
    .action-btn:hover{transform:translateY(-1px); border-color:rgba(135,215,255,.34); box-shadow:0 10px 24px rgba(28,89,150,.12)}
    .search-wrap{
      position:fixed; z-index:22; left:50%; transform:translateX(-50%); top:144px;
      width:min(520px, calc(100vw - 36px)); pointer-events:auto;
    }
    .search-box{
      display:flex; align-items:center; gap:12px; padding:0 14px; height:56px;
    }
    .search-box svg{width:18px; height:18px; color:var(--muted); flex:0 0 auto}
    .search-input{
      flex:1; min-width:0; border:none; outline:none; background:transparent; color:var(--text); font:inherit;
      font-size:15px; font-weight:700;
    }
    .search-input::placeholder{color:var(--muted); font-weight:600}
    .labels-layer{position:fixed; inset:0; z-index:12; pointer-events:none}
    .sector-label{
      position:absolute; transform:translate(-50%, -50%); min-width:116px; max-width:160px;
      padding:10px 12px 11px; border-radius:16px; border:1px solid rgba(255,255,255,.14);
      background:rgba(8,19,31,.70); box-shadow:0 14px 34px rgba(0,0,0,.22);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      text-align:center; pointer-events:auto; cursor:pointer; transition:.18s ease; user-select:none;
    }
    body.light-mode .sector-label{background:rgba(255,255,255,.80); border-color:rgba(17,63,109,.12)}
    .sector-label:hover,.sector-label.active{transform:translate(-50%, -53%); border-color:rgba(255,255,255,.28)}
    .sector-label .name{font-size:14px; font-weight:900; line-height:1.18; letter-spacing:-.025em}
    .sector-label .meta{margin-top:5px; font-size:11px; font-weight:800; color:var(--muted)}
    .tooltip{
      position:fixed; z-index:30; pointer-events:none; opacity:0; transform:translate3d(0,8px,0);
      min-width:160px; max-width:260px; padding:12px 14px; border-radius:16px; border:1px solid rgba(255,255,255,.14);
      background:rgba(8,19,31,.92); box-shadow:var(--shadow); backdrop-filter: blur(14px); transition:.12s ease;
    }
    body.light-mode .tooltip{background:rgba(255,255,255,.94); border-color:rgba(17,63,109,.14)}
    .tooltip.visible{opacity:1; transform:translate3d(0,0,0)}
    .tooltip-title{font-size:13px; font-weight:900; line-height:1.35}
    .tooltip-sub{margin-top:6px; font-size:12px; color:var(--muted); line-height:1.45}
    .panel{
      position:fixed; top:18px; right:18px; bottom:18px; width:min(var(--panel-width), calc(100vw - 36px)); z-index:24;
      transform:translateX(calc(100% + 24px)); opacity:0; pointer-events:none; transition:.28s ease;
      display:flex; flex-direction:column;
    }
    body.panel-open .panel{transform:translateX(0); opacity:1; pointer-events:auto}
    .panel-shell{
      height:100%; display:flex; flex-direction:column; border-radius:28px; overflow:hidden;
    }
    .panel-head{
      padding:18px 18px 12px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; gap:12px;
    }
    .panel-title-wrap{flex:1; min-width:0}
    .panel-kicker{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.14em; color:var(--accent)}
    .panel-title{margin-top:6px; font-size:27px; font-weight:900; line-height:1.1; letter-spacing:-.04em; word-break:keep-all}
    .panel-subtitle{margin-top:8px; font-size:13px; font-weight:700; color:var(--muted)}
    .icon-btn{
      width:42px; height:42px; flex:0 0 auto; border-radius:14px; border:1px solid var(--border);
      background:rgba(255,255,255,.06); color:var(--text); font-size:18px; font-weight:700; cursor:pointer;
    }
    .panel-body{
      flex:1; min-height:0; overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; touch-action:pan-y;
      padding:16px 18px calc(18px + var(--safe));
      display:flex; flex-direction:column; gap:16px;
    }
    .section{
      border:1px solid var(--border); background:linear-gradient(180deg,var(--panel-soft), rgba(255,255,255,.02));
      border-radius:22px; padding:16px;
    }
    .section-title{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      font-size:13px; font-weight:900; letter-spacing:-.02em; margin-bottom:12px;
    }
    .section-sub{font-size:11px; color:var(--muted); font-weight:800}
    .hero-grid{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px}
    .hero-card{
      padding:14px; border-radius:16px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
      display:flex; flex-direction:column; gap:8px; min-width:0;
    }
    body.light-mode .hero-card{background:rgba(24,120,200,.04); border-color:rgba(17,63,109,.08)}
    .hero-card .h-label{font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.08em}
    .hero-card .h-value{font-size:22px; font-weight:900; letter-spacing:-.04em; line-height:1.05}
    .hero-card .h-meta{font-size:12px; color:var(--muted); font-weight:700}
    .tech-list{display:flex; flex-direction:column; gap:10px}
    .tech-row{
      width:100%; padding:14px; text-align:left; border-radius:18px; border:1px solid var(--border); background:rgba(255,255,255,.04);
      color:var(--text); cursor:pointer; transition:.18s ease;
    }
    .tech-row:hover,.tech-row.active{transform:translateY(-1px); border-color:rgba(135,215,255,.26); box-shadow:0 10px 24px rgba(28,89,150,.10)}
    .tech-row-top{display:flex; align-items:flex-start; justify-content:space-between; gap:12px}
    .tech-row-name{font-size:14px; font-weight:900; line-height:1.4; letter-spacing:-.02em}
    .tech-row-level{font-size:12px; font-weight:900; text-align:right; white-space:nowrap}
    .tech-row-level span{display:block; font-size:10px; color:var(--muted); margin-bottom:2px; font-weight:800; letter-spacing:.06em; text-transform:uppercase}
    .level-track,.bar-track{
      position:relative; height:10px; border-radius:999px; overflow:hidden; background:rgba(255,255,255,.08); margin-top:10px;
    }
    .level-fill,.bar-fill{
      position:absolute; inset:0 auto 0 0; width:0; border-radius:inherit;
      background:linear-gradient(90deg, rgba(135,215,255,.95), rgba(224,245,255,.95));
      box-shadow:0 0 18px rgba(135,215,255,.35);
    }
    body.light-mode .level-fill, body.light-mode .bar-fill{
      background:linear-gradient(90deg, rgba(24,120,200,.95), rgba(105,178,235,.95));
      box-shadow:none;
    }
    .tech-row-meta,.bar-meta{
      margin-top:8px; display:flex; justify-content:space-between; gap:12px; font-size:12px; color:var(--muted); font-weight:700; flex-wrap:wrap;
    }
    .dept-list,.project-list{display:flex; flex-direction:column; gap:10px}
    .dept-item{
      padding:12px 13px; border-radius:16px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06);
    }
    .dept-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px}
    .dept-name{font-size:13px; font-weight:900}
    .mono{font-variant-numeric:tabular-nums}
    .project-card{
      padding:14px; border-radius:18px; border:1px solid var(--border); background:rgba(255,255,255,.03);
    }
    .project-head{display:flex; justify-content:space-between; gap:10px; align-items:flex-start}
    .project-program{font-size:14px; font-weight:900; line-height:1.38}
    .project-ministry{
      flex:0 0 auto; padding:6px 10px; border-radius:999px; background:rgba(255,255,255,.06); color:var(--muted);
      font-size:11px; font-weight:900; white-space:nowrap
    }
    .project-sub{margin-top:7px; font-size:12px; line-height:1.45; color:var(--muted)}
    .project-meta{margin-top:10px; display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px}
    .project-pill{
      padding:10px 12px; border-radius:14px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06);
    }
    .project-pill .k{font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.08em}
    .project-pill .v{margin-top:4px; font-size:13px; font-weight:900}
    .empty{
      padding:16px; border-radius:16px; background:rgba(255,255,255,.03); color:var(--muted); font-size:13px; font-weight:700;
      border:1px dashed rgba(255,255,255,.12);
    }
    .note{
      margin-bottom:12px; padding:12px 14px; border-radius:16px; border:1px solid rgba(255,255,255,.08);
      background:rgba(135,215,255,.08); color:var(--accent-2); font-size:12px; font-weight:800; line-height:1.5;
    }
    body.light-mode .note{background:rgba(24,120,200,.06)}
    .loading{
      position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(180deg, rgba(8,22,36,.58), rgba(8,17,27,.84));
      color:var(--text); font-size:15px; font-weight:900; letter-spacing:.02em; transition:.35s ease;
    }
    .loading.hidden{opacity:0; pointer-events:none}
    .loading span{
      padding:16px 20px; border-radius:18px; background:rgba(7,17,29,.70); border:1px solid rgba(255,255,255,.10); backdrop-filter:blur(16px);
    }
    .error-box{
      position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center; padding:20px;
      background:rgba(5,10,16,.74);
    }
    .error-box.visible{display:flex}
    .error-card{
      max-width:560px; padding:24px; border-radius:24px; background:var(--panel-strong); border:1px solid var(--border-strong); box-shadow:var(--shadow)
    }
    .error-card h2{margin:0 0 10px; font-size:22px}
    .error-card p{margin:0; line-height:1.6; color:var(--muted)}
    @media (max-width: 1180px){
      .topbar{grid-template-columns:1fr; gap:12px}
      .controls{min-width:unset}
      .search-wrap{top:284px}
    }
    @media (max-width: 900px){
      :root{--topbar-h:158px}
      .topbar{left:12px; right:12px; top:12px}
      .brand{min-height:unset}
      .summary{grid-template-columns:repeat(2,minmax(0,1fr))}
      .controls{padding:10px}
      .controls-row{display:grid; grid-template-columns:repeat(3,minmax(0,1fr))}
      .search-wrap{top:auto; left:12px; right:12px; transform:none; width:auto; bottom:20px}
      .panel{
        left:12px; right:12px; width:auto; top:auto; bottom:12px; max-height:72vh;
        transform:translateY(calc(100% + 16px));
      }
      body.panel-open .panel{transform:translateY(0)}
      .panel-shell{border-radius:28px}
      .hero-grid{grid-template-columns:1fr}
      .project-meta{grid-template-columns:1fr}
      .sector-label{min-width:104px; max-width:134px; padding:8px 10px 9px}
      .sector-label .name{font-size:12px}
      .sector-label .meta{font-size:10px}
    }
    @media (max-width: 640px){
      .summary{grid-template-columns:1fr 1fr}
      .metric .value{font-size:18px}
      .search-box{height:52px}
      .search-input{font-size:14px}
      .panel-head{padding:16px 16px 12px}
      .panel-title{font-size:23px}
      .panel-body{padding:14px 16px calc(16px + var(--safe))}
      .section{padding:14px}
      .controls-row{grid-template-columns:1fr}
    }
    ::-webkit-scrollbar{width:8px;height:8px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16); border-radius:999px}
    body.light-mode ::-webkit-scrollbar-thumb{background:rgba(17,63,109,.18)}
  </style>
</head>
<body>
  <div id="app">
    <canvas id="sceneCanvas" aria-label="국가전략기술 3D 지도"></canvas>
    <div class="screen-grad"></div>

    <div class="topbar">
      <section class="brand glass">
        <div class="eyebrow">Korea Strategic Technology</div>
        <div class="title-row">
          <h1>국가전략기술 3D 맵</h1>
          <div class="chip">면적 = 2026 예산 · 높이 = 기술수준</div>
        </div>
      </section>

      <section class="summary glass">
        <div class="metric">
          <div class="label">전략기술 분야</div>
          <div class="value" id="sumSectorCount">12</div>
        </div>
        <div class="metric">
          <div class="label">세부 중점기술</div>
          <div class="value" id="sumTechCount">50</div>
        </div>
        <div class="metric">
          <div class="label">2026 총예산</div>
          <div class="value" id="sumBudget26">8.61조원</div>
        </div>
        <div class="metric">
          <div class="label">2025 비교</div>
          <div class="value" id="sumBudget25">6.52조원</div>
        </div>
      </section>

      <section class="controls glass">
        <div class="controls-row">
          <button class="action-btn" id="resetViewBtn" type="button">시점 초기화</button>
          <button class="action-btn" id="rotateBtn" type="button">자동회전 켜짐</button>
          <button class="action-btn" id="themeBtn" type="button">☀️ 라이트</button>
        </div>
      </section>
    </div>

    <div class="search-wrap">
      <div class="search-box glass">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M10.5 18a7.5 7.5 0 1 1 5.303-12.803A7.5 7.5 0 0 1 10.5 18Zm8 2-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="searchInput" class="search-input" list="searchList" placeholder="분야명 또는 세부 중점기술 검색" autocomplete="off"/>
        <datalist id="searchList"></datalist>
      </div>
    </div>

    <div class="labels-layer" id="labelsLayer"></div>

    <div class="tooltip" id="tooltip">
      <div class="tooltip-title" id="tooltipTitle"></div>
      <div class="tooltip-sub" id="tooltipSub"></div>
    </div>

    <aside class="panel" id="detailPanel" aria-live="polite">
      <div class="panel-shell glass">
        <div class="panel-head">
          <div class="panel-title-wrap">
            <div class="panel-kicker" id="panelKicker">전략기술 분야</div>
            <div class="panel-title" id="panelTitle">분야를 선택하세요</div>
            <div class="panel-subtitle" id="panelSubtitle">3D 맵에서 분야 또는 타워를 클릭하면 세부 정보가 표시됩니다.</div>
          </div>
          <button class="icon-btn" id="panelCloseBtn" type="button" aria-label="패널 닫기">×</button>
        </div>
        <div class="panel-body" id="panelBody"></div>
      </div>
    </aside>


    <div class="loading" id="loading"><span>3D 맵을 준비하고 있습니다…</span></div>
    <div class="error-box" id="errorBox">
      <div class="error-card">
        <h2>지도를 불러오지 못했습니다.</h2>
        <p id="errorText">data.js 또는 3D 스크립트 로딩을 확인해주세요.</p>
      </div>
    </div>
  </div>


  <script>
    window.__strategicMapBooted = false;
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        if (window.__strategicMapBooted) return;
        const loading = document.getElementById('loading');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        if (loading) loading.classList.add('hidden');
        if (errorBox) errorBox.classList.add('visible');
        if (errorText) errorText.textContent = '3D 라이브러리를 불러오지 못했습니다. data.js와 index.html이 같은 폴더에 있는지, 그리고 외부 CDN 접근이 가능한지 확인해주세요.';
      }, 8000);
    });
  </script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const DATA = window.STRATEGIC_TECH_DATA;
    const app = document.getElementById('app');
    const canvas = document.getElementById('sceneCanvas');
    const labelsLayer = document.getElementById('labelsLayer');
    const tooltip = document.getElementById('tooltip');
    const tooltipTitle = document.getElementById('tooltipTitle');
    const tooltipSub = document.getElementById('tooltipSub');
    const loading = document.getElementById('loading');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');
    const panel = document.getElementById('detailPanel');
    const panelBody = document.getElementById('panelBody');
    const panelKicker = document.getElementById('panelKicker');
    const panelTitle = document.getElementById('panelTitle');
    const panelSubtitle = document.getElementById('panelSubtitle');
    const searchInput = document.getElementById('searchInput');
    const searchList = document.getElementById('searchList');
    const themeBtn = document.getElementById('themeBtn');
    const rotateBtn = document.getElementById('rotateBtn');
    const resetViewBtn = document.getElementById('resetViewBtn');

    if (!DATA || !Array.isArray(DATA.sectors)) {
      showError('data.js 구조를 찾을 수 없습니다. index.html과 data.js를 같은 폴더에 두고 다시 열어주세요.');
      throw new Error('STRATEGIC_TECH_DATA not found');
    }

    document.getElementById('sumSectorCount').textContent = `${DATA.meta.sectorCount}개`;
    document.getElementById('sumTechCount').textContent = `${DATA.meta.detailTechCount}개`;
    document.getElementById('sumBudget26').textContent = formatBudgetTrillion(DATA.meta.displayTotalBudgetTrillion2026);
    document.getElementById('sumBudget25').textContent = formatBudgetTrillion(DATA.meta.displayTotalBudgetTrillion2025);

    const STORAGE_KEY = 'strategic-map-theme';
    const state = {
      theme: getPreferredTheme(),
      autoRotate: true,
      selection: null,
      hover: null,
      started: false,
    };

    const sceneObjects = {
      foundations: new Map(),
      sectorTowers: new Map(),
      techs: new Map(),
      labels: [],
      materials: [],
      edges: [],
      glowRings: [],
      floor: null,
      floorGrid: null,
      skyline: [],
      ambient: null,
      hemi: null,
      sun: null,
      fill: null,
    };

    const interactive = [];
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let renderer, scene, camera, controls;
    let hoveredRef = null;
    let pointerClient = { x: 0, y: 0 };
    const worldCenter = new THREE.Vector3(0, 0, 0);

    init();
    window.__strategicMapBooted = true;

    function init(){
      populateSearch();
      applyTheme(state.theme, false);
      initScene();
      renderInitialPanel();
      bindUI();
      requestAnimationFrame(() => loading.classList.add('hidden'));
    }

    function bindUI(){
      document.getElementById('panelCloseBtn').addEventListener('click', closePanel);
      themeBtn.addEventListener('click', () => {
        const next = document.body.classList.contains('light-mode') ? 'dark' : 'light';
        applyTheme(next, true);
      });
      rotateBtn.addEventListener('click', () => {
        state.autoRotate = !state.autoRotate;
        controls.autoRotate = state.autoRotate;
        rotateBtn.textContent = state.autoRotate ? '자동회전 켜짐' : '자동회전 꺼짐';
      });
      resetViewBtn.addEventListener('click', resetView);
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          performSearch(searchInput.value);
        }
      });
      searchInput.addEventListener('change', () => performSearch(searchInput.value));
      labelsLayer.addEventListener('click', (e) => {
        const label = e.target.closest('[data-sector-id]');
        if (!label) return;
        const sectorId = Number(label.dataset.sectorId);
        selectSector(sectorId);
      });

      window.addEventListener('resize', onResize);
      canvas.addEventListener('pointermove', onPointerMove);
      canvas.addEventListener('pointerleave', clearHover);
      canvas.addEventListener('click', onPointerClick);
    }

    function initScene(){
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = document.body.classList.contains('light-mode') ? 1.08 : 1.14;

      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(getThemePalette().fog, 0.010);

      camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 340);
      camera.position.set(0, 54, 102);

      controls = new OrbitControls(camera, canvas);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.enablePan = false;
      controls.minDistance = 54;
      controls.maxDistance = 150;
      controls.minPolarAngle = Math.PI / 5.2;
      controls.maxPolarAngle = Math.PI / 2.08;
      controls.target.set(0, 8, 2);
      controls.autoRotate = state.autoRotate;
      controls.autoRotateSpeed = 0.5;
      controls.addEventListener('start', () => {
        state.autoRotate = false;
        controls.autoRotate = false;
        rotateBtn.textContent = '자동회전 꺼짐';
      });

      buildLights();
      buildWorld();
      buildSectorMap();
      onResize();
      state.started = true;
      animate();
    }

    function buildLights(){
      const palette = getThemePalette();
      sceneObjects.ambient = new THREE.AmbientLight(palette.ambientColor, palette.ambientIntensity);
      scene.add(sceneObjects.ambient);

      sceneObjects.hemi = new THREE.HemisphereLight(palette.skyColor, palette.groundColor, palette.hemiIntensity);
      scene.add(sceneObjects.hemi);

      sceneObjects.sun = new THREE.DirectionalLight(palette.sunColor, palette.sunIntensity);
      sceneObjects.sun.position.set(34, 58, 24);
      sceneObjects.sun.castShadow = true;
      sceneObjects.sun.shadow.mapSize.set(2048, 2048);
      sceneObjects.sun.shadow.camera.near = 10;
      sceneObjects.sun.shadow.camera.far = 180;
      sceneObjects.sun.shadow.camera.left = -70;
      sceneObjects.sun.shadow.camera.right = 70;
      sceneObjects.sun.shadow.camera.top = 70;
      sceneObjects.sun.shadow.camera.bottom = -70;
      scene.add(sceneObjects.sun);

      sceneObjects.fill = new THREE.PointLight(palette.fillColor, palette.fillIntensity, 220);
      sceneObjects.fill.position.set(-42, 24, -18);
      scene.add(sceneObjects.fill);
    }

    function buildWorld(){
      const palette = getThemePalette();
      const floorGroup = new THREE.Group();

      const floorGeo = new THREE.CircleGeometry(108, 96);
      const floorMat = new THREE.MeshPhongMaterial({
        color: palette.floor,
        specular: palette.floorSpec,
        shininess: document.body.classList.contains('light-mode') ? 30 : 60,
        transparent: true,
        opacity: document.body.classList.contains('light-mode') ? 0.78 : 0.90,
      });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      floor.position.y = -0.05;
      floorGroup.add(floor);
      sceneObjects.floor = floor;

      const grid = new THREE.GridHelper(140, 28, palette.grid, palette.grid);
      grid.position.y = 0.02;
      grid.material.transparent = true;
      grid.material.opacity = document.body.classList.contains('light-mode') ? 0.13 : 0.18;
      floorGroup.add(grid);
      sceneObjects.floorGrid = grid;

      const ringMaterial = new THREE.MeshBasicMaterial({ color: palette.ring, transparent: true, opacity: 0.10 });
      [26, 48, 72, 96].forEach((radius, idx) => {
        const ring = new THREE.Mesh(new THREE.RingGeometry(radius - 0.28, radius, 96), ringMaterial.clone());
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = 0.03 + idx * 0.002;
        ring.material.opacity = idx === 0 ? 0.14 : 0.08;
        floorGroup.add(ring);
      });

      scene.add(floorGroup);

      buildSkyline();
      buildParticles();
    }

    function buildSkyline(){
      const skyline = new THREE.Group();
      const palette = getThemePalette();
      const mat = new THREE.MeshPhongMaterial({
        color: palette.skyline,
        transparent: true,
        opacity: document.body.classList.contains('light-mode') ? 0.34 : 0.26,
        shininess: 25,
      });
      const geomCache = new Map();
      const count = 90;
      for (let i = 0; i < count; i += 1){
        const angle = (i / count) * Math.PI * 2;
        const radius = 74 + (i % 7) * 4 + ((i * 13) % 9);
        const height = 6 + ((i * 17) % 16);
        const width = 1.4 + ((i * 7) % 4) * 0.7;
        const depth = 1.2 + ((i * 11) % 4) * 0.6;
        const key = `${width.toFixed(2)}:${height.toFixed(2)}:${depth.toFixed(2)}`;
        const geo = geomCache.get(key) || (() => {
          const g = new THREE.BoxGeometry(width, height, depth);
          geomCache.set(key, g);
          return g;
        })();
        const mesh = new THREE.Mesh(geo, mat.clone());
        mesh.position.set(Math.cos(angle) * radius, height / 2, Math.sin(angle) * radius);
        skyline.add(mesh);
        sceneObjects.skyline.push(mesh);
      }
      scene.add(skyline);
    }

    function buildParticles(){
      const particleCount = 220;
      const positions = new Float32Array(particleCount * 3);
      for (let i = 0; i < particleCount; i += 1){
        const radius = 42 + Math.random() * 54;
        const angle = Math.random() * Math.PI * 2;
        positions[i * 3] = Math.cos(angle) * radius;
        positions[i * 3 + 1] = 8 + Math.random() * 34;
        positions[i * 3 + 2] = Math.sin(angle) * radius;
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const material = new THREE.PointsMaterial({
        color: document.body.classList.contains('light-mode') ? 0x6fa8d8 : 0x9ee7ff,
        size: document.body.classList.contains('light-mode') ? 0.55 : 0.85,
        transparent: true,
        opacity: document.body.classList.contains('light-mode') ? 0.18 : 0.30,
        depthWrite: false
      });
      const points = new THREE.Points(geometry, material);
      scene.add(points);
    }

    function buildSectorMap(){
      const positions = [
        new THREE.Vector3(-16, 0, 2),  new THREE.Vector3(12, 0, 2),
        new THREE.Vector3(-14, 0, -26), new THREE.Vector3(14, 0, -26),
        new THREE.Vector3(-40, 0, 2), new THREE.Vector3(38, 0, 2),
        new THREE.Vector3(-14, 0, 30), new THREE.Vector3(14, 0, 30),
        new THREE.Vector3(-40, 0, -24), new THREE.Vector3(40, 0, -24),
        new THREE.Vector3(-38, 0, 30), new THREE.Vector3(38, 0, 30),
      ];
      const sectorsByBudget = [...DATA.sectors].sort((a, b) => b.budgetTrillion2026 - a.budgetTrillion2026);
      const maxBudget = Math.max(...DATA.sectors.map(s => s.budgetTrillion2026));
      const maxTechBudget = Math.max(
        1,
        ...DATA.sectors.flatMap(sector => sector.detailTechs.map(tech => tech.budgetMillion2026 || 0))
      );

      sectorsByBudget.forEach((sector, index) => {
        const position = positions[index] || new THREE.Vector3(index * 8, 0, 0);
        const group = new THREE.Group();
        group.position.copy(position);
        scene.add(group);

        const baseColor = new THREE.Color(sector.color);
        const radius = 5.2 + Math.sqrt(sector.budgetTrillion2026 / maxBudget) * 5.4;
        const baseHeight = 2.0 + (sector.budgetTrillion2026 / maxBudget) * 2.0;
        const plateHeight = 1.1;

        const foundation = createFoundation(radius, baseHeight, baseColor, sector);
        group.add(foundation.mesh);
        group.add(foundation.top);
        group.add(foundation.ring);
        foundation.mesh.userData = { type: 'sector', sectorId: sector.id };
        foundation.top.userData = { type: 'sector', sectorId: sector.id };
        foundation.ring.userData = { type: 'sector', sectorId: sector.id };
        interactive.push(foundation.mesh, foundation.top);

        const heroHeight = 14 + sector.techLevelPct * 0.55;
        const heroGeo = new THREE.BoxGeometry(radius * 0.34, heroHeight, radius * 0.34);
        const heroMats = createTowerMaterials(baseColor, 1.06);
        const hero = new THREE.Mesh(heroGeo, heroMats);
        hero.position.set(0, baseHeight + plateHeight + heroHeight / 2, 0);
        hero.castShadow = true;
        hero.receiveShadow = true;
        hero.userData = { type: 'sector', sectorId: sector.id };
        group.add(hero);
        interactive.push(hero);

        const heroEdges = createEdge(heroGeo, paletteLineColor(baseColor, 0.95));
        heroEdges.position.copy(hero.position);
        group.add(heroEdges);

        const detailGroup = new THREE.Group();
        detailGroup.position.y = baseHeight + plateHeight;
        group.add(detailGroup);

        const detailSorted = [...sector.detailTechs].sort((a, b) => {
          const budgetA = a.budgetMillion2026 || 0;
          const budgetB = b.budgetMillion2026 || 0;
          if (budgetA !== budgetB) return budgetB - budgetA;
          return b.techLevelPct - a.techLevelPct;
        });

        detailSorted.forEach((tech, techIndex) => {
          const share = Math.max(0.12, (tech.budgetMillion2026 || (sector.budgetTrillion2026 * 100000)) / Math.max(maxTechBudget, 1));
          const footprint = clamp(1.2 + Math.sqrt(share) * 1.8, 1.15, radius * 0.32);
          const depth = clamp(footprint * (0.84 + seeded(sector.id * 13 + techIndex) * 0.44), 1.05, radius * 0.34);
          const height = 7 + tech.techLevelPct * 0.34;
          const point = spiralPoint(techIndex, detailSorted.length, radius * 0.67, sector.id);
          const geo = new THREE.BoxGeometry(footprint, height, depth);
          const mesh = new THREE.Mesh(geo, createTowerMaterials(baseColor, 0.98));
          mesh.position.set(point.x, height / 2, point.z);
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          mesh.userData = { type: 'tech', sectorId: sector.id, techName: tech.name };
          detailGroup.add(mesh);
          interactive.push(mesh);

          const edge = createEdge(geo, paletteLineColor(baseColor, 0.72));
          edge.position.copy(mesh.position);
          detailGroup.add(edge);

          sceneObjects.techs.set(`${sector.id}::${tech.name}`, { mesh, edge, tech, sector, group: detailGroup });
        });

        const labelEl = buildLabel(sector);
        labelsLayer.appendChild(labelEl);
        sceneObjects.labels.push({ el: labelEl, sectorId: sector.id, object: hero });

        sceneObjects.foundations.set(sector.id, {
          sector, group, radius, baseHeight, foundation: foundation.mesh, top: foundation.top,
          ring: foundation.ring, hero, heroEdges, labelEl
        });
        sceneObjects.sectorTowers.set(sector.id, hero);
      });
    }

    function createFoundation(radius, baseHeight, color, sector){
      const sideGeo = new THREE.CylinderGeometry(radius * 1.06, radius * 1.14, baseHeight, 56, 1, false);
      const sideMat = new THREE.MeshPhongMaterial({
        color: color.clone().multiplyScalar(document.body.classList.contains('light-mode') ? 0.88 : 0.54),
        specular: document.body.classList.contains('light-mode') ? 0xbfd8ef : 0x203348,
        shininess: document.body.classList.contains('light-mode') ? 24 : 40,
        transparent: true,
        opacity: document.body.classList.contains('light-mode') ? 0.94 : 0.96
      });
      const side = new THREE.Mesh(sideGeo, sideMat);
      side.castShadow = true;
      side.receiveShadow = true;
      side.position.y = baseHeight / 2;

      const topGeo = new THREE.CylinderGeometry(radius, radius * 1.02, 1.10, 56);
      const topMat = new THREE.MeshPhongMaterial({
        color: color.clone().lerp(new THREE.Color(0xffffff), document.body.classList.contains('light-mode') ? 0.26 : 0.18),
        specular: document.body.classList.contains('light-mode') ? 0xffffff : 0xd9eefc,
        shininess: document.body.classList.contains('light-mode') ? 40 : 80,
        transparent: true,
        opacity: document.body.classList.contains('light-mode') ? 0.97 : 0.95
      });
      const top = new THREE.Mesh(topGeo, topMat);
      top.position.y = baseHeight + 0.55;
      top.castShadow = true;
      top.receiveShadow = true;

      const ring = new THREE.Mesh(
        new THREE.RingGeometry(radius * 1.02, radius * 1.10, 56),
        new THREE.MeshBasicMaterial({ color: color.clone().lerp(new THREE.Color(0xffffff), 0.12), transparent: true, opacity: document.body.classList.contains('light-mode') ? 0.24 : 0.18 })
      );
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = baseHeight + 1.12;

      sceneObjects.materials.push(sideMat, topMat, ring.material);
      sceneObjects.glowRings.push(ring);
      return { mesh: side, top, ring };
    }

    function createTowerMaterials(baseColor, intensity = 1){
      const sideColor = baseColor.clone().lerp(new THREE.Color(0xffffff), document.body.classList.contains('light-mode') ? 0.18 : 0.10);
      const topColor = baseColor.clone().lerp(new THREE.Color(0xffffff), document.body.classList.contains('light-mode') ? 0.42 : 0.26);
      const sideTexture = createWindowTexture(sideColor, intensity);
      const sideMat = new THREE.MeshStandardMaterial({
        color: sideColor,
        map: sideTexture,
        emissive: sideColor.clone().lerp(new THREE.Color(0xffffff), 0.45),
        emissiveMap: sideTexture,
        emissiveIntensity: document.body.classList.contains('light-mode') ? 0.08 : 0.15,
        roughness: document.body.classList.contains('light-mode') ? 0.52 : 0.38,
        metalness: document.body.classList.contains('light-mode') ? 0.06 : 0.16
      });
      const topMat = new THREE.MeshStandardMaterial({
        color: topColor,
        roughness: 0.22,
        metalness: 0.18,
        emissive: baseColor.clone().lerp(new THREE.Color(0xffffff), 0.14),
        emissiveIntensity: document.body.classList.contains('light-mode') ? 0.03 : 0.07
      });
      const bottomMat = new THREE.MeshStandardMaterial({ color: sideColor.clone().multiplyScalar(0.82), roughness: 0.66, metalness: 0.04 });
      sceneObjects.materials.push(sideMat, topMat, bottomMat);
      return [sideMat, sideMat, topMat, bottomMat, sideMat, sideMat];
    }

    function createWindowTexture(color, intensity){
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      const rgb = colorToRgb(color);
      ctx.fillStyle = `rgb(${Math.round(rgb.r * 255 * 0.50)}, ${Math.round(rgb.g * 255 * 0.52)}, ${Math.round(rgb.b * 255 * 0.58)})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cols = 7;
      const rows = 15;
      const cellW = canvas.width / cols;
      const cellH = canvas.height / rows;

      for (let y = 0; y < rows; y += 1){
        for (let x = 0; x < cols; x += 1){
          const lit = ((x * 17 + y * 23 + Math.round(intensity * 100)) % 5) !== 0;
          const alpha = lit ? (document.body.classList.contains('light-mode') ? 0.16 : 0.30) : (document.body.classList.contains('light-mode') ? 0.04 : 0.08);
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.fillRect(x * cellW + 3, y * cellH + 3, cellW - 6, cellH - 7);
        }
      }
      ctx.strokeStyle = document.body.classList.contains('light-mode') ? 'rgba(255,255,255,.18)' : 'rgba(255,255,255,.12)';
      ctx.lineWidth = 2;
      for (let x = 1; x < cols; x += 1){
        ctx.beginPath();
        ctx.moveTo(x * cellW, 0);
        ctx.lineTo(x * cellW, canvas.height);
        ctx.stroke();
      }
      for (let y = 1; y < rows; y += 1){
        ctx.beginPath();
        ctx.moveTo(0, y * cellH);
        ctx.lineTo(canvas.width, y * cellH);
        ctx.stroke();
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function createEdge(geometry, color){
      const edge = new THREE.LineSegments(
        new THREE.EdgesGeometry(geometry),
        new THREE.LineBasicMaterial({ color, transparent: true, opacity: document.body.classList.contains('light-mode') ? 0.28 : 0.18 })
      );
      sceneObjects.edges.push(edge);
      return edge;
    }

    function buildLabel(sector){
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'sector-label';
      el.dataset.sectorId = String(sector.id);
      el.innerHTML = `
        <div class="name">${sector.labelLines.map(escapeHtml).join('<br>')}</div>
        <div class="meta">${formatBudgetTrillion(sector.budgetTrillion2026)}</div>
      `;
      return el;
    }

    function animate(){
      requestAnimationFrame(animate);
      controls.update();
      if (state.autoRotate) {
        controls.autoRotate = true;
      }
      updateHoverVisuals();
      updateLabels();
      updateTooltipPosition();
      renderer.render(scene, camera);
    }

    function updateLabels(){
      const width = window.innerWidth;
      const height = window.innerHeight;
      sceneObjects.labels.forEach(entry => {
        const pos = entry.object.getWorldPosition(new THREE.Vector3()).clone();
        pos.y += 8;
        const projected = pos.project(camera);
        const visible = projected.z < 1 && projected.z > -1 && Math.abs(projected.x) < 1.15 && Math.abs(projected.y) < 1.15;
        if (!visible){
          entry.el.style.display = 'none';
          return;
        }
        entry.el.style.display = 'block';
        entry.el.style.left = `${(projected.x * 0.5 + 0.5) * width}px`;
        entry.el.style.top = `${(-projected.y * 0.5 + 0.5) * height}px`;
        const active = state.selection && Number(state.selection.sectorId) === Number(entry.sectorId);
        entry.el.classList.toggle('active', !!active);
      });
    }

    function onResize(){
      if (!renderer || !camera) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onPointerMove(event){
      pointerClient.x = event.clientX;
      pointerClient.y = event.clientY;
      const hit = raycast(event);
      if (!hit) {
        hoveredRef = null;
        tooltip.classList.remove('visible');
        return;
      }
      hoveredRef = hit.object.userData;
      const html = buildTooltip(hoveredRef);
      if (!html) {
        tooltip.classList.remove('visible');
        return;
      }
      tooltipTitle.textContent = html.title;
      tooltipSub.innerHTML = html.sub;
      tooltip.classList.add('visible');
    }

    function onPointerClick(event){
      const hit = raycast(event);
      if (!hit) return;
      const meta = hit.object.userData;
      if (meta.type === 'tech') {
        selectTech(meta.sectorId, meta.techName);
      } else if (meta.type === 'sector') {
        selectSector(meta.sectorId);
      }
    }

    function clearHover(){
      hoveredRef = null;
      tooltip.classList.remove('visible');
    }

    function raycast(event){
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(interactive, false);
      return hits[0] || null;
    }

    function updateHoverVisuals(){
      sceneObjects.foundations.forEach((entry, sectorId) => {
        const selected = state.selection && Number(state.selection.sectorId) === Number(sectorId);
        const hovered = hoveredRef && Number(hoveredRef.sectorId) === Number(sectorId);
        const foundationMats = [entry.foundation.material, entry.top.material];
        foundationMats.forEach(mat => {
          if (!mat) return;
          mat.emissive = mat.emissive || new THREE.Color(0x000000);
          mat.emissive.set(entry.sector.color);
          mat.emissiveIntensity = selected ? 0.16 : hovered ? 0.08 : 0.0;
        });
        entry.ring.material.opacity = selected ? 0.42 : hovered ? 0.24 : (document.body.classList.contains('light-mode') ? 0.24 : 0.18);
        entry.ring.scale.setScalar(selected ? 1.035 : 1.0);

        const hero = entry.hero;
        const materials = Array.isArray(hero.material) ? hero.material : [hero.material];
        materials.forEach((mat, idx) => {
          if (!mat) return;
          mat.emissive = mat.emissive || new THREE.Color(0x000000);
          mat.emissive.set(selected ? 0xffffff : entry.sector.color);
          mat.emissiveIntensity = selected ? 0.20 : hovered ? 0.10 : (idx === 2 ? 0.06 : 0.10);
        });
        hero.scale.setScalar(selected ? 1.03 : hovered ? 1.015 : 1);
        entry.heroEdges.material.opacity = selected ? 0.95 : hovered ? 0.55 : 0.20;
      });

      sceneObjects.techs.forEach((entry, key) => {
        const selected = state.selection && state.selection.type === 'tech' && key === `${state.selection.sectorId}::${state.selection.techName}`;
        const hovered = hoveredRef && hoveredRef.type === 'tech' && key === `${hoveredRef.sectorId}::${hoveredRef.techName}`;
        const mats = Array.isArray(entry.mesh.material) ? entry.mesh.material : [entry.mesh.material];
        mats.forEach((mat, idx) => {
          if (!mat) return;
          mat.emissive = mat.emissive || new THREE.Color(0x000000);
          if (selected) {
            mat.emissive.set(0xffffff);
            mat.emissiveIntensity = idx === 2 ? 0.30 : 0.24;
          } else if (hovered) {
            mat.emissive.set(entry.sector.color);
            mat.emissiveIntensity = 0.18;
          } else {
            mat.emissiveIntensity = idx === 2 ? (document.body.classList.contains('light-mode') ? 0.03 : 0.07) : (document.body.classList.contains('light-mode') ? 0.08 : 0.15);
          }
        });
        entry.mesh.scale.set(selected ? 1.06 : hovered ? 1.03 : 1, selected ? 1.06 : hovered ? 1.03 : 1, selected ? 1.06 : hovered ? 1.03 : 1);
        entry.edge.material.opacity = selected ? 0.92 : hovered ? 0.52 : (document.body.classList.contains('light-mode') ? 0.28 : 0.18);
      });
    }

    function buildTooltip(meta){
      const sector = getSector(meta.sectorId);
      if (!sector) return null;
      if (meta.type === 'tech'){
        const tech = getTech(sector, meta.techName);
        if (!tech) return null;
        return {
          title: tech.name,
          sub: `${escapeHtml(sector.name)}<br>기술수준 ${formatPercent(tech.techLevelPct)} · 2026 ${formatBudgetMixed(tech.budgetMillion2026)}`
        };
      }
      return {
        title: sector.name,
        sub: `분야 기술수준 ${formatPercent(sector.techLevelPct)} · 2026 ${formatBudgetTrillion(sector.budgetTrillion2026)}`
      };
    }

    function updateTooltipPosition(){
      if (!tooltip.classList.contains('visible')) return;
      const offsetX = 18;
      const offsetY = 18;
      const maxLeft = window.innerWidth - tooltip.offsetWidth - 12;
      const maxTop = window.innerHeight - tooltip.offsetHeight - 12;
      const left = clamp(pointerClient.x + offsetX, 12, maxLeft);
      const top = clamp(pointerClient.y + offsetY, 12, maxTop);
      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;
    }

    function selectSector(sectorId){
      const sector = getSector(sectorId);
      if (!sector) return;
      state.selection = { type: 'sector', sectorId: Number(sectorId), techName: null };
      renderPanel();
      openPanel();
    }

    function selectTech(sectorId, techName){
      const sector = getSector(sectorId);
      if (!sector) return;
      state.selection = { type: 'tech', sectorId: Number(sectorId), techName: String(techName) };
      renderPanel();
      openPanel();
    }

    function getSector(sectorId){
      return DATA.sectors.find(sector => Number(sector.id) === Number(sectorId));
    }

    function getTech(sector, techName){
      return sector?.detailTechs?.find(tech => tech.name === techName) || null;
    }

    function openPanel(){
      document.body.classList.add('panel-open');
    }

    function closePanel(){
      document.body.classList.remove('panel-open');
      state.selection = null;
    }

    function renderInitialPanel(){
      panelBody.innerHTML = `
        <section class="section">
          <div class="section-title">국가전략기술 현황</div>
          <div class="empty">3D 맵에서 전략기술 분야 또는 세부 중점기술 타워를 클릭하면 기술수준, 예산, 부처별 예산, 관련사업이 표시됩니다.</div>
        </section>
      `;
    }

    function renderPanel(){
      if (!state.selection) return;
      const sector = getSector(state.selection.sectorId);
      const tech = state.selection.type === 'tech' ? getTech(sector, state.selection.techName) : null;
      if (!sector) return;

      panelKicker.textContent = tech ? '세부 중점기술' : '전략기술 분야';
      panelTitle.textContent = tech ? tech.name : sector.name;
      panelSubtitle.textContent = tech ? `${sector.name}` : `세부 중점기술 ${sector.detailTechs.length}개`;

      const techHasMappedProjects = !!(tech && tech.projects && tech.projects.length);
      const diff26 = tech ? tech.budgetDiffMillion : sector.budgetDiffTrillion;
      const mainBudget26 = tech
        ? (techHasMappedProjects ? formatBudgetMixed(tech.budgetMillion2026) : (sector.hasFocusTechMapping ? '0억원' : '분야 단위 사업'))
        : formatBudgetTrillion(sector.budgetTrillion2026);
      const compareBudget25 = tech
        ? (techHasMappedProjects ? formatBudgetMixed(tech.budgetMillion2025) : (sector.hasFocusTechMapping ? '0억원' : '분야 단위 사업'))
        : formatBudgetTrillion(sector.budgetTrillion2025);
      const diffText = tech
        ? (techHasMappedProjects ? formatBudgetSigned(diff26, 'million') : (sector.hasFocusTechMapping ? '±0억원' : '분야 단위 사업'))
        : formatBudgetSigned(diff26, 'trillion');

      const techRows = [...sector.detailTechs].sort((a, b) => b.techLevelPct - a.techLevelPct || (b.budgetMillion2026 || 0) - (a.budgetMillion2026 || 0))
        .map(detail => renderTechRow(sector, detail, tech && tech.name === detail.name)).join('');

      const techSource = tech && tech.projects.length ? tech : null;
      const ministrySource = techSource ? techSource.ministries : sector.ministries;
      const ministryNote = tech
        ? (tech.projects.length ? '' : (tech.mappingNote || sector.mappingNote || '연결된 세부사업이 없습니다.'))
        : sector.mappingNote;

      const ministryRows = ministrySource.length
        ? renderMinistries(ministrySource)
        : `<div class="empty">부처별 예산 정보가 없습니다.</div>`;

      const projectSource = tech && tech.projects.length ? tech.projects : (tech && !tech.projects.length ? sector.projects : sector.projects);
      const projectRows = projectSource.length
        ? projectSource.slice(0, 32).map(renderProjectCard).join('')
        : `<div class="empty">관련사업이 없습니다.</div>`;
      const moreProjects = projectSource.length > 32 ? `<div class="empty">외 ${projectSource.length - 32}개 사업이 더 있습니다.</div>` : '';

      panelBody.innerHTML = `
        <section class="section">
          <div class="hero-grid">
            ${heroCard(tech ? '기술수준' : '분야 기술수준', tech ? formatPercent(tech.techLevelPct) : formatPercent(sector.techLevelPct), tech ? '세부 중점기술' : `${sector.detailTechs.length}개 세부 중점기술`)}
            ${heroCard('2026 예산', mainBudget26, tech ? (techHasMappedProjects ? `${tech.projectCount}개 연결사업` : (sector.hasFocusTechMapping ? '연결사업 없음' : '분야 단위 사업')) : `${sector.projectsCount}개 사업`)}
            ${heroCard('2025 비교', compareBudget25, `증감 ${diffText}`)}
          </div>
        </section>

        <section class="section">
          <div class="section-title">
            <span>세부 중점기술 · 기술수준</span>
            <span class="section-sub">${sector.name}</span>
          </div>
          <div class="tech-list">${techRows}</div>
        </section>

        <section class="section">
          <div class="section-title">
            <span>부처별 예산</span>
            <span class="section-sub">2026 기준</span>
          </div>
          ${ministryNote ? `<div class="note">${escapeHtml(ministryNote)}</div>` : ''}
          <div class="dept-list">${ministryRows}</div>
        </section>

        <section class="section">
          <div class="section-title">
            <span>관련사업 목록</span>
            <span class="section-sub">${tech && tech.projects.length ? `${tech.projects.length}개` : `${sector.projectsCount}개`}</span>
          </div>
          ${tech && !tech.projects.length ? `<div class="note">선택한 세부 중점기술과 직접 연결된 사업이 없어, 분야 전체 사업을 표시합니다.</div>` : ''}
          <div class="project-list">${projectRows}</div>
          ${moreProjects}
        </section>
      `;

      panelBody.querySelectorAll('[data-tech-button]').forEach(button => {
        button.addEventListener('click', () => selectTech(Number(button.dataset.sectorId), button.dataset.techName));
      });
    }

    function renderTechRow(sector, tech, active){
      const mappedBudget26 = tech.budgetMillion2026 > 0 ? formatBudgetMixed(tech.budgetMillion2026) : (sector.hasFocusTechMapping ? '0억원' : '분야 단위 사업');
      const mappedBudget25 = tech.budgetMillion2025 > 0 ? formatBudgetMixed(tech.budgetMillion2025) : (sector.hasFocusTechMapping ? '0억원' : '분야 단위 사업');
      return `
        <button class="tech-row ${active ? 'active' : ''}" type="button"
          data-tech-button="1"
          data-sector-id="${sector.id}"
          data-tech-name="${escapeAttr(tech.name)}">
          <div class="tech-row-top">
            <div class="tech-row-name">${escapeHtml(tech.name)}</div>
            <div class="tech-row-level"><span>기술수준</span>${formatPercent(tech.techLevelPct)}</div>
          </div>
          <div class="level-track"><div class="level-fill" style="width:${Math.max(4, tech.techLevelPct)}%"></div></div>
          <div class="tech-row-meta">
            <span>2026 ${mappedBudget26}</span>
            <span>2025 ${mappedBudget25}</span>
          </div>
        </button>
      `;
    }

    function renderMinistries(items){
      const maxBudget = Math.max(1, ...items.map(item => item.budgetMillion2026 || 0));
      return items.map(item => `
        <div class="dept-item">
          <div class="dept-top">
            <div class="dept-name">${escapeHtml(item.name)}</div>
            <div class="mono">${formatBudgetMixed(item.budgetMillion2026)}</div>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(6, ((item.budgetMillion2026 || 0) / maxBudget) * 100)}%"></div></div>
          <div class="bar-meta">
            <span>2026 ${formatBudgetMixed(item.budgetMillion2026)}</span>
            <span>2025 ${formatBudgetMixed(item.budgetMillion2025)}</span>
            <span>${item.projectCount}개 사업</span>
          </div>
        </div>
      `).join('');
    }

    function renderProjectCard(project){
      return `
        <article class="project-card">
          <div class="project-head">
            <div class="project-program">${escapeHtml(project.program || project.subproject || '사업명 없음')}</div>
            <div class="project-ministry">${escapeHtml(project.ministry || '부처 미상')}</div>
          </div>
          <div class="project-sub">${escapeHtml(project.subproject || project.program || '')}</div>
          <div class="project-meta">
            <div class="project-pill">
              <div class="k">2026 예산</div>
              <div class="v">${formatBudgetMixed(project.budgetMillion2026)}</div>
            </div>
            <div class="project-pill">
              <div class="k">2025 비교</div>
              <div class="v">${formatBudgetMixed(project.budgetMillion2025)}</div>
            </div>
            <div class="project-pill">
              <div class="k">기간</div>
              <div class="v">${escapeHtml(formatPeriod(project.start, project.end))}</div>
            </div>
          </div>
        </article>
      `;
    }

    function heroCard(label, value, meta){
      return `
        <div class="hero-card">
          <div class="h-label">${escapeHtml(label)}</div>
          <div class="h-value">${escapeHtml(String(value))}</div>
          <div class="h-meta">${escapeHtml(meta)}</div>
        </div>
      `;
    }

    function populateSearch(){
      const items = [];
      DATA.sectors.forEach(sector => {
        items.push({ type: 'sector', label: sector.name, sectorId: sector.id });
        sector.detailTechs.forEach(tech => items.push({ type: 'tech', label: tech.name, sectorId: sector.id, techName: tech.name }));
      });
      searchList.innerHTML = items.map(item => `<option value="${escapeAttr(item.label)}"></option>`).join('');
    }

    function performSearch(query){
      const q = String(query || '').trim();
      if (!q) return;
      const exactSector = DATA.sectors.find(sector => sector.name === q);
      if (exactSector) {
        selectSector(exactSector.id);
        return;
      }
      for (const sector of DATA.sectors){
        const exactTech = sector.detailTechs.find(tech => tech.name === q);
        if (exactTech) {
          selectTech(sector.id, exactTech.name);
          return;
        }
      }
      const normalizedQ = q.toLowerCase();
      const partialSector = DATA.sectors.find(sector => sector.name.toLowerCase().includes(normalizedQ));
      if (partialSector) {
        selectSector(partialSector.id);
        return;
      }
      for (const sector of DATA.sectors){
        const partialTech = sector.detailTechs.find(tech => tech.name.toLowerCase().includes(normalizedQ));
        if (partialTech) {
          selectTech(sector.id, partialTech.name);
          return;
        }
      }
    }

    function resetView(){
      camera.position.set(0, 54, 102);
      controls.target.set(0, 8, 2);
      controls.update();
    }

    function applyTheme(mode, persist = true){
      state.theme = mode;
      document.body.classList.toggle('light-mode', mode === 'light');
      themeBtn.textContent = mode === 'light' ? '🌙 다크' : '☀️ 라이트';
      if (persist) localStorage.setItem(STORAGE_KEY, mode);
      if (!state.started) return;
      renderer.toneMappingExposure = document.body.classList.contains('light-mode') ? 1.08 : 1.14;
      scene.fog.color = new THREE.Color(getThemePalette().fog);
      scene.fog.density = 0.010;
      refreshSceneTheme();
      renderPanel();
    }

    function refreshSceneTheme(){
      const palette = getThemePalette();
      sceneObjects.ambient.color.set(palette.ambientColor);
      sceneObjects.ambient.intensity = palette.ambientIntensity;
      sceneObjects.hemi.color.set(palette.skyColor);
      sceneObjects.hemi.groundColor.set(palette.groundColor);
      sceneObjects.hemi.intensity = palette.hemiIntensity;
      sceneObjects.sun.color.set(palette.sunColor);
      sceneObjects.sun.intensity = palette.sunIntensity;
      sceneObjects.fill.color.set(palette.fillColor);
      sceneObjects.fill.intensity = palette.fillIntensity;

      if (sceneObjects.floor){
        sceneObjects.floor.material.color.set(palette.floor);
        sceneObjects.floor.material.specular.set(palette.floorSpec);
        sceneObjects.floor.material.opacity = document.body.classList.contains('light-mode') ? 0.78 : 0.90;
      }
      if (sceneObjects.floorGrid){
        sceneObjects.floorGrid.material.color.set(palette.grid);
        sceneObjects.floorGrid.material.opacity = document.body.classList.contains('light-mode') ? 0.13 : 0.18;
      }
      sceneObjects.skyline.forEach(mesh => {
        mesh.material.color.set(palette.skyline);
        mesh.material.opacity = document.body.classList.contains('light-mode') ? 0.34 : 0.26;
      });

      sceneObjects.foundations.forEach(entry => {
        const baseColor = new THREE.Color(entry.sector.color);
        entry.foundation.material.color.copy(baseColor.clone().multiplyScalar(document.body.classList.contains('light-mode') ? 0.88 : 0.54));
        entry.foundation.material.specular.set(document.body.classList.contains('light-mode') ? 0xbfd8ef : 0x203348);
        entry.top.material.color.copy(baseColor.clone().lerp(new THREE.Color(0xffffff), document.body.classList.contains('light-mode') ? 0.26 : 0.18));
        entry.ring.material.opacity = document.body.classList.contains('light-mode') ? 0.24 : 0.18;

        const heroMaterials = Array.isArray(entry.hero.material) ? entry.hero.material : [entry.hero.material];
        applyTowerMaterialTheme(heroMaterials, baseColor, 1.06);
        entry.heroEdges.material.opacity = document.body.classList.contains('light-mode') ? 0.28 : 0.20;
      });
      sceneObjects.techs.forEach(entry => {
        applyTowerMaterialTheme(Array.isArray(entry.mesh.material) ? entry.mesh.material : [entry.mesh.material], new THREE.Color(entry.sector.color), 0.98);
        entry.edge.material.opacity = document.body.classList.contains('light-mode') ? 0.28 : 0.18;
      });
    }

    function applyTowerMaterialTheme(materials, baseColor, intensity){
      const sideColor = baseColor.clone().lerp(new THREE.Color(0xffffff), document.body.classList.contains('light-mode') ? 0.18 : 0.10);
      const topColor = baseColor.clone().lerp(new THREE.Color(0xffffff), document.body.classList.contains('light-mode') ? 0.42 : 0.26);
      const sideTexture = createWindowTexture(sideColor, intensity);
      materials.forEach((mat, idx) => {
        if (!mat) return;
        if (idx === 2){
          mat.color.copy(topColor);
          mat.emissive.copy(baseColor.clone().lerp(new THREE.Color(0xffffff), 0.14));
          mat.emissiveIntensity = document.body.classList.contains('light-mode') ? 0.03 : 0.07;
          mat.roughness = 0.22;
          mat.metalness = 0.18;
        } else if (idx === 3){
          mat.color.copy(sideColor.clone().multiplyScalar(0.82));
          mat.roughness = 0.66;
          mat.metalness = 0.04;
        } else {
          mat.color.copy(sideColor);
          mat.map = sideTexture;
          mat.emissive.copy(sideColor.clone().lerp(new THREE.Color(0xffffff), 0.45));
          mat.emissiveMap = sideTexture;
          mat.emissiveIntensity = document.body.classList.contains('light-mode') ? 0.08 : 0.15;
          mat.roughness = document.body.classList.contains('light-mode') ? 0.52 : 0.38;
          mat.metalness = document.body.classList.contains('light-mode') ? 0.06 : 0.16;
        }
        mat.needsUpdate = true;
      });
    }

    function getPreferredTheme(){
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored === 'light' || stored === 'dark') return stored;
      return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    }

    function getThemePalette(){
      const isLight = document.body.classList.contains('light-mode');
      return isLight ? {
        fog: 0xdde9f6,
        floor: 0xe8f1f9,
        floorSpec: 0xffffff,
        grid: 0x7aa6cf,
        ring: 0x5d9cd5,
        skyline: 0xb7cadf,
        ambientColor: 0xffffff,
        ambientIntensity: 1.15,
        skyColor: 0xffffff,
        groundColor: 0xb1c8de,
        hemiIntensity: 1.05,
        sunColor: 0xffffff,
        sunIntensity: 1.58,
        fillColor: 0xb9d6ef,
        fillIntensity: 0.95,
      } : {
        fog: 0x0a1220,
        floor: 0x0f2033,
        floorSpec: 0x1b4468,
        grid: 0x2a4965,
        ring: 0x7fd9ff,
        skyline: 0x4b6a88,
        ambientColor: 0xd4e7f8,
        ambientIntensity: 0.68,
        skyColor: 0x8ccfff,
        groundColor: 0x0a1525,
        hemiIntensity: 1.18,
        sunColor: 0xe6f5ff,
        sunIntensity: 1.72,
        fillColor: 0x6bc7ff,
        fillIntensity: 0.44,
      };
    }

    function formatBudgetTrillion(value){
      return `${Number(value).toFixed(2)}조원`;
    }

    function formatBudgetMixed(value){
      const num = Number(value || 0);
      return `${formatNumber(num / 100, 1)}억원`;
    }

    function formatBudgetSigned(value, unitType){
      const num = Number(value || 0);
      const sign = num > 0 ? '+' : num < 0 ? '-' : '±';
      if (unitType === 'trillion') {
        return `${sign}${Math.abs(num).toFixed(2)}조원`;
      }
      return `${sign}${formatNumber(Math.abs(num) / 100, 1)}억원`;
    }

    function formatPercent(value){
      return `${Number(value || 0).toFixed(1)}%`;
    }

    function formatNumber(value, decimals = 1){
      return Number(value || 0).toLocaleString('ko-KR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    function formatPeriod(start, end){
      const a = start == null ? '-' : String(start);
      const b = end == null ? '-' : String(end);
      return `${a} ~ ${b}`;
    }

    function showError(message){
      errorText.textContent = message;
      errorBox.classList.add('visible');
      loading.classList.add('hidden');
    }

    function colorToRgb(color){
      const c = color instanceof THREE.Color ? color : new THREE.Color(color);
      return { r: c.r, g: c.g, b: c.b };
    }

    function paletteLineColor(color, mix){
      return color.clone().lerp(new THREE.Color(0xffffff), mix);
    }

    function spiralPoint(index, total, radius, seed){
      const golden = Math.PI * (3 - Math.sqrt(5));
      const t = total <= 1 ? 0 : (index + 0.5) / total;
      const r = Math.sqrt(t) * radius * (0.76 + seeded(seed + index * 11) * 0.18);
      const angle = index * golden + seed * 0.7;
      return { x: Math.cos(angle) * r, z: Math.sin(angle) * r };
    }

    function seeded(num){
      const x = Math.sin(num * 12.9898) * 43758.5453;
      return x - Math.floor(x);
    }

    function clamp(v, min, max){
      return Math.min(max, Math.max(min, v));
    }

    function escapeHtml(value){
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(value){
      return escapeHtml(value).replace(/"/g, '&quot;');
    }
  </script>
</body>
