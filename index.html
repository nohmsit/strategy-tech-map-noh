<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국가전략기술 Strategic Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <script src="data.js"></script>
  <style>
    :root {
      --bg: #07111f;
      --bg2: #0b1627;
      --panel: rgba(10, 21, 39, 0.92);
      --panel-2: rgba(14, 28, 49, 0.94);
      --line: rgba(148, 163, 184, 0.16);
      --line-strong: rgba(148, 163, 184, 0.28);
      --text: #e5eefb;
      --text-dim: #8ea0bd;
      --accent: #90caf9;
      --shadow: 0 30px 80px rgba(0,0,0,0.28);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(91, 129, 188, 0.20), transparent 28%),
        radial-gradient(circle at 82% 10%, rgba(159, 128, 255, 0.13), transparent 24%),
        radial-gradient(circle at 50% 120%, rgba(25, 146, 132, 0.14), transparent 40%),
        linear-gradient(180deg, #06101d 0%, #091523 48%, #08111d 100%);
      overflow: hidden;
    }

    .topbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 26px 12px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.24em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .topbar .right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-kpi {
      min-width: 128px;
      padding: 12px 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(14,25,42,0.84), rgba(10,18,31,0.84));
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(14px);
      text-align: right;
    }

    .top-kpi .num {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      line-height: 1.05;
      color: #f7fbff;
      font-weight: 700;
    }

    .top-kpi .label {
      display: block;
      margin-top: 5px;
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .page {
      position: relative;
      height: calc(100vh - 98px);
      padding: 0 18px 18px;
    }

    .map-card {
      position: relative;
      height: 100%;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(9, 20, 35, 0.72), rgba(7, 16, 29, 0.92));
      border: 1px solid var(--line);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
      overflow: hidden;
      isolation: isolate;
    }

    .map-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(70, 120, 180, 0.18), transparent 28%);
      pointer-events: none;
    }

    .map-wrap {
      position: absolute;
      inset: 0;
      padding: 10px;
    }

    #strategicMap {
      width: 100%;
      height: 100%;
      display: block;
    }

    .sector-group {
      cursor: pointer;
      transition: transform 180ms ease, filter 180ms ease, opacity 180ms ease;
      transform-box: fill-box;
      transform-origin: center;
    }

    .sector-group:hover {
      transform: translate(-8px, -10px);
      filter: url(#hoverShadow);
    }

    .sector-group.is-selected {
      transform: translate(-10px, -14px);
      filter: url(#selectedShadow);
    }

    .sector-top {
      stroke: rgba(255,255,255,0.82);
      stroke-width: 1.4;
    }

    .sector-side,
    .sector-front {
      stroke: rgba(255,255,255,0.18);
      stroke-width: 1.1;
    }

    .sector-cap {
      fill: rgba(255,255,255,0.30);
      pointer-events: none;
    }

    .sector-outline {
      fill: none;
      stroke: rgba(255,255,255,0.85);
      stroke-width: 3.4;
      opacity: 0;
      pointer-events: none;
    }

    .sector-group.is-selected .sector-outline {
      opacity: 1;
    }

    .sector-label {
      pointer-events: none;
      text-anchor: middle;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .sector-label tspan {
      dominant-baseline: middle;
    }

    .sector-metric {
      font-size: 12px;
      font-weight: 700;
      opacity: 0.86;
    }

    .sector-rank {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      opacity: 0.72;
    }

    .drawer {
      position: fixed;
      right: 18px;
      top: 18px;
      bottom: 18px;
      width: min(460px, calc(100vw - 28px));
      border-radius: 26px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line-strong);
      box-shadow: 0 30px 100px rgba(0,0,0,0.42);
      backdrop-filter: blur(18px);
      transform: translateX(calc(100% + 32px));
      transition: transform 260ms cubic-bezier(.2,.72,.2,1);
      z-index: 30;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .drawer-color {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
      flex: 0 0 auto;
      margin-top: 6px;
    }

    .drawer-eyebrow {
      margin: 0 0 6px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .drawer-title {
      margin: 0;
      font-size: 30px;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .drawer-close {
      margin-left: auto;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    .drawer-close:hover { background: rgba(255,255,255,0.08); }

    .drawer-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px 22px 24px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 14px 13px;
      min-width: 0;
    }

    .metric-card .k {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 7px;
      display: block;
    }

    .metric-card .v {
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .metric-card .sub {
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text-dim);
      border-radius: 999px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      color: #07111f;
      background: #eaf5ff;
      border-color: rgba(255,255,255,0.8);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .tech-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .tech-card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.035);
      border-radius: 18px;
      padding: 14px 14px 12px;
    }

    .tech-title {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.45;
      margin-bottom: 10px;
      word-break: keep-all;
    }

    .tech-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: #edf4ff;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .tech-level-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .tech-level-fill {
      height: 100%;
      border-radius: 999px;
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .search-input {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }

    .search-input:focus {
      border-color: rgba(255,255,255,0.32);
    }

    .search-count {
      white-space: nowrap;
      font-size: 12px;
      color: var(--text-dim);
    }

    .project-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: calc(100vh - 360px);
      overflow-y: auto;
      padding-right: 2px;
    }

    .project-card {
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.035);
    }

    .project-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      justify-content: space-between;
    }

    .project-name {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;
      letter-spacing: -0.01em;
      word-break: keep-all;
    }

    .project-budget {
      white-space: nowrap;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      margin-left: 12px;
      color: #f7fbff;
    }

    .project-sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .ministry-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ministry-row {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.035);
      border-radius: 16px;
      padding: 12px 13px;
    }

    .ministry-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .bar-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
    }

    .empty {
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.6;
      padding: 8px 2px;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(3, 8, 15, 0.34);
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms ease;
      z-index: 24;
    }

    .backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }

    .hud-reset {
      position: absolute;
      left: 22px;
      bottom: 22px;
      z-index: 6;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 999px;
      background: rgba(9, 17, 29, 0.72);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 200ms ease, transform 200ms ease;
    }

    .hud-reset.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    @media (max-width: 1180px) {
      .topbar { padding: 16px 16px 10px; }
      .page { padding: 0 12px 12px; }
      .drawer {
        right: 12px;
        left: 12px;
        width: auto;
      }
    }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
      .topbar .right {
        width: 100%;
        justify-content: flex-start;
      }
      .top-kpi {
        min-width: 110px;
        text-align: left;
      }
      .page {
        height: auto;
        min-height: calc(100vh - 142px);
      }
      .map-card {
        height: calc(100vh - 180px);
        min-height: 560px;
      }
      .drawer {
        top: auto;
        bottom: 10px;
        right: 10px;
        left: 10px;
        height: min(78vh, 760px);
        border-radius: 24px;
        transform: translateY(calc(100% + 20px));
      }
      .drawer.open {
        transform: translateY(0);
      }
      .project-list {
        max-height: calc(78vh - 330px);
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.16);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <div class="eyebrow">Korea Strategic Tech</div>
      <h1>국가전략기술 Strategic Map</h1>
    </div>
    <div class="right">
      <div class="top-kpi">
        <span class="num" id="kpi-total-budget">8.61</span>
        <span class="label">2026 예산(조원)</span>
      </div>
      <div class="top-kpi">
        <span class="num" id="kpi-sector-count">12</span>
        <span class="label">전략기술 분야</span>
      </div>
      <div class="top-kpi">
        <span class="num" id="kpi-detail-count">50</span>
        <span class="label">세부기술</span>
      </div>
      <div class="top-kpi">
        <span class="num" id="kpi-project-count">1,516</span>
        <span class="label">관련사업</span>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="map-card">
      <div class="map-wrap" id="mapWrap">
        <svg id="strategicMap" aria-label="국가전략기술 3D 맵"></svg>
      </div>
      <button id="resetMapBtn" class="hud-reset" type="button">전체 보기</button>
    </section>
  </main>

  <aside id="drawer" class="drawer" aria-hidden="true">
    <div id="drawerRoot"></div>
  </aside>
  <div id="drawerBackdrop" class="backdrop"></div>

  <script>
    const DATA = window.STRATEGIC_TECH_DATA;
    const state = {
      selectedSectorId: null,
      activeTab: 'techs',
      projectQuery: ''
    };

    const mapWrap = document.getElementById('mapWrap');
    const drawerEl = document.getElementById('drawer');
    const drawerRoot = document.getElementById('drawerRoot');
    const drawerBackdrop = document.getElementById('drawerBackdrop');
    const resetMapBtn = document.getElementById('resetMapBtn');

    const sectors = [...DATA.sectors].sort((a, b) => (b.displayBudgetTrillion2026 || 0) - (a.displayBudgetTrillion2026 || 0));
    sectors.forEach((sector, index) => { sector.budgetRank = index + 1; });
    const techLevels = sectors.map(s => Number(s.techLevelPct || 0));
    const techMin = Math.min(...techLevels);
    const techMax = Math.max(...techLevels);
    const techRange = Math.max(techMax - techMin, 1);

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatInt(v) {
      return Number(v || 0).toLocaleString('ko-KR');
    }

    function formatPct(v) {
      return `${Number(v || 0).toFixed(1)}%`;
    }

    function formatTrillion(v) {
      return `${Number(v || 0).toFixed(2)}조원`;
    }

    function formatBudgetFromMillion(v) {
      const n = Number(v || 0);
      if (!n) return '0';
      if (n >= 1000000) return `${(n / 1000000).toFixed(2)}조원`;
      if (n >= 10000) return `${(n / 100).toLocaleString('ko-KR', { maximumFractionDigits: 0 })}억원`;
      if (n >= 100) return `${(n / 100).toLocaleString('ko-KR', { maximumFractionDigits: 1 })}억원`;
      return `${n.toLocaleString('ko-KR', { maximumFractionDigits: 1 })}백만원`;
    }

    function hexToRgb(hex) {
      const clean = hex.replace('#', '');
      const bigint = parseInt(clean, 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function rgbToHex({ r, g, b }) {
      const toHex = (v) => clamp(Math.round(v), 0, 255).toString(16).padStart(2, '0');
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function shade(hex, ratio) {
      const rgb = hexToRgb(hex);
      if (ratio >= 0) {
        return rgbToHex({
          r: rgb.r + (255 - rgb.r) * ratio,
          g: rgb.g + (255 - rgb.g) * ratio,
          b: rgb.b + (255 - rgb.b) * ratio
        });
      }
      const p = Math.abs(ratio);
      return rgbToHex({
        r: rgb.r * (1 - p),
        g: rgb.g * (1 - p),
        b: rgb.b * (1 - p)
      });
    }

    function textColorFor(hex) {
      const { r, g, b } = hexToRgb(hex);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.72 ? '#0a1424' : '#ffffff';
    }

    function getSectorHeightPx(techLevel) {
      const normalized = (Number(techLevel || 0) - techMin) / techRange;
      return 96 + Math.pow(clamp(normalized, 0, 1), 1.08) * 340;
    }

    function splitBalanced(items) {
      const total = items.reduce((sum, item) => sum + item.value, 0);
      if (items.length <= 1) return [items, []];
      let bestIndex = 1;
      let acc = 0;
      let bestDiff = Infinity;
      for (let i = 1; i < items.length; i++) {
        acc += items[i - 1].value;
        const diff = Math.abs(total / 2 - acc);
        if (diff < bestDiff) {
          bestDiff = diff;
          bestIndex = i;
        }
      }
      return [items.slice(0, bestIndex), items.slice(bestIndex)];
    }

    function binaryTreemap(items, x, y, w, h, output = []) {
      if (!items.length) return output;
      if (items.length === 1) {
        output.push({ item: items[0], x, y, w, h });
        return output;
      }
      const total = items.reduce((sum, entry) => sum + entry.value, 0);
      const [a, b] = splitBalanced(items);
      const sumA = a.reduce((sum, entry) => sum + entry.value, 0);
      if (w >= h) {
        const wA = w * (sumA / total);
        binaryTreemap(a, x, y, wA, h, output);
        binaryTreemap(b, x + wA, y, w - wA, h, output);
      } else {
        const hA = h * (sumA / total);
        binaryTreemap(a, x, y, w, hA, output);
        binaryTreemap(b, x, y + hA, w, h - hA, output);
      }
      return output;
    }

    function buildMapLayout() {
      const baseX = 300;
      const baseY = 300;
      const baseW = 1120;
      const baseH = 660;
      const padding = 18;

      const items = sectors.map((sector) => ({
        ...sector,
        value: Math.max(Number(sector.displayBudgetTrillion2026 || sector.budgetTrillion2026 || 0), 0.02)
      }));

      const layout = binaryTreemap(items, baseX, baseY, baseW, baseH).map(({ item, x, y, w, h }) => {
        const px = Math.min(padding, Math.min(w, h) * 0.12);
        const rx = x + px / 2;
        const ry = y + px / 2;
        const rw = Math.max(56, w - px);
        const rh = Math.max(56, h - px);
        const elev = getSectorHeightPx(item.techLevelPct);
        const dx = elev * 0.60;
        const dy = elev * 0.43;
        return {
          sector: item,
          x: rx,
          y: ry,
          w: rw,
          h: rh,
          elev,
          dx,
          dy
        };
      });

      return {
        viewBox: { width: 1700, height: 1160 },
        layout
      };
    }

    function labelFontSize(rect) {
      return clamp(Math.min(rect.w * 0.135, rect.h * 0.18), 14, 26);
    }

    function buildTopLabel(rect, sector) {
      const lines = Array.isArray(sector.labelLines) && sector.labelLines.length ? sector.labelLines : [sector.name];
      const nameFont = labelFontSize(rect);
      const metricFont = clamp(nameFont * 0.56, 11, 14);
      const centerX = rect.x + rect.w / 2 - rect.dx;
      const centerY = rect.y + rect.h / 2 - rect.dy;
      const topText = [];
      const maxNameLines = rect.h < 96 ? 1 : lines.length;
      const useShort = rect.w < 120 || rect.h < 82;
      const finalLines = useShort ? [sector.shortCode || sector.name] : lines.slice(0, maxNameLines);
      const totalNameHeight = finalLines.length * nameFont * 1.08;
      let startY = centerY - totalNameHeight / 2 + nameFont * 0.86;

      finalLines.forEach((line, idx) => {
        topText.push(`<tspan x="${centerX}" y="${startY + idx * nameFont * 1.08}">${escapeHtml(line)}</tspan>`);
      });

      if (rect.w >= 150 && rect.h >= 92) {
        topText.push(
          `<tspan class="sector-metric" x="${centerX}" y="${startY + finalLines.length * nameFont * 1.08 + metricFont * 1.35}">${formatTrillion(sector.displayBudgetTrillion2026)} · ${formatPct(sector.techLevelPct)}</tspan>`
        );
      } else if (rect.w >= 118 && rect.h >= 70) {
        topText.push(
          `<tspan class="sector-metric" x="${centerX}" y="${startY + finalLines.length * nameFont * 1.08 + metricFont * 1.2}">${formatPct(sector.techLevelPct)}</tspan>`
        );
      }

      const rankX = rect.x + 14 - rect.dx;
      const rankY = rect.y + 18 - rect.dy;

      return `
        <text class="sector-label" x="${centerX}" y="${centerY}" fill="${textColorFor(sector.color)}" style="font-size:${nameFont}px">
          ${topText.join('')}
        </text>
        <text class="sector-rank" x="${rankX}" y="${rankY}" fill="${textColorFor(sector.color)}">#${String(sector.budgetRank || '').padStart(2, '0')}</text>
      `;
    }

    function renderMap() {
      const { viewBox, layout } = buildMapLayout();
      const bgGrid = [];
      for (let i = 0; i < 6; i++) {
        const y = 940 + i * 26;
        bgGrid.push(`<line x1="150" y1="${y}" x2="1520" y2="${y}" stroke="rgba(255,255,255,0.045)" stroke-width="1" />`);
      }

      const groups = layout.map((rect) => {
        const s = rect.sector;
        const topFill = shade(s.color, 0.02);
        const frontFill = shade(s.color, -0.16);
        const sideFill = shade(s.color, -0.28);
        const top = [
          [rect.x - rect.dx, rect.y - rect.dy],
          [rect.x + rect.w - rect.dx, rect.y - rect.dy],
          [rect.x + rect.w - rect.dx, rect.y + rect.h - rect.dy],
          [rect.x - rect.dx, rect.y + rect.h - rect.dy]
        ];
        const front = [
          [rect.x, rect.y + rect.h],
          [rect.x + rect.w, rect.y + rect.h],
          [rect.x + rect.w - rect.dx, rect.y + rect.h - rect.dy],
          [rect.x - rect.dx, rect.y + rect.h - rect.dy]
        ];
        const side = [
          [rect.x + rect.w, rect.y],
          [rect.x + rect.w, rect.y + rect.h],
          [rect.x + rect.w - rect.dx, rect.y + rect.h - rect.dy],
          [rect.x + rect.w - rect.dx, rect.y - rect.dy]
        ];
        const cap = [
          [rect.x + 10 - rect.dx, rect.y + 10 - rect.dy],
          [rect.x + rect.w - 10 - rect.dx, rect.y + 10 - rect.dy],
          [rect.x + rect.w - rect.dx, rect.y + 24 - rect.dy],
          [rect.x - rect.dx, rect.y + 24 - rect.dy]
        ];
        const poly = (pts) => pts.map(p => p.join(',')).join(' ');
        const selectedClass = state.selectedSectorId === s.id ? ' is-selected' : '';
        return `
          <g class="sector-group${selectedClass}" data-sector-id="${s.id}">
            <polygon class="sector-front" points="${poly(front)}" fill="${frontFill}"></polygon>
            <polygon class="sector-side" points="${poly(side)}" fill="${sideFill}"></polygon>
            <polygon class="sector-top" points="${poly(top)}" fill="${topFill}"></polygon>
            <polygon class="sector-cap" points="${poly(cap)}"></polygon>
            <polygon class="sector-outline" points="${poly(top)}"></polygon>
            ${buildTopLabel(rect, s)}
          </g>
        `;
      }).join('');

      const markup = `
        <svg id="strategicMap" viewBox="0 0 ${viewBox.width} ${viewBox.height}" preserveAspectRatio="xMidYMid meet">
          <defs>
            <filter id="baseShadow" x="-40%" y="-40%" width="180%" height="180%">
              <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#03070f" flood-opacity="0.42"/>
            </filter>
            <filter id="hoverShadow" x="-40%" y="-40%" width="180%" height="180%">
              <feDropShadow dx="0" dy="36" stdDeviation="28" flood-color="#000000" flood-opacity="0.52"/>
            </filter>
            <filter id="selectedShadow" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="40" stdDeviation="30" flood-color="#000000" flood-opacity="0.56"/>
              <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ffffff" flood-opacity="0.28"/>
            </filter>
            <linearGradient id="floorGlow" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stop-color="rgba(255,255,255,0.03)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0.00)"/>
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="${viewBox.width}" height="${viewBox.height}" fill="transparent"></rect>
          <ellipse cx="860" cy="980" rx="650" ry="84" fill="rgba(0,0,0,0.24)"></ellipse>
          <g opacity="0.55">${bgGrid.join('')}</g>
          <g filter="url(#baseShadow)">${groups}</g>
        </svg>
      `;
      mapWrap.innerHTML = markup;
      bindSectorEvents();
    }

    function getSelectedSector() {
      return DATA.sectors.find(s => s.id === state.selectedSectorId) || null;
    }

    function renderMetricCard(label, value, sub = '') {
      return `
        <div class="metric-card">
          <span class="k">${escapeHtml(label)}</span>
          <div class="v">${value}</div>
          ${sub ? `<div class="sub">${escapeHtml(sub)}</div>` : ''}
        </div>
      `;
    }

    function renderTechTab(sector) {
      const techs = [...(sector.detailTechs || [])].sort((a, b) =>
        (b.displayBudgetMillion2026 || 0) - (a.displayBudgetMillion2026 || 0) || (b.techLevelPct || 0) - (a.techLevelPct || 0)
      );

      if (!techs.length) {
        return `<div class="empty">표시할 세부기술이 없습니다.</div>`;
      }

      return `
        <div class="tech-grid">
          ${techs.map(tech => {
            const pills = [];
            if (Number(tech.displayBudgetMillion2026 || 0) > 0) pills.push(`<span class="pill">예산 ${formatBudgetFromMillion(tech.displayBudgetMillion2026)}</span>`);
            pills.push(`<span class="pill">기술수준 ${formatPct(tech.techLevelPct)}</span>`);
            if (Number(tech.projectCount || 0) > 0) pills.push(`<span class="pill">사업 ${formatInt(tech.projectCount)}개</span>`);
            const fill = shade(sector.color, -0.12);
            return `
              <div class="tech-card">
                <div class="tech-title">${escapeHtml(tech.name)}</div>
                <div class="tech-meta">${pills.join('')}</div>
                <div class="tech-level-bar"><div class="tech-level-fill" style="width:${clamp(Number(tech.techLevelPct || 0), 0, 100)}%; background:${fill};"></div></div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function normalizeText(text) {
      return String(text || '').toLowerCase().replace(/\s+/g, '');
    }

    function renderProjectTab(sector) {
      const q = normalizeText(state.projectQuery);
      const projects = [...(sector.projects || [])]
        .sort((a, b) => (b.displayBudgetMillion2026 || 0) - (a.displayBudgetMillion2026 || 0))
        .filter(p => {
          if (!q) return true;
          const blob = normalizeText([
            p.program,
            p.subproject,
            p.ministry,
            p.mappedDetailTech,
            p.focusTech
          ].join(' '));
          return blob.includes(q);
        });

      return `
        <div class="search-row">
          <input id="projectSearchInput" class="search-input" type="text" placeholder="사업명 / 부처 검색" value="${escapeHtml(state.projectQuery)}" />
          <div class="search-count">${formatInt(projects.length)}건</div>
        </div>
        <div class="project-list">
          ${projects.length ? projects.map(project => {
            const sub = [
              project.ministry || null,
              project.subproject || null,
              (project.start || project.end) ? `${project.start || '—'}~${project.end || '계속'}` : null,
              project.mappedDetailTech || null
            ].filter(Boolean).join(' · ');
            return `
              <div class="project-card">
                <div class="project-top">
                  <div class="project-name">${escapeHtml(project.program || project.subproject || '사업명 없음')}</div>
                  <div class="project-budget">${formatBudgetFromMillion(project.displayBudgetMillion2026)}</div>
                </div>
                ${sub ? `<div class="project-sub">${escapeHtml(sub)}</div>` : ''}
              </div>
            `;
          }).join('') : `<div class="empty">검색 결과가 없습니다.</div>`}
        </div>
      `;
    }

    function renderMinistryTab(sector) {
      const ministries = (sector.topMinistries || []).filter(m => Number(m.displayBudgetMillion2026 || 0) > 0);
      if (!ministries.length) return `<div class="empty">표시할 부처 예산이 없습니다.</div>`;
      const max = Math.max(...ministries.map(m => Number(m.displayBudgetMillion2026 || 0)));
      return `
        <div class="ministry-list">
          ${ministries.map(m => {
            const pct = max ? (Number(m.displayBudgetMillion2026 || 0) / max) * 100 : 0;
            return `
              <div class="ministry-row">
                <div class="ministry-head">
                  <span>${escapeHtml(m.name)}</span>
                  <span>${formatBudgetFromMillion(m.displayBudgetMillion2026)}</span>
                </div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${shade(sector.color, -0.18)};"></div></div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function renderDrawer() {
      const sector = getSelectedSector();
      if (!sector) {
        drawerRoot.innerHTML = '';
        drawerEl.classList.remove('open');
        drawerEl.setAttribute('aria-hidden', 'true');
        drawerBackdrop.classList.remove('show');
        resetMapBtn.classList.remove('show');
        return;
      }

      const tabButtons = [
        ['techs', '세부기술'],
        ['projects', '관련사업'],
        ['ministries', '부처']
      ].map(([id, label]) =>
        `<button class="tab-btn ${state.activeTab === id ? 'active' : ''}" data-tab="${id}" type="button">${label}</button>`
      ).join('');

      const activePanel = state.activeTab === 'projects'
        ? renderProjectTab(sector)
        : state.activeTab === 'ministries'
          ? renderMinistryTab(sector)
          : renderTechTab(sector);

      drawerRoot.innerHTML = `
        <div class="drawer-header">
          <div class="drawer-color" style="background:${sector.color}"></div>
          <div style="min-width:0;">
            <div class="drawer-eyebrow">${escapeHtml(sector.shortCode || '')}</div>
            <h2 class="drawer-title">${escapeHtml(sector.name)}</h2>
          </div>
          <button class="drawer-close" id="drawerCloseBtn" type="button" aria-label="닫기">×</button>
        </div>
        <div class="drawer-body">
          <div class="metric-grid">
            ${renderMetricCard('2026 예산', formatTrillion(sector.displayBudgetTrillion2026), `전체의 ${sector.budgetSharePct.toFixed(1)}%`)}
            ${renderMetricCard('기술도달수준', formatPct(sector.techLevelPct), `높이 기준`)}
            ${renderMetricCard('세부기술', `${formatInt(sector.detailTechCount)}개`, '')}
            ${renderMetricCard('관련사업', `${formatInt(sector.projectsCount)}개`, '')}
          </div>
          <div class="tabs">${tabButtons}</div>
          <div class="tab-panel active">${activePanel}</div>
        </div>
      `;

      drawerEl.classList.add('open');
      drawerEl.setAttribute('aria-hidden', 'false');
      drawerBackdrop.classList.add('show');
      resetMapBtn.classList.add('show');

      const closeBtn = document.getElementById('drawerCloseBtn');
      if (closeBtn) closeBtn.addEventListener('click', clearSelection);

      drawerRoot.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.activeTab = btn.dataset.tab;
          if (state.activeTab !== 'projects') state.projectQuery = '';
          renderDrawer();
        });
      });

      const searchInput = document.getElementById('projectSearchInput');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          state.projectQuery = e.target.value || '';
          renderDrawer();
          const nextInput = document.getElementById('projectSearchInput');
          if (nextInput) {
            nextInput.focus();
            nextInput.setSelectionRange(state.projectQuery.length, state.projectQuery.length);
          }
        });
      }
    }

    function setSelectedSector(id) {
      state.selectedSectorId = id;
      state.activeTab = 'techs';
      state.projectQuery = '';
      renderMap();
      renderDrawer();
    }

    function clearSelection() {
      state.selectedSectorId = null;
      state.projectQuery = '';
      renderMap();
      renderDrawer();
    }

    function bindSectorEvents() {
      document.querySelectorAll('.sector-group').forEach(group => {
        group.addEventListener('click', () => {
          const id = Number(group.getAttribute('data-sector-id'));
          setSelectedSector(id);
        });
      });
    }

    function mountTopStats() {
      document.getElementById('kpi-total-budget').textContent = Number(DATA.meta.totalBudgetTrillion2026 || 0).toFixed(2);
      document.getElementById('kpi-sector-count').textContent = formatInt(DATA.meta.sectorCount || DATA.sectors.length);
      document.getElementById('kpi-detail-count').textContent = formatInt(DATA.meta.detailTechCount || 0);
      document.getElementById('kpi-project-count').textContent = formatInt(DATA.meta.totalProjects || 0);
    }

    drawerBackdrop.addEventListener('click', clearSelection);
    resetMapBtn.addEventListener('click', clearSelection);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') clearSelection();
    });

    mountTopStats();
    renderMap();
    renderDrawer();
  </script>
</body>
</html>
