<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국가전략기술 Strategic 3D Map</title>
  <script src="data.js"></script>
  <style>
    :root{
      --bg:#f4f8fe;
      --bg-grad:
        radial-gradient(circle at 12% 8%, rgba(125,198,255,.26), transparent 24%),
        radial-gradient(circle at 86% 10%, rgba(170,142,255,.18), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(110,220,190,.16), transparent 34%),
        linear-gradient(180deg,#f5faff 0%,#e2edf8 54%,#d4e3f4 100%);
      --panel:rgba(255,255,255,.88);
      --panel-strong:rgba(255,255,255,.98);
      --line:rgba(39,78,123,.14);
      --line-strong:rgba(39,78,123,.24);
      --text:#10243b;
      --text-dim:#58708a;
      --accent:#2d7eff;
      --accent-2:#7a6cff;
      --shadow:0 24px 60px rgba(29,64,104,.14);
      --radius:24px;
      --chip:rgba(28,64,102,.055);
      --scene-bg:linear-gradient(180deg,#f8fbff 0%,#e7f1fb 44%,#d7e5f6 100%);
      --scene-grid:rgba(76,114,161,.14);
      --scene-floor:#e4eef9;
      --label-bg:rgba(255,255,255,.99);
      --label-text:#0d2744;
      --label-line:rgba(56,101,156,.18);
      --canvas-shadow:rgba(16,34,55,.16);
      --good:#15b787;
      --danger:#ff6d85;
    }
    body.dark-mode{
      --bg:#0c1828;
      --bg-grad:
        radial-gradient(circle at 14% 10%, rgba(89,156,231,.20), transparent 24%),
        radial-gradient(circle at 84% 12%, rgba(131,112,255,.15), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(76,198,166,.10), transparent 34%),
        linear-gradient(180deg,#0c1828 0%,#163150 62%,#14283f 100%);
      --panel:rgba(11,21,35,.84);
      --panel-strong:rgba(11,21,35,.95);
      --line:rgba(171,201,232,.11);
      --line-strong:rgba(171,201,232,.20);
      --text:#eef6ff;
      --text-dim:#9ab2ca;
      --accent:#97ccff;
      --accent-2:#baa2ff;
      --shadow:0 24px 64px rgba(0,0,0,.30);
      --chip:rgba(255,255,255,.05);
      --scene-bg:linear-gradient(180deg,#122742 0%,#1a436b 62%,#173252 100%);
      --scene-grid:rgba(198,223,248,.13);
      --scene-floor:#244467;
      --label-bg:rgba(255,255,255,.95);
      --label-text:#102031;
      --label-line:rgba(74,116,171,.22);
      --canvas-shadow:rgba(0,0,0,.28);
      --good:#56deba;
      --danger:#ff89a0;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{
      font-family:"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
      color:var(--text);
      background:var(--bg-grad);
      background-attachment:fixed;
      overflow:auto;
    }
    button,input{font:inherit}
    .app{
      width:min(1720px, calc(100vw - 18px));
      margin:10px auto 16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .glass{
      background:var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border-radius:var(--radius);
    }
    .topbar{
      padding:16px 18px;
      display:grid;
      grid-template-columns:minmax(320px,1fr) auto;
      gap:14px;
      align-items:center;
    }
    .eyebrow{
      font-size:11px;
      font-weight:900;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--accent);
      margin-bottom:6px;
    }
    h1{
      margin:0;
      font-size:clamp(24px,2.2vw,36px);
      line-height:1.04;
      letter-spacing:-.05em;
    }
    .subtitle{
      margin-top:7px;
      color:var(--text-dim);
      font-size:13px;
      line-height:1.5;
      font-weight:700;
    }
    .top-actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap:8px;
      align-items:center;
    }
    .segmented{
      display:inline-flex;
      gap:6px;
      padding:5px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.08);
    }
    .btn, .seg-btn{
      border:none;
      outline:none;
      height:42px;
      border-radius:12px;
      padding:0 14px;
      font-weight:800;
      color:var(--text);
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06)), var(--panel-strong);
      border:1px solid var(--line-strong);
      box-shadow:0 10px 24px rgba(0,0,0,.04);
      cursor:pointer;
      transition:.18s ease;
      white-space:nowrap;
    }
    .seg-btn{height:38px}
    .btn:hover,.seg-btn:hover{transform:translateY(-1px); border-color:var(--accent)}
    .seg-btn.active,.btn.active{
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06)), var(--accent);
      color:#07111a;
      border-color:transparent;
    }
    .summary{
      overflow:hidden;
    }
    .summary-head{
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom:1px solid var(--line);
    }
    .summary-title{
      font-size:12px;
      font-weight:900;
      letter-spacing:.16em;
      color:var(--accent);
      text-transform:uppercase;
    }
    .summary-body{
      padding:14px;
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:10px;
    }
    .summary.collapsed .summary-body{display:none}
    .metric{
      min-width:0;
      padding:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:var(--chip);
    }
    .metric .k{
      font-size:11px;
      font-weight:900;
      color:var(--text-dim);
      letter-spacing:.06em;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .metric .v{
      font-size:26px;
      line-height:1;
      font-weight:900;
      letter-spacing:-.04em;
      white-space:nowrap;
    }
    .metric .s{
      margin-top:7px;
      font-size:11px;
      color:var(--text-dim);
      line-height:1.45;
    }
    .layout{
      display:grid;
      grid-template-columns:minmax(0,1.42fr) minmax(360px,.88fr);
      gap:12px;
      align-items:start;
    }
    .stage{
      overflow:hidden;
      min-width:0;
    }
    .stage-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      border-bottom:1px solid var(--line);
    }
    .stage-title-wrap{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }
    .stage-title{
      font-size:16px;
      font-weight:900;
      letter-spacing:-.02em;
    }
    .stage-sub{
      color:var(--text-dim);
      font-size:12px;
      font-weight:700;
      min-height:16px;
    }
    .status-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      padding:8px 12px;
      border-radius:999px;
      background:var(--chip);
      border:1px solid var(--line);
      font-size:12px;
      font-weight:800;
      color:var(--text-dim);
    }
    .status-dot{
      width:8px;height:8px;border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 0 6px rgba(42,124,255,.10);
      flex:none;
    }
    .scene-wrap{
      position:relative;
      background:var(--scene-bg);
      min-height:62vh;
      height:min(74vh, 860px);
      border-bottom:1px solid var(--line);
    }
    canvas{
      display:block;
      width:100%;
      height:100%;
      touch-action:none;
      cursor:grab;
    }
    canvas.dragging{cursor:grabbing}
    .labels{
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .map-label{
      position:absolute;
      transform:translate(-50%, -50%);
      padding:10px 14px 11px;
      border-radius:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.99), rgba(244,249,255,.96));
      color:var(--label-text);
      border:1px solid var(--label-line);
      box-shadow:0 14px 28px rgba(7,20,34,.12), 0 0 0 1px rgba(255,255,255,.72) inset;
      backdrop-filter:blur(8px);
      text-align:center;
      font-size:13px;
      line-height:1.22;
      min-width:98px;
      max-width:186px;
      opacity:0;
      transition:opacity .12s ease, transform .12s ease;
    }
    .map-label.visible{opacity:1}
    .map-label.active{transform:translate(-50%, -50%) scale(1.04)}
    .map-label .t{font-weight:900;letter-spacing:-.03em;font-size:13px}
    .map-label .s{font-size:11px;color:#486882;font-weight:900;margin-top:4px}
    .scene-bottom{
      padding:12px 14px 14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .sector-strip{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .sector-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--chip);
      font-size:12px;
      font-weight:800;
      color:var(--text-dim);
      cursor:pointer;
      transition:.18s ease;
      max-width:100%;
    }
    .sector-chip:hover{transform:translateY(-1px); border-color:var(--accent)}
    .sector-chip.active{
      color:var(--text);
      background:linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,.06)), var(--panel-strong);
      border-color:var(--accent);
      box-shadow:0 12px 28px rgba(42,124,255,.14);
    }
    .sector-chip .dot{
      width:10px;height:10px;border-radius:50%;flex:none;
      box-shadow:0 0 0 6px rgba(255,255,255,.16);
    }
    .panel{
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:320px;
      max-height:calc(100vh - 22px);
    }
    .panel-scroll{
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .empty-card{
      border-radius:22px;
      padding:18px;
      border:1px dashed var(--line-strong);
      background:var(--chip);
      color:var(--text-dim);
    }
    .sector-hero{
      padding:18px;
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.04)),
        var(--chip);
      border:1px solid var(--line);
    }
    .sector-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.34);
      border:1px solid var(--line);
      font-size:11px;
      font-weight:900;
      color:var(--text-dim);
      margin-bottom:10px;
    }
    .hero-name{
      font-size:28px;
      line-height:1.05;
      font-weight:900;
      letter-spacing:-.05em;
      margin:0 0 8px;
    }
    .hero-sub{
      color:var(--text-dim);
      font-size:13px;
      font-weight:700;
      line-height:1.5;
    }
    .mini-kpis{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }
    .mini-kpi{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:var(--chip);
      min-width:0;
    }
    .mini-kpi .k{
      font-size:11px;
      color:var(--text-dim);
      font-weight:900;
      text-transform:uppercase;
      margin-bottom:8px;
      letter-spacing:.06em;
    }
    .mini-kpi .v{
      font-size:23px;
      font-weight:900;
      letter-spacing:-.04em;
    }
    .mini-kpi .s{
      margin-top:6px;
      color:var(--text-dim);
      font-size:11px;
      line-height:1.4;
    }
    .section{
      border-radius:22px;
      border:1px solid var(--line);
      background:var(--chip);
      overflow:hidden;
    }
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      padding:14px 16px;
      border-bottom:1px solid var(--line);
    }
    .section-title{
      font-size:13px;
      font-weight:900;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:var(--accent);
    }
    .section-meta{
      color:var(--text-dim);
      font-size:12px;
      font-weight:800;
    }
    .section-body{padding:14px 16px}
    .tech-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .tech-row{
      border:none;
      width:100%;
      text-align:left;
      padding:12px 12px 11px;
      border-radius:16px;
      border:1px solid var(--line);
      background:var(--panel-strong);
      cursor:pointer;
      color:inherit;
      transition:.18s ease;
    }
    .tech-row:hover{transform:translateY(-1px); border-color:var(--accent)}
    .tech-row.active{
      border-color:var(--accent);
      box-shadow:0 12px 26px rgba(42,124,255,.14);
      background:linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,.06)), var(--panel-strong);
    }
    .tech-top{
      display:flex;
      gap:10px;
      justify-content:space-between;
      align-items:flex-start;
      margin-bottom:9px;
    }
    .tech-name{
      font-size:14px;
      font-weight:900;
      line-height:1.35;
      min-width:0;
    }
    .tech-level{
      flex:none;
      font-size:13px;
      font-weight:900;
      color:var(--accent);
      white-space:nowrap;
    }
    .level-track{
      height:12px;
      border-radius:999px;
      background:rgba(91,121,156,.14);
      overflow:hidden;
    }
    .level-fill{
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--good), var(--accent));
    }
    .tech-meta{
      margin-top:9px;
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(42,124,255,.10);
      color:var(--text-dim);
      border:1px solid var(--line);
      font-size:10px;
      font-weight:900;
    }
    .budget-compare{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .budget-row{
      display:grid;
      grid-template-columns:48px 1fr auto;
      gap:10px;
      align-items:center;
    }
    .budget-row .k{
      font-size:11px;
      font-weight:900;
      color:var(--text-dim);
      letter-spacing:.06em;
      text-transform:uppercase;
    }
    .bar{
      height:14px;
      border-radius:999px;
      background:rgba(91,121,156,.14);
      overflow:hidden;
    }
    .bar > span{
      display:block;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--accent-2), var(--accent));
    }
    .budget-row.now .bar > span{
      background:linear-gradient(90deg, var(--good), var(--accent));
    }
    .budget-row .v{
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .dept-bars{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .dept-row{
      display:grid;
      grid-template-columns:minmax(70px,auto) 1fr auto;
      gap:10px;
      align-items:center;
    }
    .dept-row .name{
      font-size:12px;
      font-weight:800;
      color:var(--text-dim);
    }
    .dept-row .track{
      height:10px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(91,121,156,.14);
    }
    .dept-row .track span{
      display:block;height:100%;border-radius:999px;
      background:linear-gradient(90deg, rgba(42,124,255,.58), rgba(126,105,255,.94));
    }
    .dept-row .val{
      font-size:11px;font-weight:900;white-space:nowrap;
    }
    .chip-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:12px;
    }
    .filter-chip{
      border:none;
      background:rgba(42,124,255,.10);
      border:1px solid var(--line);
      color:var(--text-dim);
      padding:8px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      cursor:pointer;
    }
    .filter-chip.active{
      background:var(--accent);
      color:#07111a;
      border-color:transparent;
    }
    .project-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .project-card{
      border-radius:18px;
      border:1px solid var(--line);
      background:var(--panel-strong);
      padding:12px;
    }
    .project-top{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-bottom:8px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border-radius:999px;
      background:var(--chip);
      border:1px solid var(--line);
      font-size:10px;
      font-weight:900;
      color:var(--text-dim);
    }
    .badge.focus{background:rgba(24,181,134,.10)}
    .badge.raw{background:rgba(255,109,133,.10)}
    .project-name{
      font-size:13px;
      font-weight:900;
      line-height:1.45;
      margin-bottom:6px;
    }
    .project-sub{
      font-size:12px;
      color:var(--text-dim);
      line-height:1.5;
      margin-bottom:10px;
    }
    .project-budgets{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }
    .project-budget{
      border-radius:14px;
      padding:10px;
      border:1px solid var(--line);
      background:var(--chip);
    }
    .project-budget .k{
      font-size:10px;
      color:var(--text-dim);
      font-weight:900;
      margin-bottom:5px;
      text-transform:uppercase;
    }
    .project-budget .v{
      font-size:12px;
      font-weight:900;
      line-height:1.25;
    }
    .more-btn{
      width:100%;
      border:none;
      border-radius:16px;
      padding:12px 14px;
      background:linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.06)), var(--panel-strong);
      border:1px solid var(--line);
      font-weight:900;
      color:var(--text);
      cursor:pointer;
    }
    .tooltip{
      position:fixed;
      z-index:40;
      pointer-events:none;
      opacity:0;
      transform:translate3d(0,0,0);
      transition:opacity .10s ease;
      min-width:160px;
      max-width:240px;
      padding:10px 12px;
      border-radius:14px;
      background:var(--label-bg);
      color:var(--label-text);
      border:1px solid var(--label-line);
      box-shadow:0 14px 30px rgba(7,20,34,.12);
    }
    .tooltip.visible{opacity:1}
    .tooltip .title{
      font-size:12px;font-weight:900;margin-bottom:6px;line-height:1.35;
    }
    .tooltip .row{
      display:flex;justify-content:space-between;gap:10px;
      font-size:11px;font-weight:800;color:#607890;
    }
    .mobile-only{display:none}
    @media (max-width: 1100px){
      .layout{grid-template-columns:1fr}
      .panel{max-height:none}
    }
    @media (max-width: 900px){
      .app{width:min(100vw - 10px, 100%); margin:8px auto 12px}
      .topbar{grid-template-columns:1fr; padding:14px}
      .top-actions{justify-content:flex-start}
      .summary-body{grid-template-columns:repeat(2,minmax(0,1fr))}
      .scene-wrap{height:54vh; min-height:420px}
      .mobile-only{display:inline-flex}
    }
    @media (max-width: 680px){
      .summary-body{grid-template-columns:1fr}
      .scene-wrap{height:50vh; min-height:360px}
      .hero-name{font-size:24px}
      .mini-kpis{grid-template-columns:1fr}
      .project-budgets{grid-template-columns:1fr}
      .stage-head{flex-direction:column; align-items:flex-start}
      .status-chip{width:100%}
      .sector-chip{max-width:100%}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar glass">
      <div>
        <div class="eyebrow">Korea Strategic Technology</div>
        <h1>국가전략기술 Strategic 3D Map</h1>
        <div class="subtitle">2026년 예산 기준 3D 맵 · 2025년 예산은 비교값으로 표시</div>
      </div>
      <div class="top-actions">
        <div class="segmented" role="tablist" aria-label="맵 보기 전환">
          <button id="viewSectors" class="seg-btn active" type="button">12대 분야</button>
          <button id="viewDetails" class="seg-btn" type="button">50대 상세</button>
        </div>
        <button id="summaryToggle" class="btn mobile-only" type="button">주요현황 펼치기</button>
        <button id="resetBtn" class="btn" type="button">시점 초기화</button>

        '자율주행시스템':'자율주행시스템',

        '소형 모듈원자로(SMR)':'소형모듈원자로(SMR)',

        '리튬이온 이차전지 및 핵심소재':'리튬이온전지 및 핵심소재',
        '리튬이온전지 및 핵심소재':'리튬이온전지 및 핵심소재'
      };

      const SECTOR_COLORS = {
        '인공지능':'#45C7F1',
        '첨단바이오':'#FF8EA1',
        '양자':'#A991FF',
        '우주항공해양':'#5E93FF',
        '반도체/디스플레이':'#48DBB9',
        '첨단모빌리티':'#FFB160',
        '첨단로봇제조':'#9FDC67',
        '차세대통신':'#59D9FF',
        '수소':'#68E6D7',

      const SHORT_CODES = {

        '첨단바이오':'바이오',

        '우주항공해양':'우주항공해양',
        '반도체/디스플레이':'반도체/디스플레이',
        '첨단모빌리티':'첨단모빌리티',
        '첨단로봇제조':'첨단로봇제조',
        '차세대통신':'차세대통신',
        '수소':'수소',
        '차세대원자력':'차세대원자력',
        '이차전지':'이차전지',
        '사이버보안':'사이버보안'
      };

      if (!RAW || !Array.isArray(RAW.sectors)) {
        document.body.innerHTML = '<div style="padding:24px;color:#10243b;font-family:sans-serif">data.js를 읽지 못했습니다.</div>';
        return;
      }

      function num(v){
        const n = Number(v);
        return Number.isFinite(n) ? n : 0;
      }
      function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
      function escapeHtml(str){
        return String(str ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
      function formatInt(v){ return num(v).toLocaleString('ko-KR'); }
      function formatPct(v){ return `${num(v).toFixed(1)}%`; }
      function formatSignedPct(v){
        const n = num(v);
        return `${n > 0 ? '+' : ''}${n.toFixed(1)}%`;
      }
      function formatTrillion(v){ return `${num(v).toFixed(2)}조원`; }
      function formatBudgetMillion(v){
        const n = num(v);
        if (n >= 1000000) return `${(n / 1000000).toFixed(2)}조원`;
        if (n >= 10000) return `${(n / 100).toLocaleString('ko-KR', { maximumFractionDigits: 0 })}억원`;
        if (n >= 100) return `${(n / 100).toLocaleString('ko-KR', { maximumFractionDigits: 1 })}억원`;
        return `${n.toLocaleString('ko-KR', { maximumFractionDigits: 1 })}백만원`;
      }
      function normalizeName(name){
        const key = String(name || '').trim();
        return NAME_FIX[key] || key;
      }
      function normalizeText(text){
        return String(text || '').replace(/\s+/g, '').toLowerCase();
      }
      function hexToRgb(hex){
        const value = String(hex || '#000000').replace('#','');
        const normal = value.length === 3 ? value.split('').map(c => c + c).join('') : value;
        const int = parseInt(normal, 16);
        return { r:(int >> 16) & 255, g:(int >> 8) & 255, b:int & 255 };
      }
      function rgbToHex(rgb){
        const toHex = (v) => clamp(Math.round(v), 0, 255).toString(16).padStart(2,'0');
        return `#${toHex(rgb.r)}${toHex(rgb.g)}${toHex(rgb.b)}`;
      }
      function mix(hex, toHexColor, t){
        const a = hexToRgb(hex), b = hexToRgb(toHexColor);
        return rgbToHex({
          r: a.r + (b.r - a.r) * t,
          g: a.g + (b.g - a.g) * t,
          b: a.b + (b.b - a.b) * t
        });
      }
      function lighten(hex, t){ return mix(hex, '#ffffff', t); }
      function darken(hex, t){ return mix(hex, '#000000', t); }

      function normalizeData(raw){
        const meta = {
          totalBudgetTrillion2026: num(raw.meta?.totalBudgetTrillion2026) || 8.61,
          totalBudgetTrillion2025: num(raw.meta?.totalBudgetTrillion2025) || 6.52,
          sectorCount: num(raw.meta?.sectorCount) || (raw.sectors || []).length,
          detailTechCount: num(raw.meta?.detailTechCount),
          totalProjects: num(raw.meta?.totalProjects),
          averageTechLevelPct: num(raw.meta?.averageTechLevelPct),
          sourceFile: raw.meta?.sourceFile || ''
        };

        const sectors = (raw.sectors || []).map((sector) => {
          const color = SECTOR_COLORS[sector.name] || sector.color || '#7ea8ff';
          const detailTechs = (sector.detailTechs || []).map((detail) => ({
            name: normalizeName(detail.name || '세부기술 미상'),
            techLevelPct: num(detail.techLevelPct),
            budgetMillion2025: num(detail.budgetMillion2025),
            budgetMillion2026: num(detail.budgetMillion2026),
            projectCount: num(detail.projectCount),
            mapped: detail.mapped !== false
          }));

          const projects = (sector.projects || []).map((project) => {
            const mappedDetailTech = normalizeName(project.mappedDetailTech || project.focusTechRaw || project.focusTech || '');
            return {
              ministry: project.ministry || '',
              program: project.program || '',
              subproject: project.subproject || '',
              start: project.start ?? '',
              end: project.end ?? '',
              category: project.category || '',
              subCategory: project.subCategory || '',
              focusTechRaw: project.focusTechRaw || '',
              detailTech: mappedDetailTech || '',
              budgetMillion2025: num(project.budgetMillion2025),
              budgetMillion2026: num(project.budgetMillion2026)
            };
          });

          detailTechs.forEach((detail) => {
            if (!detail.projectCount) {
              detail.projectCount = projects.filter((project) => project.detailTech === detail.name).length;
            }
          });

          const departmentBudgets = ((sector.departmentBudgets && sector.departmentBudgets.length ? sector.departmentBudgets : sector.topMinistries) || []).map((item) => ({
            name: item.name || '',
            budgetMillion2025: num(item.budgetMillion2025),
            budgetMillion2026: num(item.budgetMillion2026),
            projectCount: num(item.projectCount)
          })).sort((a, b) => b.budgetMillion2026 - a.budgetMillion2026);

          const unmatchedProjectsCount = projects.filter((project) => !project.detailTech).length;

          return {
            id: num(sector.id),
            name: sector.name || '',
            shortCode: SHORT_CODES[sector.name] || sector.shortCode || sector.name,
            color,
            budgetTrillion2025: num(sector.budgetTrillion2025),
            budgetTrillion2026: num(sector.budgetTrillion2026),
            budgetMillion2025: num(sector.budgetMillion2025),
            budgetMillion2026: num(sector.budgetMillion2026),
            growthPct: num(sector.growthPct),
            techLevelPct: num(sector.techLevelPct),
            projectsCount: num(sector.projectsCount) || projects.length,
            detailTechCount: num(sector.detailTechCount) || detailTechs.length,
            mappedProjectsCount: num(sector.mappedProjectsCount),
            mappingCoveragePct: num(sector.mappingCoveragePct),
            hasFocusTechMapping: Boolean(sector.hasFocusTechMapping),
            unmatchedFocusTechs: sector.unmatchedFocusTechs || [],
            unmatchedProjectsCount,
            departmentBudgets,
            detailTechs,
            projects
          };
        });

        return { meta, sectors };
      }

      const DATA = normalizeData(RAW);
      const sectors = DATA.sectors;
      const sectorById = new Map(sectors.map((sector) => [sector.id, sector]));

      const state = {
        view: VIEW_SECTORS,
        selectedSectorId: null,
        hoveredKey: null,
        hoveredPayload: null,
        activeFilter: FILTER_ALL,
        projectLimit: 16,
        dragging: false,
        pointerDown: false,
        lastX: 0,
        lastY: 0,
        yaw: -0.64,
        pitch: 0.54,
        zoom: 1.03,
        dpr: Math.min(window.devicePixelRatio || 1, 2),
        width: 0,
        height: 0,
        needsRender: true,
        labelMap: new Map(),
        interactiveFaces: [],
        lastRenderScene: null,
        theme: localStorage.getItem('strategic-map-theme') === 'dark' ? 'dark' : 'light',
        summaryCollapsed: window.innerWidth <= 900
      };

      function setTheme(mode){
        state.theme = mode;
        document.body.classList.toggle('dark-mode', mode === 'dark');
        themeToggle.textContent = mode === 'dark' ? '☀️ 라이트' : '🌙 다크';
        localStorage.setItem('strategic-map-theme', mode);
        requestRender();
      }
      setTheme(state.theme);
      summaryPanel.classList.toggle('collapsed', state.summaryCollapsed);
      summaryToggle.textContent = state.summaryCollapsed ? '주요현황 펼치기' : '주요현황 접기';

      function buildSummary(){
        const cards = [
          { label: '2026 총예산', value: formatTrillion(DATA.meta.totalBudgetTrillion2026), sub: '화면 총계 표시는 8.61조원 기준' },
          { label: '2025 총예산', value: formatTrillion(DATA.meta.totalBudgetTrillion2025), sub: '비교값 6.52조원' },
          { label: '전략기술 분야', value: `${DATA.meta.sectorCount}개`, sub: '12대 분야' },
          { label: '세부 중점기술', value: `${DATA.meta.detailTechCount}개`, sub: '50대 세부기술' },
          { label: '관련사업', value: formatInt(DATA.meta.totalProjects), sub: 'data.js 기준 사업 수' }
        ];
        summaryBody.innerHTML = cards.map((card) => `
          <article class="metric">
            <div class="k">${escapeHtml(card.label)}</div>
            <div class="v">${escapeHtml(card.value)}</div>
            <div class="s">${escapeHtml(card.sub)}</div>
          </article>
        `).join('');
      }

      function buildSectorStrip(){
        sectorStrip.innerHTML = sectors.map((sector) => `
          <button type="button" class="sector-chip ${state.selectedSectorId === sector.id ? 'active' : ''}" data-sector="${sector.id}">
            <span class="dot" style="background:${sector.color}"></span>
            <span>${escapeHtml(sector.name)}</span>
          </button>
        `).join('');
      }

      function binaryTreemap(items, x, z, width, depth){
        const result = [];
        const gap = 2.4;

        function recurse(list, rx, rz, rw, rd){
          if (!list.length || rw <= 0 || rd <= 0) return;
          if (list.length === 1) {
            result.push({ item: list[0], x: rx, z: rz, width: rw, depth: rd });
            return;
          }
          const total = list.reduce((sum, item) => sum + item.value, 0);
          let running = 0;
          let splitIndex = 0;
          let best = Infinity;
          for (let i = 0; i < list.length - 1; i += 1) {
            running += list[i].value;
            const diff = Math.abs(total / 2 - running);
            if (diff <= best) {
              best = diff;
              splitIndex = i;
            }
          }
          const groupA = list.slice(0, splitIndex + 1);
          const groupB = list.slice(splitIndex + 1);
          const sumA = groupA.reduce((sum, item) => sum + item.value, 0);
          const ratio = sumA / total;

          if (rw >= rd) {
            const widthA = rw * ratio;
            recurse(groupA, rx, rz, Math.max(4, widthA - gap / 2), rd);
            recurse(groupB, rx + widthA + gap / 2, rz, Math.max(4, rw - widthA - gap / 2), rd);
          } else {
            const depthA = rd * ratio;
            recurse(groupA, rx, rz, rw, Math.max(4, depthA - gap / 2));
            recurse(groupB, rx, rz + depthA + gap / 2, rw, Math.max(4, rd - depthA - gap / 2));
          }
        }

        recurse(items, x, z, width, depth);
        return result;
      }

      function sectorHeight(level){
        const pct = clamp(num(level), 35, 100);
        return 22 + Math.pow(pct - 30, 1.22) * 2.9;
      }

      function detailHeight(level){
        const pct = clamp(num(level), 35, 100);
        return 26 + Math.pow(pct - 30, 1.20) * 3.2;
      }

      function makeBox(params){
        return Object.assign({
          type: 'box',
          baseY: 0,
          height: 20,
          color: '#7ea8ff',
          meta: {},
          accent: 0
        }, params);
      }

      function getSceneLayout(){
        if (state.view === VIEW_SECTORS) return buildSectorScene();
        return buildDetailScene();
      }

      function buildSectorScene(){
        const sorted = [...sectors].sort((a, b) => b.budgetTrillion2026 - a.budgetTrillion2026);
        const total = sorted.reduce((sum, sector) => sum + Math.max(sector.budgetTrillion2026, 0.05), 0);
        const areaWidth = 255;
        const areaDepth = 155;

        const layouts = binaryTreemap(
          sorted.map((sector) => ({ sector, value: Math.max(sector.budgetTrillion2026, 0.05) / total })),
          -areaWidth / 2,
          -areaDepth / 2,
          areaWidth,
          areaDepth
        );

        const objects = [];
        const labels = [];
        const floor = { width: areaWidth + 48, depth: areaDepth + 42 };
        objects.push(makeBox({
          x: 0, z: 0, width: floor.width, depth: floor.depth, baseY: -6, height: 8,
          color: getComputedStyle(document.body).getPropertyValue('--scene-floor').trim() || '#d9e6f4',
          kind: 'platform', platform: true, clickable: false
        }));

        layouts.forEach((layout, index) => {
          const sector = layout.item.sector;
          const w = Math.max(14, layout.width - 4);
          const d = Math.max(14, layout.depth - 4);
          const h = sectorHeight(sector.techLevelPct);
          const x = layout.x + layout.width / 2;
          const z = layout.z + layout.depth / 2;
          const selected = state.selectedSectorId === sector.id;
          const hover = state.hoveredPayload && state.hoveredPayload.type === 'sector' && state.hoveredPayload.sectorId === sector.id;
          objects.push(makeBox({
            kind: 'sector',
            x, z, width: w, depth: d, height: h, baseY: 0,
            color: sector.color,
            accent: selected ? 0.18 : hover ? 0.09 : 0,
            meta: { key: `sector:${sector.id}`, sectorId: sector.id, type: 'sector' }
          }));
          labels.push({
            key: `label-sector-${sector.id}`,
            x, y: h + 18, z,
            title: sector.name,
            sub: `${formatTrillion(sector.budgetTrillion2026)} · ${formatPct(sector.techLevelPct)}`,
            sectorId: sector.id
          });
        });

        return { objects, labels, floor };
      }

      function buildDetailScene(){
        const cols = 4;
        const gapX = 150;
        const gapZ = 118;
        const baseY = 0;
        const ordered = [...sectors].sort((a, b) => a.id - b.id);
        const centerOffsetX = (cols - 1) * gapX / 2;
        const rows = Math.ceil(ordered.length / cols);
        const centerOffsetZ = (rows - 1) * gapZ / 2;
        const objects = [];
        const labels = [];

        const floor = { width: cols * gapX + 110, depth: rows * gapZ + 110 };
        objects.push(makeBox({
          x: 0, z: 0, width: floor.width, depth: floor.depth, baseY: -8, height: 10,
          color: getComputedStyle(document.body).getPropertyValue('--scene-floor').trim() || '#d9e6f4',
          kind: 'platform', platform: true, clickable: false
        }));

        ordered.forEach((sector, idx) => {
          const col = idx % cols;
          const row = Math.floor(idx / cols);
          const cx = col * gapX - centerOffsetX;
          const cz = row * gapZ - centerOffsetZ;
          const islandWidth = 46 + Math.min(44, sector.budgetTrillion2026 * 16);
          const islandDepth = 32 + Math.min(28, sector.budgetTrillion2026 * 12);
          const selected = state.selectedSectorId === sector.id;
          const hover = state.hoveredPayload && state.hoveredPayload.sectorId === sector.id;

          objects.push(makeBox({
            kind:'island',
            x: cx, z: cz, width: islandWidth, depth: islandDepth, baseY, height: 10,
            color: darken(sector.color, 0.18),
            accent: selected ? 0.12 : hover ? 0.06 : 0,
            meta: { key: `island:${sector.id}`, sectorId: sector.id, type:'sector' }
          }));

          const weights = sector.detailTechs.map((detail, detailIndex) => ({
            detail,
            order: detailIndex,
            value: Math.max(detail.budgetMillion2026, detail.budgetMillion2025, sector.budgetMillion2026 / Math.max(1, sector.detailTechCount) * 0.35, 1)
          })).sort((a, b) => b.value - a.value || b.detail.techLevelPct - a.detail.techLevelPct);

          const pad = 4;
          const towerLayouts = binaryTreemap(
            weights,
            cx - islandWidth / 2 + pad,
            cz - islandDepth / 2 + pad,
            islandWidth - pad * 2,
            islandDepth - pad * 2
          );

          towerLayouts.forEach((layout, towerIndex) => {
            const detail = layout.item.detail;
            const tw = Math.max(6, layout.width - 1.8);
            const td = Math.max(6, layout.depth - 1.8);
            const th = detailHeight(detail.techLevelPct);
            const tx = layout.x + layout.width / 2;
            const tz = layout.z + layout.depth / 2;
            const detailSelected = selected && state.activeFilter === detail.name;
            const towerColor = lighten(sector.color, (towerIndex % 4) * 0.06);

            objects.push(makeBox({
              kind:'detail',
              x: tx, z: tz, width: tw, depth: td, baseY: 10, height: th,
              color: towerColor,
              accent: detailSelected ? 0.18 : hover ? 0.04 : 0,
              meta: { key: `detail:${sector.id}:${detail.name}`, sectorId: sector.id, detailName: detail.name, type:'detail' }
            }));
          });

          labels.push({
            key: `label-island-${sector.id}`,
            x: cx,
            y: 22,
            z: cz,
            title: sector.name,
            sub: `${sector.detailTechCount}개 세부기술`,
            sectorId: sector.id
          });
        });

        return { objects, labels, floor };
      }

      function rotatePoint(point){
        const cosy = Math.cos(state.yaw);
        const siny = Math.sin(state.yaw);
        const cosp = Math.cos(state.pitch);
        const sinp = Math.sin(state.pitch);

        const x1 = point.x * cosy - point.z * siny;
        const z1 = point.x * siny + point.z * cosy;
        const y2 = point.y * cosp - z1 * sinp;
        const z2 = point.y * sinp + z1 * cosp;

        return { x: x1, y: y2, z: z2 };
      }

      function projectPoint(point){
        const rotated = rotatePoint(point);
        const cameraDistance = 520;
        const focal = 1040 * state.zoom;
        const viewZ = rotated.z + cameraDistance;
        const safeZ = Math.max(40, viewZ);
        const scale = focal / safeZ;
        return {
          x: state.width / 2 + rotated.x * scale,
          y: state.height * 0.63 - rotated.y * scale,
          z: rotated.z,
          scale,
          visible: safeZ > 0
        };
      }

      function pointInPolygon(x, y, poly){
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
          const xi = poly[i].x, yi = poly[i].y;
          const xj = poly[j].x, yj = poly[j].y;
          const intersect = ((yi > y) !== (yj > y)) &&
            (x < (xj - xi) * (y - yi) / ((yj - yi) || 0.00001) + xi);
          if (intersect) inside = !inside;
        }
        return inside;
      }

      function drawFace(face, color){
        ctx.beginPath();
        face.screen.forEach((p, i) => {
          if (i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        if (face.name === 'top') {
          const xs = face.screen.map((p) => p.x);
          const ys = face.screen.map((p) => p.y);
          const grad = ctx.createLinearGradient(Math.min(...xs), Math.min(...ys), Math.max(...xs), Math.max(...ys));
          grad.addColorStop(0, 'rgba(255,255,255,.26)');
          grad.addColorStop(0.55, 'rgba(255,255,255,.10)');
          grad.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = grad;
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,.40)';
          ctx.lineWidth = 1.4;
        } else {
          ctx.strokeStyle = 'rgba(255,255,255,.20)';
          ctx.lineWidth = 1.05;
        }
        ctx.stroke();
      }

      function getBoxVertices(box){
        const x1 = box.x - box.width / 2;
        const x2 = box.x + box.width / 2;
        const z1 = box.z - box.depth / 2;
        const z2 = box.z + box.depth / 2;
        const y1 = box.baseY;
        const y2 = box.baseY + box.height;
        return [
          { x:x1, y:y1, z:z1 }, //0
          { x:x2, y:y1, z:z1 }, //1
          { x:x2, y:y1, z:z2 }, //2
          { x:x1, y:y1, z:z2 }, //3
          { x:x1, y:y2, z:z1 }, //4
          { x:x2, y:y2, z:z1 }, //5
          { x:x2, y:y2, z:z2 }, //6
          { x:x1, y:y2, z:z2 }  //7
        ];
      }

      function faceNormal(points){
        const [a,b,c] = points;
        const ab = { x:b.x - a.x, y:b.y - a.y, z:b.z - a.z };
        const ac = { x:c.x - a.x, y:c.y - a.y, z:c.z - a.z };
        return {
          x: ab.y * ac.z - ab.z * ac.y,
          y: ab.z * ac.x - ab.x * ac.z,
          z: ab.x * ac.y - ab.y * ac.x
        };
      }

      function normalizeVec(v){
        const len = Math.hypot(v.x, v.y, v.z) || 1;
        return { x:v.x / len, y:v.y / len, z:v.z / len };
      }

      function lightingColor(base, normal, accent){
        const n = normalizeVec(normal);
        const light = normalizeVec({ x:-0.48, y:0.82, z:-0.32 });
        const intensity = clamp(n.x * light.x + n.y * light.y + n.z * light.z, -1, 1);
        let color = base;
        if (intensity >= 0) color = lighten(color, 0.14 + intensity * 0.18 + accent);
        else color = darken(color, 0.10 + Math.abs(intensity) * 0.18 - accent * 0.2);
        return color;
      }

      function getVisibleFaces(box){
        const vertices = getBoxVertices(box);
        const viewVertices = vertices.map(rotatePoint);
        const screenVertices = vertices.map(projectPoint);
        const faces = [
          { name:'top', indices:[4,7,6,5] },
          { name:'north', indices:[0,1,5,4] },
          { name:'south', indices:[3,7,6,2] },
          { name:'west', indices:[0,4,7,3] },
          { name:'east', indices:[1,2,6,5] }
        ];

        const result = [];
        faces.forEach((face) => {
          const points3 = face.indices.map((i) => viewVertices[i]);
          const normal = faceNormal(points3);
          const center = points3.reduce((acc, p) => ({ x:acc.x + p.x / 4, y:acc.y + p.y / 4, z:acc.z + p.z / 4 }), { x:0, y:0, z:0 });
          const viewToCamera = { x:-center.x, y:-center.y, z:-(center.z + 560) };
          const visible = normal.x * viewToCamera.x + normal.y * viewToCamera.y + normal.z * viewToCamera.z > 0;
          if (!visible) return;
          const screen = face.indices.map((i) => screenVertices[i]);
          const depth = points3.reduce((sum, p) => sum + p.z, 0) / 4;
          result.push({
            name: face.name,
            points3,
            screen,
            depth,
            normal
          });
        });
        return { screenVertices, faces: result };
      }

      function drawShadow(box){
        const shadowY = box.baseY;
        const footprint = [
          { x:box.x - box.width / 2, y:shadowY, z:box.z - box.depth / 2 },
          { x:box.x + box.width / 2, y:shadowY, z:box.z - box.depth / 2 },
          { x:box.x + box.width / 2, y:shadowY, z:box.z + box.depth / 2 },
          { x:box.x - box.width / 2, y:shadowY, z:box.z + box.depth / 2 }
        ].map((p) => ({ x:p.x + box.height * 0.08, y:p.y, z:p.z + box.height * 0.04 }))
         .map(projectPoint);

        ctx.beginPath();
        footprint.forEach((p, idx) => {
          if (idx === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();
        ctx.fillStyle = box.kind === 'detail' ? 'rgba(13,28,46,.14)' : (box.kind === 'sector' || box.kind === 'island') ? 'rgba(13,28,46,.11)' : 'rgba(13,28,46,.07)';
        ctx.fill();
      }

      function renderScene(){
        state.needsRender = false;
        const rect = canvas.getBoundingClientRect();
        if (!rect.width || !rect.height) return;

        const dpr = state.dpr;
        if (canvas.width !== Math.round(rect.width * dpr) || canvas.height !== Math.round(rect.height * dpr)) {
          canvas.width = Math.round(rect.width * dpr);
          canvas.height = Math.round(rect.height * dpr);
        }
        state.width = rect.width;
        state.height = rect.height;

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, rect.width, rect.height);

        const bgGrad = ctx.createLinearGradient(0, 0, 0, rect.height);
        bgGrad.addColorStop(0, document.body.classList.contains('dark-mode') ? '#1d4d7e' : '#f8fbff');
        bgGrad.addColorStop(0.42, document.body.classList.contains('dark-mode') ? '#2b5f92' : '#deedf9');
        bgGrad.addColorStop(1, document.body.classList.contains('dark-mode') ? '#173252' : '#d6e4f5');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, rect.width, rect.height);

        const haze = ctx.createRadialGradient(rect.width * 0.52, rect.height * 0.26, 16, rect.width * 0.52, rect.height * 0.26, rect.width * 0.5);
        haze.addColorStop(0, document.body.classList.contains('dark-mode') ? 'rgba(255,255,255,.10)' : 'rgba(255,255,255,.88)');
        haze.addColorStop(0.26, document.body.classList.contains('dark-mode') ? 'rgba(255,255,255,.04)' : 'rgba(255,255,255,.36)');
        haze.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = haze;
        ctx.fillRect(0, 0, rect.width, rect.height);

        const scene = getSceneLayout();
        state.lastRenderScene = scene;
        state.interactiveFaces = [];

        drawGrid(scene.floor);
        scene.objects.forEach((box) => drawShadow(box));

        const renderFaces = [];
        scene.objects.forEach((box) => {
          const visible = getVisibleFaces(box);
          visible.faces.forEach((face) => {
            renderFaces.push({
              box,
              face,
              depth: face.depth
            });
          });
        });

        renderFaces.sort((a, b) => a.depth - b.depth);
        renderFaces.forEach((item) => {
          const color = lightingColor(item.box.color, item.face.normal, item.box.accent || 0);
          drawFace(item.face, color);

          if (item.box.meta && item.box.meta.key) {
            state.interactiveFaces.push({
              key: item.box.meta.key,
              payload: item.box.meta,
              depth: item.depth,
              poly: item.face.screen
            });
          }
        });

        updateLabels(scene.labels);
        updateStatus();
      }

      function drawGrid(floor){
        const width = floor.width;
        const depth = floor.depth;
        const step = state.view === VIEW_SECTORS ? 22 : 28;
        const floorColor = getComputedStyle(document.body).getPropertyValue('--scene-grid').trim() || 'rgba(67,104,149,.10)';

        ctx.lineWidth = 1;
        ctx.strokeStyle = floorColor;
        for (let x = -width / 2; x <= width / 2; x += step) {
          const a = projectPoint({ x, y:0, z:-depth / 2 });
          const b = projectPoint({ x, y:0, z: depth / 2 });
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
        for (let z = -depth / 2; z <= depth / 2; z += step) {
          const a = projectPoint({ x:-width / 2, y:0, z });
          const b = projectPoint({ x: width / 2, y:0, z });
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }

      function ensureLabel(key){
        if (state.labelMap.has(key)) return state.labelMap.get(key);
        const el = document.createElement('div');
        el.className = 'map-label';
        labelsLayer.appendChild(el);
        state.labelMap.set(key, el);
        return el;
      }

      function updateLabels(items){
        const used = new Set();
        items.forEach((item) => {
          const point = projectPoint({ x:item.x, y:item.y, z:item.z });
          const el = ensureLabel(item.key);
          el.innerHTML = `<div class="t">${escapeHtml(item.title)}</div><div class="s">${escapeHtml(item.sub)}</div>`;
          el.style.left = `${point.x}px`;
          el.style.top = `${point.y}px`;
          const inBounds = point.x > 30 && point.x < state.width - 30 && point.y > 20 && point.y < state.height - 20;
          el.classList.toggle('visible', inBounds);
          el.classList.toggle('active', item.sectorId === state.selectedSectorId);
          used.add(item.key);
        });

        Array.from(state.labelMap.entries()).forEach(([key, el]) => {
          if (!used.has(key)) {
            el.classList.remove('visible');
          }
        });
      }

      function updateStatus(){
        const selected = state.selectedSectorId ? sectorById.get(state.selectedSectorId) : null;
        const modeText = state.view === VIEW_SECTORS ? '12대 분야 보기' : '50대 상세 보기';
        statusChip.innerHTML = `<span class="status-dot"></span><span>${escapeHtml(modeText)}</span>${selected ? `<span>· ${escapeHtml(selected.name)}</span>` : ''}`;
        stageTitle.textContent = state.view === VIEW_SECTORS ? '12대 분야 3D 맵' : '50대 세부기술 3D 맵';
        stageSub.textContent = state.view === VIEW_SECTORS
          ? '면적은 2026 예산, 높이는 기술수준'
          : '분야별 섬 위에 50대 세부기술을 분리 배치';
      }

      function getSelectedSector(){
        return state.selectedSectorId != null ? sectorById.get(state.selectedSectorId) : null;
      }

      function getVisibleProjects(sector){
        const filter = state.activeFilter;
        if (filter === FILTER_ALL) return sector.projects;
        if (filter === FILTER_UNMAPPED) return sector.projects.filter((project) => !project.detailTech);
        return sector.projects.filter((project) => project.detailTech === filter);
      }

      function renderDepartmentBars(sector){
        const items = sector.departmentBudgets.slice(0, 8);
        const max = Math.max(...items.map((item) => item.budgetMillion2026), 1);

            <div class="val">${escapeHtml(formatBudgetMillion(item.budgetMillion2026))}</div>

        `).join('');

      function renderPanel(){
        const sector = getSelectedSector();
        buildSectorStrip();

        if (!sector) {
          const topSectors = [...sectors].sort((a, b) => b.budgetTrillion2026 - a.budgetTrillion2026).slice(0, 6);
          panelScroll.innerHTML = `

              <div style="font-size:22px;font-weight:900;letter-spacing:-.04em;margin-bottom:8px;">분야를 선택하면 상세 정보가 열립니다.</div>
              <div style="font-size:13px;line-height:1.6;">3D 맵이나 아래 칩을 눌러 세부 중점기술, 기술수준, 2025/2026 예산 비교, 관련사업 목록을 확인하세요.</div>

            <section class="section">
              <div class="section-head">
                <div class="section-title">예산 상위 분야</div>

              </div>
              <div class="section-body">
                <div class="dept-bars">
                  ${topSectors.map((item) => `
                    <div class="dept-row">
                      <div class="name">${escapeHtml(item.name)}</div>
                      <div class="track"><span style="width:${clamp(item.budgetTrillion2026 / Math.max(...topSectors.map((x) => x.budgetTrillion2026)) * 100, 0, 100)}%; background:linear-gradient(90deg, ${lighten(item.color, .08)}, ${darken(item.color, .06)});"></span></div>
                      <div class="val">${escapeHtml(formatTrillion(item.budgetTrillion2026))}</div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </section>
          `;
          return;
        }

        const detailTechs = [...sector.detailTechs].sort((a, b) => (b.techLevelPct - a.techLevelPct) || (b.projectCount - a.projectCount) || a.name.localeCompare(b.name, 'ko'));
        const maxBudget = Math.max(sector.budgetTrillion2026, sector.budgetTrillion2025, 0.01);
        const hasMapping = sector.hasFocusTechMapping && sector.detailTechs.some((detail) => detail.projectCount > 0);
        const visibleProjects = getVisibleProjects(sector);
        const limitedProjects = visibleProjects.slice(0, state.projectLimit);
        const moreVisible = visibleProjects.length > state.projectLimit;

        const filterChips = [];

          filterChips.push({ key: FILTER_ALL, label: '전체', count: sector.projects.length });

          });
          if (sector.unmatchedProjectsCount > 0) filterChips.push({ key: FILTER_UNMAPPED, label: '미매핑', count: sector.unmatchedProjectsCount });
        }

        panelScroll.innerHTML = `
          <section class="sector-hero">

            <div class="hero-sub">2026 예산 기준 3D 맵 · 2025 예산은 비교용으로 함께 표시</div>
          </section>

          <div class="mini-kpis">
            <article class="mini-kpi">
              <div class="k">2026 예산</div>
              <div class="v">${escapeHtml(formatTrillion(sector.budgetTrillion2026))}</div>
              <div class="s">3D 면적 기준</div>
            </article>
            <article class="mini-kpi">
              <div class="k">2025 예산</div>
              <div class="v">${escapeHtml(formatTrillion(sector.budgetTrillion2025))}</div>
              <div class="s">비교 기준</div>
            </article>
            <article class="mini-kpi">
              <div class="k">분야 기술수준</div>

              <div class="v">${escapeHtml(formatInt(sector.projects.length))}</div>
              <div class="s">과기1 / 과기2 분리 유지</div>

          <section class="section">
            <div class="section-head">
              <div class="section-title">세부 중점기술 · 기술수준</div>

            <div class="section-body">
              <div class="tech-list">
                ${detailTechs.map((detail) => `
                  <button type="button" class="tech-row ${state.activeFilter === detail.name ? 'active' : ''}" data-detail="${encodeURIComponent(detail.name)}">
                    <div class="tech-top">
                      <div class="tech-name">${escapeHtml(detail.name)}</div>

              <div class="budget-compare">

                  <div class="bar"><span style="width:${clamp(sector.budgetTrillion2025 / maxBudget * 100, 0, 100)}%"></span></div>

                </div>

                  <div class="k">증가율</div>

                  <div class="v">${escapeHtml(formatSignedPct(sector.growthPct))}</div>

          <section class="section">

              `).join('')}</div>` : ''}
              <div class="project-list">
                ${limitedProjects.length ? limitedProjects.map((project) => `
                  <article class="project-card">
                    <div class="project-top">
                      <span class="badge">${escapeHtml(project.ministry || '-')}</span>
                      ${project.detailTech ? `<span class="badge focus">${escapeHtml(project.detailTech)}</span>` : project.focusTechRaw ? `<span class="badge raw">${escapeHtml(project.focusTechRaw)}</span>` : ''}
                      <span class="badge">${escapeHtml(formatPeriod(project.start, project.end))}</span>

      function formatPeriod(start, end){
        const s = String(start ?? '').trim();
        const e = String(end ?? '').trim();
        if (!s && !e) return '기간 미상';
        if (!e || e === '#N/A') return `${s}~`;
        return `${s}~${e}`;
      }

      function selectSector(sectorId, filter){
        state.selectedSectorId = sectorId;
        state.projectLimit = 16;
        if (filter !== undefined) state.activeFilter = filter;
        else if (!sectorById.has(sectorId)) state.activeFilter = FILTER_ALL;
        renderPanel();
        requestRender();
      }

      function clearSelection(){
        state.selectedSectorId = null;
        state.activeFilter = FILTER_ALL;
        state.projectLimit = 16;
        renderPanel();
        requestRender();
      }

      function requestRender(){
        state.needsRender = true;
      }

      function detectHover(clientX, clientY){
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        const faces = [...state.interactiveFaces].sort((a, b) => b.depth - a.depth);
        let hit = null;
        for (const face of faces) {
          if (pointInPolygon(x, y, face.poly)) {
            hit = face;
            break;
          }
        }
        state.hoveredKey = hit ? hit.key : null;
        state.hoveredPayload = hit ? hit.payload : null;

        if (hit) {
          canvas.style.cursor = 'pointer';
          const payload = hit.payload;
          const sector = sectorById.get(payload.sectorId);
          tooltip.innerHTML = payload.type === 'detail'
            ? `<div class="title">${escapeHtml(payload.detailName)}</div><div class="row"><span>${escapeHtml(sector.name)}</span><strong>${escapeHtml(formatPct((sector.detailTechs.find((detail) => detail.name === payload.detailName) || {}).techLevelPct))}</strong></div>`
            : `<div class="title">${escapeHtml(sector.name)}</div><div class="row"><span>2026 예산</span><strong>${escapeHtml(formatTrillion(sector.budgetTrillion2026))}</strong></div><div class="row"><span>기술수준</span><strong>${escapeHtml(formatPct(sector.techLevelPct))}</strong></div>`;
          tooltip.style.left = `${clientX + 16}px`;
          tooltip.style.top = `${clientY + 16}px`;
          tooltip.classList.add('visible');
        } else {
          canvas.style.cursor = state.dragging ? 'grabbing' : 'grab';
          tooltip.classList.remove('visible');
        }
        requestRender();
      }

      function onPointerDown(clientX, clientY){
        state.pointerDown = true;
        state.dragging = false;
        state.lastX = clientX;
        state.lastY = clientY;
      }

      function onPointerMove(clientX, clientY){
        if (state.pointerDown) {
          const dx = clientX - state.lastX;
          const dy = clientY - state.lastY;
          if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
            state.dragging = true;
            canvas.classList.add('dragging');
            state.yaw += dx * 0.008;
            state.pitch = clamp(state.pitch + dy * 0.0045, 0.35, 1.08);
            state.lastX = clientX;
            state.lastY = clientY;
            tooltip.classList.remove('visible');
            requestRender();
          }
        } else {
          detectHover(clientX, clientY);
        }
      }

      function onPointerUp(clientX, clientY){
        const wasDragging = state.dragging;
        state.pointerDown = false;
        state.dragging = false;
        canvas.classList.remove('dragging');
        if (!wasDragging) {
          detectHover(clientX, clientY);
          const hit = state.hoveredPayload;
          if (hit) {
            if (hit.type === 'detail') {
              selectSector(hit.sectorId, hit.detailName);
            } else if (hit.type === 'sector') {
              selectSector(hit.sectorId, FILTER_ALL);
            }
          }
        }
      }

      function handleWheel(event){
        event.preventDefault();
        const delta = Math.sign(event.deltaY);
        state.zoom = clamp(state.zoom * (delta > 0 ? 0.92 : 1.08), 0.68, 1.72);
        requestRender();
      }

      function resize(){
        state.dpr = Math.min(window.devicePixelRatio || 1, 2);
        if (window.innerWidth <= 900 && !summaryPanel.classList.contains('user-open')) {
          state.summaryCollapsed = true;
          summaryPanel.classList.add('collapsed');
          summaryToggle.textContent = '주요현황 펼치기';
        }
        requestRender();
      }

      function loop(){
        if (state.needsRender) renderScene();
        requestAnimationFrame(loop);
      }

      viewSectorsBtn.addEventListener('click', () => {
        state.view = VIEW_SECTORS;
        state.yaw = -0.72;
        state.pitch = 0.66;
        state.zoom = 1;
        viewSectorsBtn.classList.add('active');
        viewDetailsBtn.classList.remove('active');
        requestRender();
      });

      viewDetailsBtn.addEventListener('click', () => {
        state.view = VIEW_DETAILS;
        state.yaw = -0.84;
        state.pitch = 0.72;
        state.zoom = 0.98;
        viewDetailsBtn.classList.add('active');
        viewSectorsBtn.classList.remove('active');
        requestRender();
      });

      themeToggle.addEventListener('click', () => {
        setTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark');
      });

      summaryToggle.addEventListener('click', () => {
        state.summaryCollapsed = !summaryPanel.classList.contains('collapsed');
        if (state.summaryCollapsed) {
          summaryPanel.classList.add('collapsed');
          summaryPanel.classList.remove('user-open');
          summaryToggle.textContent = '주요현황 펼치기';
        } else {
          summaryPanel.classList.remove('collapsed');
          summaryPanel.classList.add('user-open');
          summaryToggle.textContent = '주요현황 접기';
        }
      });

      resetBtn.addEventListener('click', () => {
        state.yaw = state.view === VIEW_SECTORS ? -0.72 : -0.84;
        state.pitch = state.view === VIEW_SECTORS ? 0.66 : 0.72;
        state.zoom = 1;
        requestRender();
      });

      sectorStrip.addEventListener('click', (event) => {
        const button = event.target.closest('[data-sector]');
        if (!button) return;
        selectSector(Number(button.dataset.sector), FILTER_ALL);
      });

      panelScroll.addEventListener('click', (event) => {
        const detailButton = event.target.closest('[data-detail]');
        if (detailButton) {
          const detailName = decodeURIComponent(detailButton.dataset.detail);
          state.activeFilter = state.activeFilter === detailName ? FILTER_ALL : detailName;
          state.projectLimit = 16;
          renderPanel();
          requestRender();
          return;
        }
        const filterButton = event.target.closest('[data-filter]');
        if (filterButton) {
          state.activeFilter = decodeURIComponent(filterButton.dataset.filter);
          state.projectLimit = 16;
          renderPanel();
          requestRender();
          return;
        }
        const moreButton = event.target.closest('#moreProjectsBtn');
        if (moreButton) {
          state.projectLimit += 20;
          renderPanel();
        }
      });

      canvas.addEventListener('mousedown', (event) => onPointerDown(event.clientX, event.clientY));
      window.addEventListener('mousemove', (event) => onPointerMove(event.clientX, event.clientY));
      window.addEventListener('mouseup', (event) => onPointerUp(event.clientX, event.clientY));
      canvas.addEventListener('mouseleave', () => { if (!state.pointerDown) tooltip.classList.remove('visible'); });
      canvas.addEventListener('wheel', handleWheel, { passive:false });

      canvas.addEventListener('touchstart', (event) => {
        const touch = event.touches[0];
        if (!touch) return;
        onPointerDown(touch.clientX, touch.clientY);
      }, { passive:true });

      canvas.addEventListener('touchmove', (event) => {
        const touch = event.touches[0];
        if (!touch) return;
        onPointerMove(touch.clientX, touch.clientY);
      }, { passive:true });

      canvas.addEventListener('touchend', (event) => {
        const touch = event.changedTouches[0];
        if (!touch) return;
        onPointerUp(touch.clientX, touch.clientY);
      }, { passive:true });

      window.addEventListener('resize', resize);

      buildSummary();
      renderPanel();
      buildSectorStrip();
      resize();
      requestRender();
      loop();
    })();
  </script>
</body>
</html>
