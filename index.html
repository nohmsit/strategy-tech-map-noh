  row.parentNode.insertBefore(accordion, row.nextSibling);
  // Trigger reflow then open
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      accordion.classList.add('open');
    });
  });
}

// ─── NOTE POPUP ───
function showNotePopup(name, note) {
  const overlay = document.getElementById('note-overlay');
  document.getElementById('note-popup-title').textContent = name;
  const body = document.getElementById('note-popup-body');
  if (note && note.trim()) {
    body.className = 'note-popup-body';
    body.textContent = note;
  } else {
    body.className = 'note-popup-empty';
    body.textContent = '등록된 상세 정보가 없습니다.';
  }
  overlay.classList.add('visible');
}

function hideNotePopup() {
  document.getElementById('note-overlay').classList.remove('visible');
}

document.getElementById('note-overlay').addEventListener('click', function(e) {
  if (e.target === this) hideNotePopup();
});
document.getElementById('note-popup-close').addEventListener('click', hideNotePopup);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') hideNotePopup();
});

// ─── BACK TO LIST ───
function goBackToList() {
  const prevView = state.prevView || 'overview';
  state.activeSector = null;
  state.view = prevView;
  state.prevView = null;
  buildSectorNav();
  render();
  document.querySelectorAll('.view-btn').forEach((b, i) => {
    b.classList.toggle('active', ['overview','matrix','stats'][i] === state.view);
  });
}

// ─── HOME NAVIGATION ───
function goHome() {
  pushHistoryState();
  state.view = 'overview';
  state.activeSector = null;
  state.searchQuery = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.view-btn').forEach((b, i) => {
    b.classList.toggle('active', i === 0);
  });
  buildSectorNav();
  render();
  window.scrollTo(0, 0);
}

// ─── THEME TOGGLE ───
function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('theme-toggle').innerHTML = '🌙 다크 모드';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('theme-toggle').innerHTML = '☀️ 라이트 모드';
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  localStorage.setItem('theme', next);
  applyTheme(next);
}

// Apply saved theme on load
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  applyTheme(saved);
})();

// ─── LAW DETAIL MODAL ───
const LAW_LINKS = {

    rule:   "https://www.law.go.kr/법령/국가첨단전략산업경쟁력강화및보호에관한특별조치법시행규칙"

    rule:   "https://www.law.go.kr/법령/산업기술의유출방지및보호에관한법률시행규칙"
  }

function openLawModal(lawId) {
  const law = TECH_DATA.meta.laws.find(l => l.id === lawId);
  if (!law) return;

  const detail = LAW_DETAILS[lawId];
  if (!detail) return;

  document.getElementById('law-modal-title').textContent = detail.title;

  // 법령 링크 설정
  const links = LAW_LINKS[lawId] || {};
  const lawLink = document.getElementById('law-modal-law-link');
  const decreeLink = document.getElementById('law-modal-decree-link');
  const ruleLink = document.getElementById('law-modal-rule-link');
  if (lawLink) lawLink.href = links.law || '#';
  if (decreeLink) decreeLink.href = links.decree || '#';
  if (ruleLink) {
    if (links.rule) { ruleLink.href = links.rule; ruleLink.style.display = 'inline'; }
    else { ruleLink.style.display = 'none'; }
  }

  // 본문 HTML 생성
  const bodyEl = document.getElementById('law-modal-body');
  let html = '';

  // 섹션별 렌더링
  detail.sections.forEach(sec => {
    html += `<div class="law-section">`;
    html += `<div class="law-section-heading">${sec.heading}</div>`;
    html += `<div class="law-section-content">${formatLawContent(sec.content)}</div>`;
    html += `</div>`;

    // "지정현황" 뒤에 분야명 표 삽입
    if ((sec.heading === '지정현황' || sec.heading === '지정 현황') && detail.fieldsTable) {
      html += renderFieldsTable(detail.fieldsTable);
    }

    // "기술선정" 관련 섹션 뒤에 절차 프로세스 삽입
    if (sec.heading.includes('기술선정') && detail.processTable) {
      html += renderProcessTable(detail.processTable);
    }

    // "주요 지원 현황" 뒤에 세액공제 표 삽입 (조특법만)
    if (sec.heading.includes('주요 지원') && detail.taxTable) {
      html += renderTaxTable(detail.taxTable);
    }
  });

  bodyEl.innerHTML = html;

  const overlay = document.getElementById('law-modal-overlay');
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

// 텍스트 포맷팅 (줄바꿈, 불릿, 들여쓰기)
function formatLawContent(text) {
  // HTML 이스케이프
  let escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // 줄 단위로 분리하여 들여쓰기 적용
  const lines = escaped.split('\n');
  const formatted = lines.map(line => {
    const trimmed = line.trim();
    if (!trimmed) return '<div style="height:6px;"></div>'; // 빈 줄 = 간격

    // 들여쓰기 레벨 판별
    let indent = 0;
    let styledLine = trimmed;

    if (trimmed.startsWith('▶')) {
      // 최상위: 들여쓰기 없음, ▶ 강조
      indent = 0;
      styledLine = trimmed.replace(/▶/g, '<span style="color:var(--accent);font-weight:600;">▶</span>');
    } else if (trimmed.startsWith('•') || trimmed.startsWith('·')) {
      // 1단계
      indent = 14;
    } else if (trimmed.startsWith('※')) {
      // 2단계
      indent = 24;
    } else if (trimmed.startsWith('*')) {
      // 2단계 (* 로 시작)
      indent = 24;
    } else if (/^\d+\)/.test(trimmed)) {
      // 번호 리스트 (1), 2) 등)
      indent = 24;
    } else {
      // 기본: continuation
      indent = 0;
    }

    // ▲ 강조 처리
    styledLine = styledLine.replace(/▲/g, '<span style="color:var(--accent);">▲</span>');

    return `<div style="padding-left:${indent}px;margin-bottom:3px;">${styledLine}</div>`;
  }).join('');

  return formatted;
}

// 분야명 표 렌더링
function renderFieldsTable(table) {
  // 카테고리별 병합 구조가 있는 경우 (조특법)
  if (table.categories) {
    let html = '<table class="law-fields-table">';
    table.categories.forEach(cat => {
      cat.rows.forEach((row, rowIdx) => {
        html += '<tr>';
        if (rowIdx === 0) {
          html += `<td class="law-fields-category" rowspan="${cat.rowspan}">${cat.name}</td>`;
        }
        row.forEach(cell => {
          html += `<td>${(cell || '').replace(/\n/g, '<br>')}</td>`;
        });
        html += '</tr>';
      });
    });
    html += '</table>';
    return html;
  }

  // 단순 표 구조 (다른 법령)
  let html = '<table class="law-fields-table">';
  table.rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => {
      html += `<td>${(cell || '').replace(/\n/g, '<br>')}</td>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  return html;
}

// 절차 프로세스 렌더링 (화살표 플로우)
function renderProcessTable(table) {
  let html = '<div class="law-process-flow">';
  table.steps.forEach((s, i) => {
    if (i > 0) html += '<div class="law-process-arrow">→</div>';
    html += `<div class="law-process-step">`;
    html += `<div class="law-process-step-name">${s.step}</div>`;
    html += `<div class="law-process-step-org">${(s.org || '').replace(/\n/g, '<br>')}</div>`;
    html += `</div>`;
  });
  html += '</div>';
  return html;
}

// 세액공제 표 렌더링 (조특법)
function renderTaxTable(table) {
  let html = '<div class="law-tax-section">';

  html += '<div class="law-tax-title">' + table.title + '</div>';
  html += '<div class="law-tax-grid">';

  // ── R&D 세액공제 표 ──
  html += '<table class="law-tax-table">';
  html += '<thead><tr>';
  html += '<th>R&D(%)</th><th>대</th><th>중견</th><th>중소</th>';
  html += '</tr></thead><tbody>';
  html += '<tr><td class="law-tax-label">일반</td><td>2</td><td>8</td><td>25</td></tr>';
  html += '<tr><td class="law-tax-label">신성장·원천기술</td><td colspan="2">20~30</td><td>30~40</td></tr>';
  html += '<tr><td class="law-tax-label">국가전략기술</td><td colspan="2">30~40</td><td>40~50</td></tr>';
  html += '</tbody></table>';

  // ── 시설투자 세액공제 표 ──
  html += '<table class="law-tax-table">';
  html += '<thead>';
  html += '<tr><th rowspan="2">시설투자(%)</th><th colspan="3">당기분</th><th rowspan="2">증가분</th></tr>';
  html += '<tr><th>대</th><th>중견</th><th>중소</th></tr>';
  html += '</thead><tbody>';
  html += '<tr><td class="law-tax-label">일반</td><td>1</td><td>5</td><td>10</td><td rowspan="3">10</td></tr>';
  html += '<tr><td class="law-tax-label">신성장·원천기술</td><td>3</td><td>6</td><td>12</td></tr>';
  html += '<tr><td class="law-tax-label">국가전략기술<sup>▲</sup></td><td colspan="2">15</td><td>25</td></tr>';
  html += '</tbody></table>';

  html += '</div>';

  if (table.note) {
    html += '<div class="law-tax-note">' + formatLawContent(table.note) + '</div>';
  }

  html += '</div>';
  return html;
}

function closeLawModal() {
  document.getElementById('law-modal-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLawModal();
});


if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(function(err) {
      console.warn('Service Worker registration failed:', err);
    });
  });
}

init();
