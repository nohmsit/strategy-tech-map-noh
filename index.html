<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>국가전략기술 Strategic 3D Map</title>
<script src="data.js"></script>
<style>
  :root{
    --bg:#eef5fb;
    --bg2:#ffffff;
    --bg3:#eaf2fa;
    --panel:rgba(255,255,255,.88);
    --panel-strong:rgba(255,255,255,.96);
    --line:rgba(39,90,140,.12);
    --line-strong:rgba(39,90,140,.20);
    --text:#14314d;
    --text-dim:#607b96;
    --accent:#2b7bbf;
    --accent-soft:rgba(43,123,191,.10);
    --shadow:0 18px 48px rgba(31,74,118,.14);
    --radius:22px;
    --safe: env(safe-area-inset-bottom, 0px);
  }
  body.dark-mode{
    --bg:#0d1c2b;
    --bg2:#13263a;
    --bg3:#183149;
    --panel:rgba(11,23,36,.84);
    --panel-strong:rgba(11,23,36,.94);
    --line:rgba(168,197,223,.10);
    --line-strong:rgba(168,197,223,.18);
    --text:#ecf6ff;
    --text-dim:#9ab5cf;
    --accent:#9ad7ff;
    --accent-soft:rgba(154,215,255,.12);
    --shadow:0 18px 52px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family: "Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 16% 10%, rgba(122,185,238,.22), transparent 25%),
      radial-gradient(circle at 82% 14%, rgba(167,147,255,.18), transparent 24%),
      radial-gradient(circle at 50% 100%, rgba(34,180,167,.16), transparent 36%),
      linear-gradient(180deg, var(--bg) 0%, #dfeaf5 100%);
    overflow:hidden;
  }
  body.dark-mode{
    background:
      radial-gradient(circle at 16% 10%, rgba(122,185,238,.18), transparent 25%),
      radial-gradient(circle at 82% 14%, rgba(167,147,255,.14), transparent 24%),
      radial-gradient(circle at 50% 100%, rgba(34,180,167,.10), transparent 36%),
      linear-gradient(180deg, var(--bg) 0%, #0b1724 100%);
  }
  .app{
    height:100%;
    display:grid;
    grid-template-rows:auto auto 1fr;
    gap:12px;
    padding:16px;
  }
  .glass{
    background:var(--panel);
    border:1px solid var(--line);
    box-shadow:var(--shadow);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius:var(--radius);
  }
  .topbar{
    display:grid;
    grid-template-columns:minmax(260px,1fr) auto;
    gap:14px;
    padding:18px 20px;
    align-items:center;
  }
  .eyebrow{
    font-size:11px;
    font-weight:800;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--accent);
    opacity:.9;
    margin-bottom:8px;
  }
  h1{
    margin:0;
    font-size:clamp(24px,2vw,34px);
    line-height:1.05;
    letter-spacing:-.04em;
    font-weight:900;
  }
  .subtitle{
    margin-top:8px;
    font-size:13px;
    color:var(--text-dim);
    font-weight:700;
  }
  .top-actions{
    display:flex;
    flex-direction:column;
    gap:10px;
    align-items:flex-end;
  }
  .segmented,
  .action-row{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;
    width:min(420px, 100%);
  }
  .action-row.secondary{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }
  .btn{
    border:none;
    outline:none;
    cursor:pointer;
    font:inherit;
    height:44px;
    border-radius:14px;
    background:rgba(255,255,255,.66);
    border:1px solid var(--line);
    color:var(--text);
    font-size:13px;
    font-weight:800;
    transition:.18s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.36);
  }
  body.dark-mode .btn{
    background:rgba(255,255,255,.05);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
  }
  .btn:hover{transform:translateY(-1px);border-color:var(--line-strong)}
  .btn.active{
    background:linear-gradient(180deg, rgba(43,123,191,.94), rgba(86,158,219,.94));
    color:#fff;
    border-color:rgba(43,123,191,.26);
    box-shadow:0 10px 24px rgba(43,123,191,.18);
  }
  .summary{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:12px;
    padding:14px;
  }
  body.summary-collapsed .summary{display:none}
  .summary-card{
    background:linear-gradient(180deg, rgba(255,255,255,.74), rgba(255,255,255,.44));
    border:1px solid var(--line);
    border-radius:18px;
    padding:14px 16px;
    min-width:0;
  }
  body.dark-mode .summary-card{
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  }
  .summary-label{
    font-size:11px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.10em;
    color:var(--text-dim);
    margin-bottom:8px;
  }
  .summary-value{
    font-size:clamp(18px,1.5vw,26px);
    line-height:1.05;
    letter-spacing:-.03em;
    font-weight:900;
  }
  .stage{
    min-height:0;
    display:grid;
    grid-template-columns:minmax(0,1fr);
    gap:14px;
  }
  body.panel-open .stage{
    grid-template-columns:minmax(0,1fr) 400px;
  }
  .map-shell{
    position:relative;
    overflow:hidden;
    min-height:0;
    padding:10px;
    background:
      radial-gradient(circle at 50% 30%, rgba(255,255,255,.44), transparent 26%),
      linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0) 18%),
      linear-gradient(180deg, rgba(255,255,255,.02), transparent 28%, transparent 72%, rgba(255,255,255,.06));
  }
  body.dark-mode .map-shell{
    background:
      radial-gradient(circle at 50% 30%, rgba(154,215,255,.10), transparent 26%),
      linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0) 18%),
      linear-gradient(180deg, rgba(255,255,255,.02), transparent 28%, transparent 72%, rgba(255,255,255,.03));
  }
  .map-hud{
    position:absolute;
    top:16px;
    left:16px;
    right:16px;
    z-index:4;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    pointer-events:none;
  }
  .hud-chip{
    pointer-events:auto;
    padding:10px 12px;
    border-radius:14px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.76);
    font-size:12px;
    font-weight:800;
    color:var(--text-dim);
  }
  body.dark-mode .hud-chip{background:rgba(11,23,36,.72)}
  .hud-chip strong{color:var(--text)}
  #mapSvg{
    width:100%;
    height:100%;
    display:block;
    touch-action:none;
  }
  .labels-layer{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:3;
  }
  .sector-label{
    position:absolute;
    transform:translate(-50%,-50%);
    min-width:104px;
    max-width:160px;
    padding:10px 12px 11px;
    border-radius:16px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.82);
    box-shadow:0 10px 22px rgba(34,82,128,.10);
    text-align:center;
    pointer-events:auto;
    cursor:pointer;
    user-select:none;
    transition:.16s ease;
  }
  body.dark-mode .sector-label{
    background:rgba(11,23,36,.78);
    box-shadow:0 10px 22px rgba(0,0,0,.18);
  }
  .sector-label:hover{transform:translate(-50%,-54%)}
  .sector-label.active{
    border-color:rgba(43,123,191,.40);
    box-shadow:0 14px 26px rgba(43,123,191,.18);
  }
  .sector-label .name{
    font-size:13px;
    font-weight:900;
    line-height:1.18;
    letter-spacing:-.02em;
  }
  .sector-label .meta{
    margin-top:5px;
    font-size:11px;
    color:var(--text-dim);
    font-weight:800;
  }
  .panel{
    min-height:0;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .panel.hidden{display:none}
  .panel-head{
    padding:18px 18px 14px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:flex-start;
    gap:12px;
  }
  .panel-color{
    width:16px;height:16px;border-radius:6px;flex:0 0 auto;margin-top:8px;
    box-shadow:0 0 0 3px rgba(255,255,255,.16);
  }
  .panel-kicker{
    font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)
  }
  .panel-title{
    margin-top:6px;font-size:28px;line-height:1.04;letter-spacing:-.04em;font-weight:900
  }
  .panel-subtitle{
    margin-top:8px;font-size:13px;color:var(--text-dim);font-weight:700
  }
  .close-btn{
    width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:transparent;
    color:var(--text);font-size:18px;font-weight:700;cursor:pointer;flex:0 0 auto
  }
  .panel-body{
    min-height:0;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    padding:16px 18px calc(16px + var(--safe));
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .section{
    border-radius:20px;
    border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,.28));
    padding:16px;
  }
  body.dark-mode .section{
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  }
  .section-title{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    font-size:13px;font-weight:900;letter-spacing:-.02em;margin-bottom:12px
  }
  .section-sub{
    font-size:11px;color:var(--text-dim);font-weight:800
  }
  .hero-grid{
    display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px
  }
  .hero-card{
    padding:14px;border-radius:16px;border:1px solid var(--line);
    background:rgba(255,255,255,.48);min-width:0
  }
  body.dark-mode .hero-card{background:rgba(255,255,255,.05)}
  .hero-card .label{
    font-size:11px;color:var(--text-dim);font-weight:800;letter-spacing:.08em;text-transform:uppercase
  }
  .hero-card .value{
    margin-top:6px;font-size:22px;line-height:1.05;font-weight:900;letter-spacing:-.04em
  }
  .hero-card .meta{
    margin-top:6px;font-size:12px;color:var(--text-dim);font-weight:700
  }
  .inline-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .mini-btn{
    height:38px;padding:0 12px;border-radius:12px;border:1px solid var(--line);
    background:rgba(255,255,255,.56);color:var(--text);font:inherit;font-size:12px;font-weight:800;cursor:pointer
  }
  body.dark-mode .mini-btn{background:rgba(255,255,255,.05)}
  .tech-list,.ministry-list,.project-list{display:flex;flex-direction:column;gap:10px}
  .tech-item{
    width:100%;text-align:left;border:none;cursor:pointer;
    padding:14px;border-radius:18px;border:1px solid var(--line);
    background:rgba(255,255,255,.50);color:var(--text);transition:.16s ease
  }
  body.dark-mode .tech-item{background:rgba(255,255,255,.04)}
  .tech-item:hover{transform:translateY(-1px)}
  .tech-item.active{border-color:rgba(43,123,191,.34);box-shadow:0 10px 22px rgba(43,123,191,.14)}
  .tech-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .tech-name{font-size:14px;font-weight:900;line-height:1.4;letter-spacing:-.02em}
  .tech-level{text-align:right;font-size:12px;font-weight:900;white-space:nowrap}
  .tech-level span{display:block;font-size:10px;color:var(--text-dim);font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
  .bar-track{
    position:relative;height:10px;border-radius:999px;background:rgba(39,90,140,.10);margin-top:10px;overflow:hidden
  }
  .bar-fill{
    position:absolute;inset:0 auto 0 0;border-radius:inherit;
    background:linear-gradient(90deg, rgba(43,123,191,.98), rgba(98,175,233,.98));
    box-shadow:0 0 14px rgba(43,123,191,.20)
  }
  body.dark-mode .bar-fill{
    background:linear-gradient(90deg, rgba(154,215,255,.98), rgba(202,234,255,.98));
    box-shadow:0 0 14px rgba(154,215,255,.18)
  }
  .tech-meta,.ministry-meta{
    margin-top:8px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--text-dim);font-weight:700
  }
  .note{
    padding:12px 14px;border-radius:16px;border:1px solid var(--line);
    background:var(--accent-soft);font-size:12px;font-weight:800;line-height:1.5;color:var(--text)
  }
  .ministry-item,.project-card{
    padding:14px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.50)
  }
  body.dark-mode .ministry-item, body.dark-mode .project-card{background:rgba(255,255,255,.04)}
  .ministry-top,.project-top{
    display:flex;justify-content:space-between;align-items:flex-start;gap:12px
  }
  .ministry-name,.project-name{font-size:14px;font-weight:900;line-height:1.38}
  .project-ministry{
    flex:0 0 auto;padding:6px 10px;border-radius:999px;background:rgba(43,123,191,.10);
    color:var(--accent);font-size:11px;font-weight:900;white-space:nowrap
  }
  .project-sub{margin-top:7px;font-size:12px;line-height:1.45;color:var(--text-dim)}
  .project-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:10px}
  .pill{
    padding:10px 12px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.32)
  }
  body.dark-mode .pill{background:rgba(255,255,255,.03)}
  .pill .k{font-size:10px;font-weight:800;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase}
  .pill .v{margin-top:4px;font-size:13px;font-weight:900}
  .empty{
    padding:16px;border-radius:16px;border:1px dashed var(--line-strong);
    color:var(--text-dim);font-size:13px;font-weight:700
  }
  .mono{font-variant-numeric:tabular-nums}
  @media (max-width: 1080px){
    .stage{grid-template-columns:1fr}
    .panel{
      position:fixed;left:12px;right:12px;bottom:12px;top:auto;max-height:72vh;z-index:20;
      transform:translateY(calc(100% + 20px));transition:transform .24s ease;
    }
    body.panel-open .panel{transform:translateY(0)}
    .panel.hidden{display:flex}
  }
  @media (max-width: 900px){
    .app{padding:12px}
    .topbar{grid-template-columns:1fr;gap:12px;padding:16px}
    .top-actions{align-items:stretch}
    .summary{grid-template-columns:repeat(2,minmax(0,1fr))}
    .action-row.secondary{grid-template-columns:repeat(2,minmax(0,1fr))}
  }
  @media (max-width: 640px){
    .app{gap:10px}
    h1{font-size:24px}
    .subtitle{font-size:12px}
    .summary{grid-template-columns:1fr 1fr;padding:12px}
    .summary-card{padding:12px 13px}
    .summary-value{font-size:18px}
    .segmented,.action-row{width:100%}
    .action-row.secondary{grid-template-columns:1fr}
    .hero-grid,.project-grid{grid-template-columns:1fr}
    .sector-label{min-width:92px;max-width:126px;padding:8px 10px}
    .sector-label .name{font-size:12px}
    .sector-label .meta{font-size:10px}
    .map-hud{top:12px;left:12px;right:12px}
    .hud-chip{padding:8px 10px;font-size:11px}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar glass">
    <div>
      <div class="eyebrow">Korea Strategic Technology</div>
      <h1>국가전략기술 3D 맵</h1>
      <div class="subtitle">면적 = 2026년 예산 · 높이 = 기술수준 · 2025년 예산은 비교용</div>
    </div>
    <div class="top-actions">
      <div class="segmented">
        <button class="btn active" id="modeSectorBtn" type="button">12대 분야 보기</button>
        <button class="btn" id="modeDetailBtn" type="button">50대 상세 보기</button>
      </div>
      <div class="action-row secondary">
        <button class="btn" id="summaryToggleBtn" type="button">주요현황 숨기기</button>
        <button class="btn" id="resetViewBtn" type="button">시점 초기화</button>
        <button class="btn" id="themeBtn" type="button">🌙 다크</button>
      </div>
    </div>
  </header>

  <section class="summary glass" id="summaryBar">
    <div class="summary-card">
      <div class="summary-label">전략기술 분야</div>
      <div class="summary-value mono" id="sumSectorCount">12개</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">세부 중점기술</div>
      <div class="summary-value mono" id="sumTechCount">50개</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">2026 총예산</div>
      <div class="summary-value mono" id="sumBudget26">8.61조원</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">2025 비교</div>
      <div class="summary-value mono" id="sumBudget25">6.52조원</div>
    </div>
  </section>

  <div class="stage" id="stage">
    <section class="map-shell glass" id="mapShell">
      <div class="map-hud">
        <div class="hud-chip" id="modeChip"><strong>12대 분야</strong> 요약 맵</div>
        <div class="hud-chip"><strong>드래그</strong>로 회전</div>
      </div>
      <svg id="mapSvg" aria-label="국가전략기술 3D 지도"></svg>
      <div class="labels-layer" id="labelsLayer"></div>
    </section>

    <aside class="panel glass hidden" id="detailPanel" aria-live="polite">
      <div class="panel-head">
        <div class="panel-color" id="panelColor"></div>
        <div style="min-width:0;flex:1">
          <div class="panel-kicker" id="panelKicker">전략기술 분야</div>
          <div class="panel-title" id="panelTitle">분야를 선택하세요</div>
          <div class="panel-subtitle" id="panelSubtitle">3D 맵에서 분야 또는 세부 중점기술을 클릭하면 상세 정보가 표시됩니다.</div>
        </div>
        <button class="close-btn" id="panelCloseBtn" type="button" aria-label="닫기">×</button>
      </div>
      <div class="panel-body" id="panelBody"></div>
    </aside>
  </div>
</div>

<script>
(function(){
  const DATA = window.STRATEGIC_MAP_DATA;
  if (!DATA || !Array.isArray(DATA.sectors)) {
    document.body.innerHTML = '<div style="padding:24px;font:16px sans-serif">data.js 구조를 읽지 못했습니다.</div>';
    return;
  }

  const refs = {
    body: document.body,
    mapShell: document.getElementById('mapShell'),
    svg: document.getElementById('mapSvg'),
    labelsLayer: document.getElementById('labelsLayer'),
    panel: document.getElementById('detailPanel'),
    panelColor: document.getElementById('panelColor'),
    panelKicker: document.getElementById('panelKicker'),
    panelTitle: document.getElementById('panelTitle'),
    panelSubtitle: document.getElementById('panelSubtitle'),
    panelBody: document.getElementById('panelBody'),
    panelCloseBtn: document.getElementById('panelCloseBtn'),
    modeSectorBtn: document.getElementById('modeSectorBtn'),
    modeDetailBtn: document.getElementById('modeDetailBtn'),
    summaryToggleBtn: document.getElementById('summaryToggleBtn'),
    resetViewBtn: document.getElementById('resetViewBtn'),
    themeBtn: document.getElementById('themeBtn'),
    summaryBar: document.getElementById('summaryBar'),
    modeChip: document.getElementById('modeChip'),
    sumSectorCount: document.getElementById('sumSectorCount'),
    sumTechCount: document.getElementById('sumTechCount'),
    sumBudget26: document.getElementById('sumBudget26'),
    sumBudget25: document.getElementById('sumBudget25')
  };

  const THEME_KEY = 'strategic-map-theme-v3';
  const SUMMARY_KEY = 'strategic-map-summary-v3';

  const state = {
    mode: 'sector',
    selectedSectorId: null,
    selectedTechName: null,
    panelOpen: false,
    yaw: -0.58,
    pitch: 0.94,
    dragging: false,
    dragStartX: 0,
    moved: false,
    renderQueued: false,
    theme: localStorage.getItem(THEME_KEY) || 'light',
    summaryCollapsed: (() => {
      const saved = localStorage.getItem(SUMMARY_KEY);
      if (saved === '1' || saved === '0') return saved === '1';
      return window.matchMedia && window.matchMedia('(max-width: 900px)').matches;
    })()
  };

  const layoutSlots = [
    { x: 0, z: 2 }, { x: -42, z: 18 }, { x: 42, z: 18 },
    { x: -12, z: -34 }, { x: 26, z: -34 }, { x: -70, z: 4 },
    { x: 72, z: 6 }, { x: -42, z: 54 }, { x: 44, z: 56 },
    { x: 0, z: 66 }, { x: -72, z: -28 }, { x: 72, z: -28 }
  ];

  const maxBudget = Math.max(...DATA.sectors.map(s => s.budgetTrillion2026 || 0), 1);
  const allTechBudgets = DATA.sectors.flatMap(s => s.detailTechs.map(t => t.budgetMillion2026 || 0));
  const maxTechBudget = Math.max(...allTechBudgets, 1);

  prepareData();
  bindUI();
  applyTheme(state.theme, false);
  applySummaryVisibility(false);
  renderSummary();
  requestRender();
  renderDefaultPanel();

  function prepareData(){
    const byBudget = [...DATA.sectors].sort((a, b) => b.budgetTrillion2026 - a.budgetTrillion2026);
    byBudget.forEach((sector, idx) => {
      sector._slot = layoutSlots[idx] || { x: idx * 18, z: 0 };
      sector._radius = 10 + Math.sqrt((sector.budgetTrillion2026 || 0) / maxBudget) * 16;
      sector._platformHeight = 6 + (sector.budgetTrillion2026 / maxBudget) * 3;
      sector._heroHeight = 20 + (sector.techLevelPct || 0) * 0.62;
      const sortedTechs = [...sector.detailTechs].sort((a,b) => (b.budgetMillion2026 || 0) - (a.budgetMillion2026 || 0) || (b.techLevelPct || 0) - (a.techLevelPct || 0));
      sortedTechs.forEach((tech, index) => {
        const ring = 0.18 + Math.floor(index / 4) * 0.15;
        const angle = (index * 1.82) + (sector.id * 0.28);
        const radius = Math.min(sector._radius * 0.60, sector._radius * ring + (index % 3) * 0.8);
        const share = tech.budgetMillion2026 > 0 ? tech.budgetMillion2026 / maxTechBudget : 0.15;
        tech._w = clamp(2.8 + Math.sqrt(share) * 4.2, 2.4, sector._radius * 0.42);
        tech._d = clamp(2.6 + Math.sqrt(share) * 3.4, 2.2, sector._radius * 0.36);
        tech._h = 11 + (tech.techLevelPct || 0) * 0.44;
        tech._x = Math.cos(angle) * radius;
        tech._z = Math.sin(angle) * radius * 0.82;
      });
      sector._detailTechsSorted = sortedTechs;
    });
  }

  function bindUI(){
    refs.modeSectorBtn.addEventListener('click', () => setMode('sector'));
    refs.modeDetailBtn.addEventListener('click', () => setMode('detail'));
    refs.summaryToggleBtn.addEventListener('click', () => {
      state.summaryCollapsed = !state.summaryCollapsed;
      applySummaryVisibility(true);
    });
    refs.resetViewBtn.addEventListener('click', () => {
      state.yaw = -0.58;
      state.pitch = 0.94;
      requestRender();
    });
    refs.themeBtn.addEventListener('click', () => {
      applyTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark', true);
      requestRender();
    });
    refs.panelCloseBtn.addEventListener('click', closePanel);

    refs.labelsLayer.addEventListener('click', (e) => {
      const button = e.target.closest('[data-sector-id]');
      if (!button) return;
      selectSector(Number(button.dataset.sectorId));
    });

    refs.svg.addEventListener('pointerdown', (e) => {
      state.dragging = true;
      state.dragStartX = e.clientX;
      state.moved = false;
      refs.svg.setPointerCapture(e.pointerId);
    });
    refs.svg.addEventListener('pointermove', (e) => {
      if (!state.dragging) return;
      const dx = e.clientX - state.dragStartX;
      if (Math.abs(dx) > 2) state.moved = true;
      state.yaw += dx * 0.0065;
      state.dragStartX = e.clientX;
      requestRender();
    });
    const stopDrag = (e) => {
      if (state.dragging) {
        try { refs.svg.releasePointerCapture(e.pointerId); } catch (_) {}
      }
      state.dragging = false;
    };
    refs.svg.addEventListener('pointerup', stopDrag);
    refs.svg.addEventListener('pointercancel', stopDrag);
    refs.svg.addEventListener('click', (e) => {
      if (state.moved) return;
      const target = e.target.closest('[data-hit-type]');
      if (!target) return;
      const type = target.dataset.hitType;
      const sectorId = Number(target.dataset.sectorId);
      if (type === 'sector') selectSector(sectorId);
      if (type === 'tech') selectTech(sectorId, target.dataset.techName);
    });

    window.addEventListener('resize', requestRender);
  }

  function renderSummary(){
    refs.sumSectorCount.textContent = `${DATA.meta.sectorCount}개`;
    refs.sumTechCount.textContent = `${DATA.meta.detailTechCount}개`;
    refs.sumBudget26.textContent = formatBudgetTrillion(DATA.meta.displayTotalBudgetTrillion2026);
    refs.sumBudget25.textContent = formatBudgetTrillion(DATA.meta.displayTotalBudgetTrillion2025);
  }

  function applyTheme(mode, persist){
    state.theme = mode;
    document.body.classList.toggle('dark-mode', mode === 'dark');
    refs.themeBtn.textContent = mode === 'dark' ? '☀️ 라이트' : '🌙 다크';
    if (persist) localStorage.setItem(THEME_KEY, mode);
  }

  function applySummaryVisibility(persist){
    document.body.classList.toggle('summary-collapsed', state.summaryCollapsed);
    refs.summaryToggleBtn.textContent = state.summaryCollapsed ? '주요현황 보기' : '주요현황 숨기기';
    if (persist) localStorage.setItem(SUMMARY_KEY, state.summaryCollapsed ? '1' : '0');
  }

  function setMode(mode){
    state.mode = mode === 'detail' ? 'detail' : 'sector';
    if (state.mode === 'sector') state.selectedTechName = null;
    refs.modeSectorBtn.classList.toggle('active', state.mode === 'sector');
    refs.modeDetailBtn.classList.toggle('active', state.mode === 'detail');
    refs.modeChip.innerHTML = state.mode === 'sector'
      ? '<strong>12대 분야</strong> 요약 맵'
      : '<strong>50대 세부기술</strong> 상세 맵';
    if (state.selectedSectorId) renderPanel();
    requestRender();
  }

  function selectSector(sectorId){
    state.selectedSectorId = Number(sectorId);
    state.selectedTechName = null;
    openPanel();
    renderPanel();
    requestRender();
  }

  function selectTech(sectorId, techName){
    state.selectedSectorId = Number(sectorId);
    state.selectedTechName = String(techName);
    if (state.mode !== 'detail') setMode('detail');
    openPanel();
    renderPanel();
    requestRender();
  }

  function openPanel(){
    state.panelOpen = true;
    refs.panel.classList.remove('hidden');
    document.body.classList.add('panel-open');
    requestRender();
  }

  function closePanel(){
    state.panelOpen = false;
    state.selectedSectorId = null;
    state.selectedTechName = null;
    refs.panel.classList.add('hidden');
    document.body.classList.remove('panel-open');

  function renderDefaultPanel(){
    refs.panelColor.style.background = '#9fbfe0';
    refs.panelKicker.textContent = 'Strategic Map';
    refs.panelTitle.textContent = '12대 전략기술';
    refs.panelSubtitle.textContent = '3D 맵에서 분야 또는 세부 중점기술을 클릭하면 상세 정보가 열립니다.';
    refs.panelBody.innerHTML = `
      <section class="section">
        <div class="section-title">
          <span>현재 보기</span>
          <span class="section-sub">${state.mode === 'sector' ? '12개 블록' : '50개 세부기술'}</span>
        </div>
        <div class="empty">
          현재 첫 화면은 12대 분야 기준 요약 3D 맵입니다. 상단의 <strong>${state.mode === 'sector' ? '50대 상세 보기' : '12대 분야 보기'}</strong> 버튼으로 전환할 수 있습니다.

          ${[...DATA.sectors].sort((a,b)=>b.budgetTrillion2026-a.budgetTrillion2026).map((sector, idx)=>`

  function renderPanel(){

          ${heroCard('2025 비교', budget25Text, tech ? '비교값' : `증감 ${formatSignedTrillion(sector.budgetTrillion2026 - sector.budgetTrillion2025)}`)}

      <section class="section">

        <div class="tech-list">
          ${[...sector.detailTechs].sort((a,b)=> (b.techLevelPct||0) - (a.techLevelPct||0) || (b.budgetMillion2026||0) - (a.budgetMillion2026||0)).map(item => renderTechRow(sector, item, tech && tech.name === item.name)).join('')}

        </div>
        ${tech && !tech.mapped ? `<div class="note">선택한 세부 중점기술과 직접 연결된 사업이 없어, 분야 전체 사업을 표시합니다.</div>` : ''}
        <div class="project-list">${renderProjectRows(sourceProjects.slice(0, 36))}</div>

    refs.panelBody.querySelector('#panelSectorModeBtn')?.addEventListener('click', ()=>setMode('sector'));
    refs.panelBody.querySelector('#panelDetailModeBtn')?.addEventListener('click', ()=>setMode('detail'));

  function renderTechRow(sector, tech, active){
    const budget26 = tech.mapped ? formatBudgetMixed(tech.budgetMillion2026) : '분야 단위 사업';
    const budget25 = tech.mapped ? formatBudgetMixed(tech.budgetMillion2025) : '분야 단위 사업';

      <button class="tech-item ${active ? 'active' : ''}" type="button" data-sector-id="${sector.id}" data-tech-name="${escapeAttr(tech.name)}">

          <div class="tech-level"><span>기술수준</span>${formatPercent(tech.techLevelPct)}</div>

  function renderMinistryRows(items){
    if (!items || !items.length) return '<div class="empty">부처별 예산 정보가 없습니다.</div>';

        <div class="ministry-meta">
          <span>2026 ${formatBudgetMixed(item.budgetMillion2026)}</span>
          <span>2025 ${formatBudgetMixed(item.budgetMillion2025)}</span>

  function renderProjectRows(items){

        </div>
        <div class="project-sub">${escapeHtml(project.subproject || '')}</div>
        <div class="project-grid">
          <div class="pill">
            <div class="k">2026 예산</div>
            <div class="v">${formatBudgetMixed(project.budgetMillion2026)}</div>

          <div class="pill">
            <div class="k">2025 비교</div>
            <div class="v">${formatBudgetMixed(project.budgetMillion2025)}</div>

  function heroCard(label, value, meta){
    return `
      <div class="hero-card">
        <div class="label">${escapeHtml(label)}</div>
        <div class="value">${escapeHtml(String(value))}</div>
        <div class="meta">${escapeHtml(meta)}</div>
      </div>
    `;
  }

  function requestRender(){
    if (state.renderQueued) return;
    state.renderQueued = true;
    requestAnimationFrame(() => {
      state.renderQueued = false;
      renderScene();
    });
  }

  function renderScene(){
    const rect = refs.mapShell.getBoundingClientRect();
    const width = Math.max(320, Math.round(rect.width));
    const height = Math.max(420, Math.round(rect.height));
    refs.svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

    const gridParts = [];
    for (let gx = -120; gx <= 120; gx += 20){
      gridParts.push(lineSvg(projectPoint({x:gx, y:0, z:-60}, width, height), projectPoint({x:gx, y:0, z:110}, width, height), 'rgba(80,126,170,.16)'));
    }
    for (let gz = -60; gz <= 110; gz += 20){
      gridParts.push(lineSvg(projectPoint({x:-120, y:0, z:gz}, width, height), projectPoint({x:120, y:0, z:gz}, width, height), 'rgba(80,126,170,.16)'));
    }

    const faceParts = [];
    const faces = [];
    const labels = [];

    DATA.sectors.forEach(sector => {
      const selectedSector = Number(state.selectedSectorId) === Number(sector.id);
      const platform = buildRegularPrism({
        cx: sector._slot.x, cz: sector._slot.z, y: 0,
        radius: sector._radius, height: sector._platformHeight, sides: 10,
        color: sector.color, type: 'sector', sectorId: sector.id,
        selected: selectedSector, width, height
      });
      faces.push(...platform.faces);
      labels.push({
        sectorId: sector.id,
        name: sector.labelLines,
        meta: formatBudgetTrillion(sector.budgetTrillion2026),
        point: projectPoint({ x: sector._slot.x, y: sector._platformHeight + (state.mode === 'sector' ? sector._heroHeight : maxTechHeight(sector)) + 8, z: sector._slot.z }, width, height),
        active: selectedSector
      });

      if (state.mode === 'sector') {
        const hero = buildBox({
          cx: sector._slot.x, cz: sector._slot.z, y: sector._platformHeight,
          w: sector._radius * 0.46, d: sector._radius * 0.46, h: sector._heroHeight,
          color: sector.color, type: 'sector', sectorId: sector.id,
          selected: selectedSector, width, height
        });
        faces.push(...hero.faces);
      } else {
        sector._detailTechsSorted.forEach(tech => {
          const selectedTech = selectedSector && state.selectedTechName === tech.name;
          const box = buildBox({
            cx: sector._slot.x + tech._x, cz: sector._slot.z + tech._z, y: sector._platformHeight,
            w: tech._w, d: tech._d, h: tech._h,
            color: sector.color, type: 'tech', sectorId: sector.id, techName: tech.name,
            selected: selectedTech, width, height
          });
          faces.push(...box.faces);
        });
      }
    });

    faces.sort((a,b)=> a.depth - b.depth);
    const defs = `
      <defs>
        <linearGradient id="skyGlow" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="${document.body.classList.contains('dark-mode') ? '#d1efff' : '#ffffff'}" stop-opacity="${document.body.classList.contains('dark-mode') ? '0.08' : '0.20'}" />
          <stop offset="100%" stop-color="${document.body.classList.contains('dark-mode') ? '#88d8ff' : '#d8edff'}" stop-opacity="0" />
        </linearGradient>
      </defs>`;
    const bg = `<rect x="0" y="0" width="${width}" height="${height}" fill="url(#skyGlow)" />`;
    refs.svg.innerHTML = defs + bg + gridParts.join('') + faces.map(faceToSvg).join('');
    renderLabels(labels, width, height);
  }

  function renderLabels(labels, width, height){
    refs.labelsLayer.innerHTML = labels.map(label => {
      const p = label.point;
      if (!p || p.depth < -240 || p.depth > 400 || p.x < -60 || p.x > width + 60 || p.y < -40 || p.y > height + 40) return '';
      return `
        <button type="button"
          class="sector-label ${label.active ? 'active' : ''}"
          data-sector-id="${label.sectorId}"
          style="left:${p.x}px; top:${p.y}px;">
          <div class="name">${label.name.map(escapeHtml).join('<br>')}</div>
          <div class="meta">${escapeHtml(label.meta)}</div>
        </button>`;
    }).join('');
  }

  function buildRegularPrism({cx, cz, y, radius, height: prismHeight, sides, color, type, sectorId, selected, width, height}){
    const top = [];
    const bottom = [];
    for (let i = 0; i < sides; i += 1){
      const a = (Math.PI * 2 * i / sides) + Math.PI / sides;
      const x = cx + Math.cos(a) * radius;
      const z = cz + Math.sin(a) * radius;
      top.push({x, y:y + prismHeight, z});
      bottom.push({x, y, z});
    }
    const faces = [];
    faces.push(makeFace(top, mixColor(color, '#ffffff', 0.22), color, {type, sectorId}, selected, width, height, true));
    for (let i = 0; i < sides; i += 1){
      const j = (i + 1) % sides;
      const ring = [bottom[i], bottom[j], top[j], top[i]];
      const shade = i % 2 === 0 ? mixColor(color, '#183149', document.body.classList.contains('dark-mode') ? 0.28 : 0.18) : mixColor(color, '#183149', document.body.classList.contains('dark-mode') ? 0.18 : 0.10);
      faces.push(makeFace(ring, shade, color, null, selected, width, height, false));
    }
    return { faces };
  }

  function buildBox({cx, cz, y, w, d, h, color, type, sectorId, techName, selected, width, height}){
    const x0 = cx - w / 2, x1 = cx + w / 2;
    const z0 = cz - d / 2, z1 = cz + d / 2;
    const y0 = y, y1 = y + h;
    const p = {
      a:{x:x0,y:y0,z:z0}, b:{x:x1,y:y0,z:z0}, c:{x:x1,y:y0,z:z1}, d:{x:x0,y:y0,z:z1},
      A:{x:x0,y:y1,z:z0}, B:{x:x1,y:y1,z:z0}, C:{x:x1,y:y1,z:z1}, D:{x:x0,y:y1,z:z1}
    };
    const meta = { type, sectorId, techName };
    return {
      faces: [
        makeFace([p.a,p.b,p.B,p.A], mixColor(color, '#183149', document.body.classList.contains('dark-mode') ? 0.34 : 0.20), color, null, selected, width, height, false),
        makeFace([p.b,p.c,p.C,p.B], mixColor(color, '#183149', document.body.classList.contains('dark-mode') ? 0.28 : 0.14), color, null, selected, width, height, false),
        makeFace([p.c,p.d,p.D,p.C], mixColor(color, '#183149', document.body.classList.contains('dark-mode') ? 0.22 : 0.10), color, null, selected, width, height, false),
        makeFace([p.d,p.a,p.A,p.D], mixColor(color, '#183149', document.body.classList.contains('dark-mode') ? 0.26 : 0.16), color, null, selected, width, height, false),
        makeFace([p.A,p.B,p.C,p.D], mixColor(color, '#ffffff', 0.30), color, meta, selected, width, height, true)
      ]
    };
  }

  function makeFace(points3d, fill, baseColor, hitMeta, selected, width, height, interactive){
    const pts = points3d.map(pt => projectPoint(pt, width, height));
    const depth = pts.reduce((sum,p)=>sum+p.depth,0)/pts.length;
    return {
      points: pts,
      depth,
      fill,
      stroke: selected && interactive ? '#ffffff' : mixColor(baseColor, '#ffffff', 0.44),
      strokeWidth: selected && interactive ? 2.6 : interactive ? 1.2 : 0.9,
      hitMeta: interactive ? hitMeta : null,
      opacity: 1
    };
  }

  function faceToSvg(face){
    const attrs = face.hitMeta ? ` data-hit-type="${face.hitMeta.type}" data-sector-id="${face.hitMeta.sectorId}"${face.hitMeta.techName ? ` data-tech-name="${escapeAttr(face.hitMeta.techName)}"` : ''}` : '';
    return `<polygon points="${face.points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')}"
      fill="${face.fill}" stroke="${face.stroke}" stroke-width="${face.strokeWidth}" opacity="${face.opacity}"${attrs}></polygon>`;
  }

  function lineSvg(a, b, stroke){
    return `<line x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b.x.toFixed(1)}" y2="${b.y.toFixed(1)}" stroke="${stroke}" stroke-width="1"></line>`;
  }

  function projectPoint(point, width, height){
    const cosY = Math.cos(state.yaw);
    const sinY = Math.sin(state.yaw);
    const x = point.x;
    const z = point.z - 18;
    const xr = x * cosY - z * sinY;
    const zr = x * sinY + z * cosY;
    const cosX = Math.cos(state.pitch);
    const sinX = Math.sin(state.pitch);
    const yr = point.y * cosX - zr * sinX;
    const zr2 = point.y * sinX + zr * cosX;
    const perspective = 860 / (zr2 + 300);
    return {
      x: width / 2 + xr * perspective,
      y: height * 0.72 - yr * perspective,
      depth: zr2
    };
  }

  function maxTechHeight(sector){
    if (state.mode === 'sector') return sector._heroHeight;
    return Math.max(...sector.detailTechs.map(t => t._h || 0), 0);
  }

  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

  function formatBudgetTrillion(value){
    return `${Number(value || 0).toFixed(2)}조원`;
  }
  function formatSignedTrillion(value){
    const n = Number(value || 0);
    const sign = n > 0 ? '+' : n < 0 ? '-' : '±';
    return `${sign}${Math.abs(n).toFixed(2)}조원`;
  }
  function formatBudgetMixed(value){
    const n = Number(value || 0);
    return `${formatNumber(n / 100, 1)}억원`;
  }
  function formatPercent(value){
    return `${formatNumber(Number(value || 0), 1)}%`;
  }
  function formatNumber(value, digits){
    return Number(value || 0).toLocaleString('ko-KR', { minimumFractionDigits: digits, maximumFractionDigits: digits });
  }
  function formatPeriod(start, end){
    const s = String(start || '').trim();
    const e = String(end || '').trim();
    if (!s && !e) return '-';
    if (!s) return `~ ${e}`;
    if (!e) return `${s} ~`;
    return `${s} ~ ${e}`;
  }
  function escapeHtml(str){
    return String(str ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
  function escapeAttr(str){
    return escapeHtml(str).replace(/`/g, '&#96;');
  }
  function hexToRgb(hex){
    const raw = String(hex || '').replace('#','');
    const s = raw.length === 3 ? raw.split('').map(ch => ch + ch).join('') : raw.padEnd(6, '0');
    return {
      r: parseInt(s.slice(0,2), 16),
      g: parseInt(s.slice(2,4), 16),
      b: parseInt(s.slice(4,6), 16)
    };
  }
  function mixColor(a, b, t){
    const c1 = hexToRgb(a), c2 = hexToRgb(b);
    const clamped = clamp(Number(t || 0), 0, 1);
    const r = Math.round(c1.r + (c2.r - c1.r) * clamped);
    const g = Math.round(c1.g + (c2.g - c1.g) * clamped);
    const b2 = Math.round(c1.b + (c2.b - c1.b) * clamped);
    return `rgb(${r},${g},${b2})`;
  }
})();
</script>
